<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Urbanist', sans-serif; background-color: #f8fafc; }
    body::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="w-full min-h-screen pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-lg">
    <h1 class="text-sm opacity-80 font-medium">Halo, Pengguna!</h1>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5 mt-1">Rp 0</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-2xl"><p class="text-[10px] opacity-80 uppercase tracking-wide">Pemasukan</p><p id="txtMasuk" class="font-bold text-sm">Rp 0</p></div>
      <div class="bg-white/20 p-3 rounded-2xl"><p class="text-[10px] opacity-80 uppercase tracking-wide">Pengeluaran</p><p id="txtKeluar" class="font-bold text-sm">Rp 0</p></div>
    </div>
  </div>

  <div class="w-full px-4 mt-6" id="mainContainer">
    
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tanggal</label><input type="date" id="tanggal" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Jenis</label><select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none"><option value="Pengeluaran">💸 Pengeluaran</option><option value="Pemasukan">💰 Pemasukan</option></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Kategori</label><select id="kategori" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none"></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nominal (Rp)</label><input type="text" id="nominal" placeholder="0" oninput="window.formatInputRupiah(this)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Keterangan</label><input type="text" id="keterangan" placeholder="Beli sesuatu..." class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none" required></div>
        <div class="flex gap-3">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl">Simpan Transaksi</button>
          <button type="button" onclick="window.tombolReloadPintar()" class="bg-slate-100 text-slate-600 font-bold px-5 rounded-2xl border border-slate-200"><i id="iconReload" class="fa-solid fa-rotate"></i></button>
        </div>
      </form>
    </div>

    <div id="pageRiwayat" class="w-full flex flex-col gap-6 hidden">
      <div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-4">Analisis Pengeluaran</h3>
        <div class="flex items-center justify-between gap-4">
          <div class="relative w-[120px] h-[120px] flex-shrink-0 flex items-center justify-center">
            <canvas id="chartPengeluaran"></canvas>
          </div>
          <div id="customLegendContainer" class="flex-grow flex flex-col gap-1 text-[11px] font-bold text-slate-500 max-h-[120px] overflow-y-auto pr-1"></div>
        </div>
        <div id="noChartData" class="text-center text-sm text-slate-400 py-4 font-semibold hidden">Tidak ada data pengeluaran pada rentang tanggal ini</div>
      </div>
      
      <div class="w-full flex flex-col gap-4">
        <h3 class="text-lg font-bold text-slate-800 px-1">Transaksi Terakhir</h3>
        <div id="listRiwayat" class="space-y-3"></div>
        <button onclick="window.bukaModalDetailSemua()" class="w-full bg-white border border-slate-200 text-emerald-600 font-bold p-4 rounded-2xl shadow-sm active:scale-95 transition-transform flex items-center justify-center gap-2">
          <span>Riwayat Lengkap</span> <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
        </button>
      </div>

      <button onclick="window.resetSemuaData()" class="text-rose-500 text-xs font-bold uppercase tracking-wider mt-2 self-center active:scale-95 transition-transform">Reset Semua Data</button>
    </div>
  </div>

  <div id="modalDetailTransaksi" class="fixed inset-0 bg-slate-900/40 z-[100] flex flex-col justify-end hidden opacity-0 transition-opacity duration-300">
    <div class="w-full h-[88vh] bg-slate-50 rounded-t-[2.5rem] shadow-2xl flex flex-col transform translate-y-full transition-transform duration-300 overflow-hidden">
      
      <div class="w-full bg-white px-6 pt-5 pb-3 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="window.tutupModalDetailSemua()" class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-600 rounded-xl active:scale-95 transition-transform">
            <i class="fa-solid fa-xmark text-lg"></i>
          </button>
          <h3 class="text-lg font-bold text-slate-800">Riwayat Lengkap</h3>
        </div>
        <span id="txtTotalDataModal" class="text-slate-400 font-bold text-xs uppercase tracking-wider">0 Transaksi</span>
      </div>

      <div class="w-full bg-white px-6 pb-5 border-b border-slate-100 flex-shrink-0">
        <label class="block text-[12px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Filter Periode</label>
        <div class="w-full">
          <button id="btnTriggerFilter" onclick="window.bukaPilihanPeriode()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-left font-bold text-slate-700 flex justify-between items-center transition-all active:scale-[0.99]">
            <span id="labelPeriodeTerpilih">Tampilkan Semua</span>
            <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
          </button>
          <select id="filterBulanModal" onchange="window.renderListModalSesuaiBulan()" class="hidden"></select>
        </div>
      </div>

      <div class="w-full flex-grow p-4 overflow-y-auto pb-12">
        <div id="listRiwayatPenuhModal" class="space-y-4"></div>
      </div>

    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 py-3 flex justify-around z-50">
    <button onclick="window.tukarHalaman('home')" id="navHome" class="text-emerald-600 flex flex-col items-center focus:outline-none"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[9px] font-bold">HOME</span></button>
    <button onclick="window.tukarHalaman('riwayat')" id="navRiwayat" class="text-slate-400 flex flex-col items-center focus:outline-none"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[9px] font-bold">RIWAYAT</span></button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    const daftarKategoriPengeluaran = ["Makanan & Minuman", "Transportasi & Bensin", "Kebutuhan Rumah & WiFi", "Hiburan & Self Reward", "Kesehatan & Obat", "Lain-lain"];
    const daftarWarna = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];
    let databaseRiwayatRaw = [];
    let myChartInstance = null;

    Chart.register(ChartDataLabels);

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('tanggal').valueAsDate = new Date();
      window.updateKategoriOptions();
      window.loadSummary();
    });

    window.updateKategoriOptions = () => {
      const jenis = document.getElementById('jenis').value;
      const opsi = { "Pengeluaran": daftarKategoriPengeluaran, "Pemasukan": ["Gaji Utama", "Work Sampingan / Freelance", "Investasi & Dividen", "Hadiah / Lain-lain"] };
      document.getElementById('kategori').innerHTML = opsi[jenis].map(k => `<option value="${k}">${k}</option>`).join('');
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');

    window.handleForm = (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true;

      Swal.fire({
        title: 'Menyimpan Transaksi',
        text: 'Sedang mengirim data keuangan Anda...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      const data = { tanggal: document.getElementById('tanggal').value, jenis: document.getElementById('jenis').value, kategori: document.getElementById('kategori').value, nominal: document.getElementById('nominal').value.replace(/\./g, ''), keterangan: document.getElementById('keterangan').value || "-" };
      
      fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
      .then(() => { 
        Swal.fire('Berhasil', 'Transaksi tercatat', 'success'); 
        btn.disabled = false; 
        document.getElementById('formKeuangan').reset(); 
        document.getElementById('tanggal').valueAsDate = new Date();
        window.loadSummary(); 
      })
      .catch(() => { 
        Swal.fire('Error', 'Gagal kirim data', 'error'); 
        btn.disabled = false; 
      });
    };

    window.loadSummary = () => {
      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();
      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    };

    window.handleGoogleData = (res) => {
      const icon = document.getElementById('iconReload');
      if (icon) icon.classList.remove('animate-spin');
      if(!res) return;
      document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
      document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
      document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
      databaseRiwayatRaw = res.riwayat || [];
      window.renderDashboardRiwayat();
      window.renderGrafik();
      window.buatOpsiFilterBulanModal();
      window.renderListModalSesuaiBulan();
    };

    window.renderDashboardRiwayat = () => {
      const container = document.getElementById('listRiwayat');
      if(databaseRiwayatRaw.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 text-sm py-4">Belum ada transaksi.</p>`;
        return;
      }
      container.innerHTML = databaseRiwayatRaw.slice(0, 3).map(i => `
        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
          <div><p class="font-bold text-slate-800 text-sm">${i.keterangan}</p><p class="text-[10px] text-slate-400 font-semibold uppercase mt-0.5">${i.kategori}</p></div>
          <p class="font-bold text-sm ${i.jenis === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">${i.jenis === 'Pemasukan' ? '+' : '-'} Rp ${parseInt(i.nominal).toLocaleString('id-ID')}</p>
        </div>
      `).join('');
    };

    window.renderGrafik = () => {
      const canvas = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const noDataMsg = document.getElementById('noChartData');
      if (!canvas || !legendContainer) return;
      
      legendContainer.innerHTML = "";
      const data = {};
      daftarKategoriPengeluaran.forEach(k => data[k] = 0);
      
      let totalPengeluaran = 0;
      databaseRiwayatRaw.filter(i => i.jenis === 'Pengeluaran').forEach(i => {
          data[i.kategori] = (data[i.kategori] || 0) + parseInt(i.nominal);
          totalPengeluaran += parseInt(i.nominal);
      });

      if (totalPengeluaran === 0) {
        canvas.parentNode.style.display = 'none';
        noDataMsg.classList.remove('hidden');
        return;
      }
      
      canvas.parentNode.style.display = 'block';
      noDataMsg.classList.add('hidden');
      if (myChartInstance) myChartInstance.destroy();

      const labels = Object.keys(data).filter(k => data[k] > 0);
      const values = labels.map(k => data[k]);
      const warnaTerpakai = labels.map((_, idx) => daftarWarna[idx % daftarWarna.length]);

      labels.forEach((k, i) => {
          const persen = ((values[i] / totalPengeluaran) * 100).toFixed(1);
          legendContainer.insertAdjacentHTML('beforeend', `
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${warnaTerpakai[i]}"></div>
              <span class="truncate">${k} (${persen}%)</span>
            </div>`);
      });

      myChartInstance = new Chart(canvas, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: warnaTerpakai, borderWidth: 2, borderColor: '#ffffff' }] },
        options: { cutout: '75%', plugins: { legend: { display: false }, datalabels: { display: false } } }
      });
    };

    window.bukaPilihanPeriode = function() {
      const select = document.getElementById('filterBulanModal');
      const opsi = {};
      for(let i=0; i<select.options.length; i++) opsi[select.options[i].value] = select.options[i].text;
      
      Swal.fire({
        title: 'Pilih Periode',
        input: 'select',
        inputOptions: opsi,
        inputValue: select.value,
        confirmButtonText: 'Terapkan',
        confirmButtonColor: '#10b981',
        customClass: { popup: 'rounded-[2rem]' }
      }).then((r) => {
        if (r.isConfirmed) {
          select.value = r.value;
          document.getElementById('labelPeriodeTerpilih').innerText = opsi[r.value];
          window.renderListModalSesuaiBulan();
        }
      });
    };

    window.buatOpsiFilterBulanModal = function() {
      const select = document.getElementById('filterBulanModal');
      if (!select) return;
      const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const keys = [...new Set(databaseRiwayatRaw.map(i => i.tanggal.substring(0, 7)))];
      
      let html = '<option value="ALL">Tampilkan Semua</option>';
      keys.sort().reverse().forEach(k => {
        const p = k.split('-');
        html += `<option value="${k}">${bulan[parseInt(p[1])-1]} ${p[0]}</option>`;
      });
      select.innerHTML = html;
    };

    window.renderListModalSesuaiBulan = function() {
      const container = document.getElementById('listRiwayatPenuhModal');
      const filter = document.getElementById('filterBulanModal').value;
      if(!container) return;
      
      const dataFilter = filter === 'ALL' ? databaseRiwayatRaw : databaseRiwayatRaw.filter(i => i.tanggal.startsWith(filter));
      
      if(dataFilter.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 text-sm mt-10">Tidak ada transaksi di periode ini.</p>`;
      } else {
        container.innerHTML = dataFilter.map(item => `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
              <div><p class="font-bold text-slate-800 text-sm">${item.keterangan}</p><p class="text-[10px] text-slate-400 font-semibold uppercase mt-0.5">${item.kategori} &bull; ${item.tanggal}</p></div>
              <p class="font-bold text-sm ${item.jenis === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">${item.jenis === 'Pemasukan' ? '+' : '-'} Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</p>
          </div>
        `).join('');
      }
      document.getElementById('txtTotalDataModal').innerText = dataFilter.length + " Transaksi";
    };

    window.resetSemuaData = function() {
      Swal.fire({
        title: 'Reset Semua Data?',
        text: "Seluruh saldo dan riwayat transaksi akan dihapus dari server.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#f43f5e',
        confirmButtonText: 'Ya, Hapus Semua'
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'Membersihkan Data', didOpen: () => Swal.showLoading() });
          fetch(API_URL + "?action=reset", { method: "POST", mode: "no-cors" })
          .then(() => { Swal.fire('Selesai', 'Data dibersihkan', 'success'); window.loadSummary(); });
        }
      });
    };

    window.tukarHalaman = (m) => {
      document.getElementById('pageHome').classList.toggle('hidden', m !== 'home');
      document.getElementById('pageRiwayat').classList.toggle('hidden', m !== 'riwayat');
      
      const navHome = document.getElementById('navHome');
      const navRiwayat = document.getElementById('navRiwayat');
      if(m === 'home') {
        navHome.classList.replace('text-slate-400', 'text-emerald-600');
        navRiwayat.classList.replace('text-emerald-600', 'text-slate-400');
      } else {
        navRiwayat.classList.replace('text-slate-400', 'text-emerald-600');
        navHome.classList.replace('text-emerald-600', 'text-slate-400');
      }
    };

    window.bukaModalDetailSemua = () => { document.getElementById('modalDetailTransaksi').classList.remove('hidden'); setTimeout(() => document.getElementById('modalDetailTransaksi').classList.remove('opacity-0'), 10); };
    window.tutupModalDetailSemua = () => { document.getElementById('modalDetailTransaksi').classList.add('opacity-0'); setTimeout(() => document.getElementById('modalDetailTransaksi').classList.add('hidden'), 300); };
    window.tombolReloadPintar = () => { document.getElementById('iconReload').classList.add('animate-spin'); window.loadSummary(); };
  </script>
</body>
</html>
