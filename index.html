<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #ffffff;
    }
    body::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="w-full min-h-screen bg-slate-50 flex flex-col pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-md">
    <h1 class="text-lg opacity-80">Halo, Pengguna!</h1>
    <p class="text-sm opacity-70 mb-2">Total Saldo Kamu:</p>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5">Rp 0</h2>

    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-xl">
        <p class="text-xs opacity-80">Pemasukan</p>
        <p id="txtMasuk" class="font-semibold text-sm">Rp 0</p>
      </div>
      <div class="bg-white/20 p-3 rounded-xl">
        <p class="text-xs opacity-80">Pengeluaran</p>
        <p id="txtKeluar" class="font-semibold text-sm">Rp 0</p>
      </div>
    </div>
  </div>

  <div class="w-full px-4 mt-6 flex-grow" id="mainContainer">
    
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>

      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">TANGGAL</label>
          <input type="date" id="tanggal" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">JENIS TRANSAKSI</label>
          <select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none">
            <option value="Pengeluaran">💸 Pengeluaran</option>
            <option value="Pemasukan">💰 Pemasukan</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KATEGORI</label>
          <select id="kategori" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none"></select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">NOMINAL (Rp)</label>
          <input type="text" id="nominal" placeholder="Contoh: 50.000" oninput="window.formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KETERANGAN</label>
          <input type="text" id="keterangan" placeholder="Contoh: Beli nasi goreng " class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <div class="flex gap-3 w-full">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-emerald-200 shadow-lg hover:bg-emerald-700 transition-all active:scale-95">
            <i class="fa-solid fa-paper-plane mr-2"></i> Simpan Transaksi
          </button>
          
          <button type="button" onclick="window.tombolReloadPintar()" class="bg-slate-100 text-slate-600 font-bold px-5 rounded-2xl border border-slate-200 shadow-sm hover:bg-slate-200 transition-all active:scale-95 focus:outline-none flex items-center justify-center">
            <i id="iconReload" class="fa-solid fa-rotate text-lg"></i>
          </button>
        </div>
      </form>

      <button type="button" onclick="window.resetSemuaData()" class="w-full mt-4 bg-red-50 hover:bg-red-100 text-red-600 font-bold p-3.5 rounded-2xl border border-red-100 active:scale-95 transition-all focus:outline-none flex items-center justify-center gap-2 text-sm">
        <i class="fa-solid fa-trash-can"></i> Reset Semua Data
      </button>
    </div>

    <div id="pageRiwayat" class="w-full flex flex-col gap-6 mb-6 hidden">
      
      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-base font-bold text-slate-800 mb-3"><i class="fa-solid fa-filter mr-2 text-emerald-600"></i>Filter & Ekspor Laporan</h3>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-[11px] font-bold text-slate-400 mb-1">DARI</label>
            <input type="date" id="filterMulai" onchange="window.prosesFilterData()" class="w-full p-2.5 bg-slate-50 text-sm rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-400 mb-1">SAMPAI</label>
            <input type="date" id="filterSelesai" onchange="window.prosesFilterData()" class="w-full p-2.5 bg-slate-50 text-sm rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-slate-700">
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 border-t border-slate-100 pt-3">
          <button onclick="window.unduhPDF()" class="bg-rose-50 border border-rose-200 text-rose-600 font-bold text-sm p-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform focus:outline-none">
            <i class="fa-solid fa-file-pdf text-base"></i> Unduh PDF
          </button>
          <button onclick="window.unduhExcel()" class="bg-emerald-50 border border-emerald-200 text-emerald-600 font-bold text-sm p-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform focus:outline-none">
            <i class="fa-solid fa-file-excel text-base"></i> Unduh Excel
          </button>
        </div>
      </div>

      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-1">Grafik Pengeluaran</h3>
        <p class="text-[12px] text-slate-400 mb-4 font-semibold">Proporsi akumulasi pengeluaran dan total nominal per kategori</p>
        
        <div class="w-full flex flex-row items-center justify-between gap-2 overflow-x-auto py-2">
          <div class="w-[45%] max-w-[150px] flex-shrink-0 flex items-center justify-center">
            <canvas id="chartPengeluaran"></canvas>
          </div>
          <div id="customLegendContainer" class="w-[55%] flex flex-col gap-2 pl-2 text-[12px] font-bold text-slate-700 max-h-[170px] overflow-y-auto">
          </div>
        </div>
        <div id="noChartData" class="text-center text-sm text-slate-400 py-6 hidden">Tidak ada data pengeluaran pada rentang tanggal ini</div>
      </div>

      <div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-xl font-bold text-slate-800 mb-4">Daftar Transaksi</h3>
        <div id="loadingRiwayat" class="text-slate-400 text-sm py-4 text-center">
          <i class="fa-solid fa-spinner animate-spin mr-2"></i>Memuat riwayat...
        </div>
        <div id="listRiwayat" class="space-y-3 hidden">
        </div>
      </div>
      
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] py-3 px-16 flex justify-around z-50 pb-[calc(12px+env(safe-area-inset-bottom))]">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-house text-xl mb-1"></i>
      <span class="text-[10px] font-bold tracking-wider">HOME</span>
    </button>
    
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
      <span class="text-[10px] font-bold tracking-wider">RIWAYAT</span>
    </button>
  </div>

  <script>                                                                                                    
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    let myChartInstance = null;
    let databaseRiwayatRaw = []; 
    let dataTerfilterGlobal = []; 

    Chart.register(ChartDataLabels);

    document.addEventListener('DOMContentLoaded', () => {
      const hariIni = new Date();
      const awalBulan = new Date(hariIni.getFullYear(), hariIni.getMonth(), 1);
      document.getElementById('tanggal').valueAsDate = hariIni;
      document.getElementById('filterMulai').value = awalBulan.toISOString().split('T')[0];
      document.getElementById('filterSelesai').value = hariIni.toISOString().split('T')[0];
      window.updateKategoriOptions();
      window.loadSummary();
    });

    window.tukarHalaman = function(menu) {
      const pageHome = document.getElementById('pageHome');
      const pageRiwayat = document.getElementById('pageRiwayat');
      const navHome = document.getElementById('navHome');
      const navRiwayat = document.getElementById('navRiwayat');

      if (menu === 'home') {
        pageHome.classList.remove('hidden');
        pageRiwayat.classList.add('hidden');
        navHome.classList.replace('text-slate-400', 'text-emerald-600');
        navRiwayat.classList.replace('text-emerald-600', 'text-slate-400');
      } else if (menu === 'riwayat') {
        pageHome.classList.add('hidden');
        pageRiwayat.classList.remove('hidden');
        navRiwayat.classList.replace('text-slate-400', 'text-emerald-600');
        navHome.classList.replace('text-emerald-600', 'text-slate-400');
        window.loadSummary();
      }
    };

    window.loadSummary = function() {
      document.getElementById('loadingRiwayat').classList.remove('hidden');
      document.getElementById('listRiwayat').classList.add('hidden');
      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();
      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    };

    function formatTanggalIndo(tglString) {
      if(!tglString) return "-";
      return new Date(tglString).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    window.handleGoogleData = function(res) {
      const icon = document.getElementById('iconReload');
      if (icon) icon.classList.remove('animate-spin');
      if (res) {
        document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
        document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
        document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
        databaseRiwayatRaw = res.riwayat || [];
        window.prosesFilterData();
      }
    };

    window.prosesFilterData = function() {
      const tglMulai = document.getElementById('filterMulai').value;
      const tglSelesai = document.getElementById('filterSelesai').value;
      const listContainer = document.getElementById('listRiwayat');
      if (!listContainer || !tglMulai || !tglSelesai) return;
      listContainer.innerHTML = "";
      dataTerfilterGlobal = databaseRiwayatRaw.filter(item => item.tanggal >= tglMulai && item.tanggal <= tglSelesai);
      const dataKategoriGrafik = {};

      if (dataTerfilterGlobal.length > 0) {
        dataTerfilterGlobal.forEach(item => {
          const isMasuk = item.jenis === "Pemasukan";
          if (!isMasuk) dataKategoriGrafik[item.kategori] = (dataKategoriGrafik[item.kategori] || 0) + parseInt(item.nominal);
           
          listContainer.insertAdjacentHTML('beforeend', `
            <div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-2xl border border-slate-100">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 flex items-center justify-center rounded-xl text-sm ${isMasuk ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'}">
                  <i class="fa-solid ${isMasuk ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                </div>
                <div>
                  <h4 class="text-sm font-bold text-slate-800">${item.keterangan}</h4>
                  <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider mt-0.5">${item.kategori} &bull; ${formatTanggalIndo(item.tanggal)}</p>
                </div>
              </div>
              <span class="text-sm font-bold ${isMasuk ? 'text-emerald-600' : 'text-rose-600'}">${isMasuk ? '+' : '-'} Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</span>
            </div>`);
        });
        window.renderGrafik(dataKategoriGrafik);
        document.getElementById('loadingRiwayat').classList.add('hidden');
        listContainer.classList.remove('hidden');
      } else {
        window.renderGrafik({});
        document.getElementById('loadingRiwayat').classList.add('hidden');
        listContainer.innerHTML = "<div class='text-slate-400 py-4 text-center text-sm'>Tidak ada riwayat.</div>";
        listContainer.classList.remove('hidden');
      }
    };

    window.renderGrafik = function(dataKategori) {
      const canvasCtx = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const labels = Object.keys(dataKategori), values = Object.values(dataKategori);
      if (!legendContainer) return;
      legendContainer.innerHTML = "";
      if (labels.length === 0) { canvasCtx.style.display = 'none'; document.getElementById('noChartData').classList.remove('hidden'); return; }
      canvasCtx.style.display = 'block';
      document.getElementById('noChartData').classList.add('hidden');
      if (myChartInstance !== null) myChartInstance.destroy();

      const total = values.reduce((a, b) => a + b, 0);
      const colors = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];

      labels.forEach((kat, i) => {
        legendContainer.insertAdjacentHTML('beforeend', `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full" style="background-color:${colors[i%6]}"></span><span class="text-slate-700 font-bold text-[13px] truncate">${kat}</span></div>`);
      });

      myChartInstance = new Chart(canvasCtx, {
        type: 'pie',
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff' }] },
        options: {
          plugins: {
            legend: { display: false },
            tooltip: { enabled: true, displayColors: false, callbacks: { label: () => "", title: (t) => t[0].label } },
            datalabels: {
              color: '#ffffff',
              font: { family: 'Urbanist', weight: 'bold', size: 14 },
              textShadowColor: 'rgba(0,0,0,0.5)',
              textShadowBlur: 4,
              formatter: (v) => ((v / total) * 100).toFixed(1) + '%'
            }
          }
        }
      });
    };

    window.resetSemuaData = function() {
      Swal.fire({
        title: 'Apakah Anda yakin?',
        text: "Semua data saldo, pemasukan, pengeluaran, dan riwayat transaksi akan dihapus permanen dari sistem!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#64748b',
        confirmButtonText: 'Ya, Reset Semua!',
        cancelButtonText: 'Batal'
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire({
            title: 'Memproses...',
            text: 'Sedang menghapus data di server',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
          });
          
          fetch(API_URL + "?action=reset", { method: "POST", mode: "no-cors" })
          .then(() => {
            Swal.fire({
              icon: 'success',
              title: 'Berhasil di-Reset!',
              text: 'Semua data keuangan telah dibersihkan.',
              timer: 2000,
              showConfirmButton: false
            });
            window.loadSummary();
          })
          .catch(() => {
            Swal.fire({
              icon: 'error',
              title: 'Gagal!',
              text: 'Terjadi masalah saat menghubungi server.'
            });
          });
        }
      });
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');
    window.tombolReloadPintar = () => { document.getElementById('iconReload').classList.add('animate-spin'); window.loadSummary(); window.tukarHalaman('home'); };
    
    window.updateKategoriOptions = () => {
      const jenis = document.getElementById('jenis').value;
      const opsi = { "Pengeluaran": ["Makanan & Minuman", "Transportasi & Bensin", "Kebutuhan Rumah & WiFi", "Hiburan & Self Reward", "Kesehatan & Obat", "Lain-lain"], "Pemasukan": ["Gaji Utama", "Work Sampingan / Freelance", "Investasi & Dividen", "Hadiah / Lain-lain"] };
      document.getElementById('kategori').innerHTML = opsi[jenis].map(kat => `<option value="${kat}">${kat}</option>`).join('');
    };

    window.handleForm = function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true; btn.innerHTML = "Memproses...";
      const data = { tanggal: document.getElementById('tanggal').value, jenis: document.getElementById('jenis').value, kategori: document.getElementById('kategori').value, nominal: document.getElementById('nominal').value.replace(/\./g, ''), keterangan: document.getElementById('keterangan').value || "-" };
      fetch(API_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data) })
      .then(() => { btn.disabled = false; btn.innerHTML = "Simpan Transaksi"; Swal.fire({ icon: 'success', title: 'Berhasil!', timer: 1500 }); document.getElementById('formKeuangan').reset(); window.tukarHalaman('riwayat'); })
      .catch(() => { btn.disabled = false; btn.innerHTML = "Simpan Transaksi"; Swal.fire({ icon: 'error', title: 'Gagal' }); });
    };
    
    window.unduhPDF = () => {}; window.unduhExcel = () => {};
  </script>
</body>

</html>
