<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #ffffff;
    }
    body::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="w-full min-h-screen bg-slate-50 flex flex-col pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-md">
    <h1 class="text-lg opacity-80">Halo, Pengguna!</h1>
    <p class="text-sm opacity-70 mb-2">Total Saldo Kamu:</p>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5">Rp 0</h2>

    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-xl">
        <p class="text-xs opacity-80">Pemasukan</p>
        <p id="txtMasuk" class="font-semibold text-sm">Rp 0</p>
      </div>
      <div class="bg-white/20 p-3 rounded-xl">
        <p class="text-xs opacity-80">Pengeluaran</p>
        <p id="txtKeluar" class="font-semibold text-sm">Rp 0</p>
      </div>
    </div>
  </div>

  <div class="w-full px-4 mt-6 flex-grow" id="mainContainer">
    
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>

      <form id="formKeuangan" onsubmit="handleForm(event)">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">TANGGAL</label>
          <input type="date" id="tanggal" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">JENIS TRANSAKSI</label>
          <select id="jenis" onchange="updateKategoriOptions()" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none">
            <option value="Pengeluaran">💸 Pengeluaran</option>
            <option value="Pemasukan">💰 Pemasukan</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KATEGORI</label>
          <select id="kategori" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none"></select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">NOMINAL (Rp)</label>
          <input type="text" id="nominal" placeholder="Contoh: 50.000" oninput="formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KETERANGAN</label>
          <input type="text" id="keterangan" placeholder="Contoh: Beli nasi goreng " class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <div class="flex gap-3 w-full">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-emerald-200 shadow-lg hover:bg-emerald-700 transition-all active:scale-95">
            <i class="fa-solid fa-paper-plane mr-2"></i> Simpan Transaksi
          </button>
          
          <button type="button" onclick="tombolReloadPintar()" class="bg-slate-100 text-slate-600 font-bold px-5 rounded-2xl border border-slate-200 shadow-sm hover:bg-slate-200 transition-all active:scale-95 focus:outline-none flex items-center justify-center">
            <i id="iconReload" class="fa-solid fa-rotate text-lg"></i>
          </button>
        </div>
      </form>
    </div>

    <div id="pageRiwayat" class="w-full flex flex-col gap-6 mb-6 hidden">
      
      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-sm font-bold text-slate-700 mb-3"><i class="fa-solid fa-filter mr-2 text-emerald-600"></i>Filter Tanggal Riwayat</h3>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1">DARI</label>
            <input type="date" id="filterMulai" onchange="filterDataRiwayatDanGrafik()" class="w-full p-2 bg-slate-50 text-xs rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1">SAMPAI</label>
            <input type="date" id="filterSelesai" onchange="filterDataRiwayatDanGrafik()" class="w-full p-2 bg-slate-50 text-xs rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-500">
          </div>
        </div>
      </div>

      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-md font-bold text-slate-800 mb-2">Grafik Pengeluaran</h3>
        <p class="text-[11px] text-slate-400 mb-4 font-semibold">Proporsi pengeluaran berdasarkan kategori pilihan tanggal</p>
        <div class="w-full max-w-[220px] mx-auto flex items-center justify-center">
          <canvas id="chartPengeluaran"></canvas>
        </div>
        <div id="noChartData" class="text-center text-xs text-slate-400 py-6 hidden">Tidak ada data pengeluaran pada tanggal ini</div>
      </div>

      <div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-md font-bold text-slate-800 mb-4">Rincian Transaksi</h3>
        <div id="loadingRiwayat" class="text-slate-400 text-xs py-4 text-center">
          <i class="fa-solid fa-spinner animate-spin mr-2"></i>Memuat riwayat...
        </div>
        <div id="listRiwayatGrouped" class="space-y-6 hidden">
          </div>
      </div>
      
    </div>

  </div>

  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] py-3 px-16 flex justify-around z-50 pb-[calc(12px+env(safe-area-inset-bottom))]">
    <button id="navHome" onclick="tukarHalaman('home')" class="text-emerald-600 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-house text-xl mb-1"></i>
      <span class="text-[10px] font-bold tracking-wider">HOME</span>
    </button>
    
    <button id="navRiwayat" onclick="tukarHalaman('riwayat')" class="text-slate-400 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
      <span class="text-[10px] font-bold tracking-wider">RIWAYAT</span>
    </button>
  </div>

  <script>                                                                           
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    
    let databaseRiwayatRaw = []; 
    let myChartInstance = null;

    // Set tanggal default filter (Awal bulan ini s/d Hari ini)
    const hariIni = new Date();
    const awalBulan = new Date(hariIni.getFullYear(), hariIni.getMonth(), 1);
    
    document.getElementById('tanggal').valueAsDate = hariIni;
    document.getElementById('filterMulai').value = awalBulan.toISOString().split('T')[0];
    document.getElementById('filterSelesai').value = hariIni.toISOString().split('T')[0];

    window.onload = loadSummary;

    function tukarHalaman(menu) {
      const pageHome = document.getElementById('pageHome');
      const pageRiwayat = document.getElementById('pageRiwayat');
      const navHome = document.getElementById('navHome');
      const navRiwayat = document.getElementById('navRiwayat');

      if (menu === 'home') {
        pageHome.classList.remove('hidden');
        pageRiwayat.classList.add('hidden');
        navHome.classList.replace('text-slate-400', 'text-emerald-600');
        navRiwayat.classList.replace('text-emerald-600', 'text-slate-400');
      } else if (menu === 'riwayat') {
        pageHome.classList.add('hidden');
        pageRiwayat.classList.remove('hidden');
        navRiwayat.classList.replace('text-slate-400', 'text-emerald-600');
        navHome.classList.replace('text-emerald-600', 'text-slate-400');
        loadSummary();
      }
    }

    function loadSummary() {
      document.getElementById('loadingRiwayat').classList.remove('hidden');
      document.getElementById('listRiwayatGrouped').classList.add('hidden');

      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    }

    window.handleGoogleData = function(res) {
      const icon = document.getElementById('iconReload');
      if (icon) icon.classList.remove('animate-spin');

      if (res) {
        document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
        document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
        document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
        
        // Simpan data mentah global untuk difilter lokal secara instant
        databaseRiwayatRaw = res.riwayat || [];
        filterDataRiwayatDanGrafik();
      }
    };

    // PROSES UTAMA FILTER DAN PENGELOMPOKAN DATA PER HARI
    function filterDataRiwayatDanGrafik() {
      const tglMulai = document.getElementById('filterMulai').value;
      const tglSelesai = document.getElementById('filterSelesai').value;

      if (!tglMulai || !tglSelesai) return;

      // 1. Filter data berdasarkan range tanggal terpilih
      const dataTerfilter = databaseRiwayatRaw.filter(item => {
        return item.tanggal >= tglMulai && item.tanggal <= tglSelesai;
      });

      // 2. Olah Data untuk Grafik Pengeluaran (Hanya Jenis Pengeluaran)
      const dataKategoriGrafik = {};
      dataTerfilter.forEach(item => {
        if (item.jenis === "Pengeluaran") {
          dataKategoriGrafik[item.kategori] = (dataKategoriGrafik[item.kategori] || 0) + item.nominal;
        }
      });

      renderGrafik(dataKategoriGrafik);

      // 3. Kelompokkan riwayat Transaksi per Hari
      const kelompokPerHari = {};
      dataTerfilter.forEach(item => {
        if (!kelompokPerHari[item.tanggal]) {
          kelompokPerHari[item.tanggal] = [];
        }
        kelompokPerHari[item.tanggal].push(item);
      });

      // Urutkan tanggal dari paling baru ke lama
      const tanggalTerurut = Object.keys(kelompokPerHari).sort((a, b) => new Date(b) - new Date(a));

      const listContainer = document.getElementById('listRiwayatGrouped');
      listContainer.innerHTML = "";

      if (tanggalTerurut.length > 0) {
        tanggalTerurut.forEach(tgl => {
          // Format penulisan tanggal grup yang rapi
          const opsiFormat = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
          const namaHariIndo = new Date(tgl).toLocaleDateString('id-ID', opsiFormat);

          let htmlGrupHari = `
            <div class="space-y-2">
              <div class="text-xs font-bold text-slate-400 tracking-wide sticky top-0 bg-white py-1 uppercase">${namaHariIndo}</div>
              <div class="space-y-2">
          `;

          kelompokPerHari[tgl].forEach(item => {
            const isMasuk = item.jenis === "Pemasukan";
            const warnaTeks = isMasuk ? "text-emerald-600" : "text-rose-600";
            const simbol = isMasuk ? "+" : "-";
            const iconFontAwesome = isMasuk ? "fa-arrow-trend-up" : "fa-arrow-trend-down";
            const bgWarnaIcon = isMasuk ? "text-emerald-600 bg-emerald-50" : "text-rose-600 bg-rose-50";
            const nomFormatted = "Rp " + parseInt(item.nominal).toLocaleString('id-ID');

            htmlGrupHari += `
              <div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 flex items-center justify-center rounded-xl text-xs ${bgWarnaIcon}">
                    <i class="fa-solid ${iconFontAwesome}"></i>
                  </div>
                  <div>
                    <h4 class="text-xs font-bold text-slate-800">${item.keterangan}</h4>
                    <p class="text-[9px] text-slate-400 font-semibold uppercase tracking-wider">${item.kategori}</p>
                  </div>
                </div>
                <div class="text-right">
                  <span class="text-xs font-bold ${warnaTeks}">${simbol} ${nomFormatted}</span>
                </div>
              </div>
            `;
          });

          htmlGrupHari += `</div></div>`;
          listContainer.insertAdjacentHTML('beforeend', htmlGrupHari);
        });

        document.getElementById('loadingRiwayat').classList.add('hidden');
        listContainer.classList.remove('hidden');
      } else {
        document.getElementById('loadingRiwayat').classList.add('hidden');
        listContainer.innerHTML = "<div class='text-slate-400 py-4 text-center text-xs'>Tidak ada riwayat transaksi pada rentang tanggal ini.
