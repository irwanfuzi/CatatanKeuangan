<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Catatan Keuangan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Urbanist', sans-serif; background-color: #ffffff; }
    body::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="w-full min-h-screen bg-slate-50 flex flex-col pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-md">
    <h1 class="text-lg opacity-80">Halo, Pengguna!</h1>
    <p class="text-sm opacity-70 mb-2">Total Saldo Kamu:</p>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5">Rp 0</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-xl"><p class="text-xs opacity-80">Pemasukan</p><p id="txtMasuk" class="font-semibold text-sm">Rp 0</p></div>
      <div class="bg-white/20 p-3 rounded-xl"><p class="text-xs opacity-80">Pengeluaran</p><p id="txtKeluar" class="font-semibold text-sm">Rp 0</p></div>
    </div>
  </div>

  <div class="w-full px-4 mt-6 flex-grow" id="mainContainer">
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border mb-6">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">TANGGAL</label><input type="date" id="tanggal" class="w-full p-3 bg-slate-50 rounded-xl outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">JENIS</label><select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-3 bg-slate-50 rounded-xl outline-none"><option value="Pengeluaran">Pengeluaran</option><option value="Pemasukan">Pemasukan</option></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">KATEGORI</label><select id="kategori" class="w-full p-3 bg-slate-50 rounded-xl outline-none"></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">NOMINAL</label><input type="text" id="nominal" placeholder="50.000" oninput="window.formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">KETERANGAN</label><input type="text" id="keterangan" placeholder="Contoh: Makan" class="w-full p-3 bg-slate-50 rounded-xl outline-none" required></div>
        <div class="flex gap-3"><button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl">Simpan</button></div>
      </form>
    </div>

    <div id="pageRiwayat" class="w-full hidden">
      <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4">
        <div class="grid grid-cols-2 gap-3 mb-4">
           <input type="date" id="filterMulai" onchange="window.prosesFilterData()" class="p-2 bg-slate-50 text-sm rounded-xl outline-none">
           <input type="date" id="filterSelesai" onchange="window.prosesFilterData()" class="p-2 bg-slate-50 text-sm rounded-xl outline-none">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="window.unduhPDF()" class="bg-rose-50 text-rose-600 font-bold p-3 rounded-xl text-sm">PDF</button>
          <button onclick="window.unduhExcel()" class="bg-emerald-50 text-emerald-600 font-bold p-3 rounded-xl text-sm">Excel</button>
        </div>
      </div>
      <div class="bg-white p-5 rounded-3xl shadow-sm border mb-4">
        <canvas id="chartPengeluaran"></canvas>
        <div id="customLegendContainer" class="mt-4"></div>
      </div>
      <div id="listRiwayat" class="bg-white p-6 rounded-3xl shadow-sm border"></div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full bg-white border-t py-4 px-16 flex justify-around">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600"><i class="fa-solid fa-house text-xl"></i></button>
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400"><i class="fa-solid fa-clock-rotate-left text-xl"></i></button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    let myChartInstance = null;
    let databaseRiwayatRaw = [];

    Chart.register(ChartDataLabels);

    document.addEventListener('DOMContentLoaded', () => {
      const h = new Date();
      document.getElementById('tanggal').valueAsDate = h;
      document.getElementById('filterMulai').value = new Date(h.getFullYear(), h.getMonth(), 1).toISOString().split('T')[0];
      document.getElementById('filterSelesai').value = h.toISOString().split('T')[0];
      window.updateKategoriOptions();
      window.loadSummary();
    });

    window.tukarHalaman = (menu) => {
      document.getElementById('pageHome').classList.toggle('hidden', menu !== 'home');
      document.getElementById('pageRiwayat').classList.toggle('hidden', menu !== 'riwayat');
      if (menu === 'riwayat') window.loadSummary();
    };

    window.loadSummary = () => {
      const old = document.getElementById('google-jsonp-script');
      if (old) old.remove();
      const s = document.createElement('script');
      s.id = 'google-jsonp-script';
      s.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(s);
    };

    window.handleGoogleData = (res) => {
      if (res) {
        document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
        document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
        document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
        databaseRiwayatRaw = res.riwayat || [];
        window.prosesFilterData();
      }
    };

    window.prosesFilterData = () => {
      const tglMulai = document.getElementById('filterMulai').value;
      const tglSelesai = document.getElementById('filterSelesai').value;
      const list = document.getElementById('listRiwayat');
      list.innerHTML = "";
      const filtered = databaseRiwayatRaw.filter(i => i.tanggal >= tglMulai && i.tanggal <= tglSelesai);
      const dataGrafik = {};
      filtered.forEach(i => {
        if (i.jenis === 'Pengeluaran') dataGrafik[i.kategori] = (dataGrafik[i.kategori] || 0) + parseInt(i.nominal);
        list.innerHTML += `<div class="p-3 border-b">${i.keterangan} - Rp ${parseInt(i.nominal).toLocaleString()}</div>`;
      });
      window.renderGrafik(dataGrafik);
    };

    window.renderGrafik = (dataKategori) => {
      const canvas = document.getElementById('chartPengeluaran');
      const legend = document.getElementById('customLegendContainer');
      legend.innerHTML = "";
      const labels = Object.keys(dataKategori), values = Object.values(dataKategori);
      if (myChartInstance) myChartInstance.destroy();
      const colors = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];
      labels.forEach((kat, i) => {
        legend.innerHTML += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full" style="background:${colors[i%6]}"></span><span class="text-sm font-bold">${kat}</span></div>`;
      });
      myChartInstance = new Chart(canvas, {
        type: 'pie',
        data: { labels, datasets: [{ data: values, backgroundColor: colors }] },
        options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: () => "", title: (i) => i[0].label } } } }
      });
    };

    window.updateKategoriOptions = () => {
        const j = document.getElementById('jenis').value;
        const k = document.getElementById('kategori');
        const ops = { "Pengeluaran": ["Makanan", "Transport", "WiFi", "Hiburan", "Obat", "Lainnya"], "Pemasukan": ["Gaji", "Freelance", "Hadiah"] };
        k.innerHTML = ops[j].map(o => `<option value="${o}">${o}</option>`).join('');
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');
    window.handleForm = (e) => { e.preventDefault(); Swal.fire('Berhasil', 'Data disimpan', 'success'); };
    window.unduhPDF = () => {}; window.unduhExcel = () => {}; window.tombolReloadPintar = () => window.loadSummary();
  </script>
</body>
</html>
