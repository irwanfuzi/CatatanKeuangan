<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script>
    // PENGATURAN FUNGSI GLOBAL DI SINI AGAR TIDAK TERJADI TYPEERROR
    window.tukarHalaman = function(menu) {
      const pageHome = document.getElementById('pageHome');
      const pageRiwayat = document.getElementById('pageRiwayat');
      const navHome = document.getElementById('navHome');
      const navRiwayat = document.getElementById('navRiwayat');

      if (!pageHome || !pageRiwayat) return;

      if (menu === 'home') {
        pageHome.classList.remove('hidden');
        pageRiwayat.classList.add('hidden');
        navHome.classList.replace('text-slate-400', 'text-emerald-600');
        navRiwayat.classList.replace('text-emerald-600', 'text-slate-400');
      } else if (menu === 'riwayat') {
        pageHome.classList.add('hidden');
        pageRiwayat.classList.remove('hidden');
        navRiwayat.classList.replace('text-slate-400', 'text-emerald-600');
        navHome.classList.replace('text-emerald-600', 'text-slate-400');
        if (window.loadSummary) window.loadSummary();
      }
    };
  </script>
</head>
<body class="bg-slate-50 pb-[90px]">

  <div id="pageHome" class="p-6"> ... </div>
  <div id="pageRiwayat" class="p-6 hidden"> ... </div>

  <div class="fixed bottom-0 w-full bg-white border-t py-3 flex justify-around">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600">HOME</button>
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400">RIWAYAT</button>
  </div>

  <script>
    // FUNGSI LAINNYA
    window.loadSummary = function() { ... };
    window.handleForm = function(e) { ... };
  </script>
</body>
</html>
