<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Urbanist', sans-serif; background-color: #ffffff; }
    body::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="w-full min-h-screen bg-slate-50 flex flex-col pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-md">
    <h1 class="text-lg opacity-80">Halo, Pengguna!</h1>
    <p class="text-sm opacity-70 mb-2">Total Saldo Kamu:</p>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5">Rp 0</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-xl"><p class="text-xs opacity-80">Pemasukan</p><p id="txtMasuk" class="font-semibold text-sm">Rp 0</p></div>
      <div class="bg-white/20 p-3 rounded-xl"><p class="text-xs opacity-80">Pengeluaran</p><p id="txtKeluar" class="font-semibold text-sm">Rp 0</p></div>
    </div>
  </div>

  <div class="w-full px-4 mt-6 flex-grow" id="mainContainer">
    
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1">TANGGAL</label><input type="date" id="tanggal" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1">JENIS TRANSAKSI</label><select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none"><option value="Pengeluaran">💸 Pengeluaran</option><option value="Pemasukan">💰 Pemasukan</option></select></div>
        <div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1">KATEGORI</label><select id="kategori" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none"></select></div>
        <div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1">NOMINAL (Rp)</label><input type="text" id="nominal" placeholder="Contoh: 50.000" oninput="window.formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-semibold text-slate-500 mb-1">KETERANGAN</label><input type="text" id="keterangan" placeholder="Contoh: Beli nasi goreng " class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required></div>
        
        <div class="flex gap-3 w-full">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-lg hover:bg-emerald-700 transition-all active:scale-95"><i class="fa-solid fa-paper-plane mr-2"></i> Simpan</button>
          <button type="button" onclick="window.tombolReloadPintar()" class="bg-slate-100 text-slate-600 font-bold px-5 rounded-2xl border border-slate-200 shadow-sm transition-all active:scale-95"><i id="iconReload" class="fa-solid fa-rotate"></i></button>
        </div>
      </form>
      <button type="button" onclick="window.resetData()" class="w-full mt-4 bg-red-50 text-red-600 font-bold p-3 rounded-2xl border border-red-200 text-sm">Reset Semua Data</button>
    </div>

    <div id="pageRiwayat" class="w-full flex flex-col gap-6 mb-6 hidden">
      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-base font-bold text-slate-800 mb-3"><i class="fa-solid fa-filter mr-2 text-emerald-600"></i>Filter & Ekspor</h3>
        <div class="grid grid-cols-2 gap-3 mb-4"><input type="date" id="filterMulai" onchange="window.prosesFilterData()" class="w-full p-2.5 bg-slate-50 text-sm rounded-xl border-none outline-none font-semibold text-slate-700"><input type="date" id="filterSelesai" onchange="window.prosesFilterData()" class="w-full p-2.5 bg-slate-50 text-sm rounded-xl border-none outline-none font-semibold text-slate-700"></div>
        <div class="grid grid-cols-2 gap-3 border-t border-slate-100 pt-3"><button onclick="window.unduhPDF()" class="bg-rose-50 text-rose-600 font-bold text-sm p-3 rounded-xl">Unduh PDF</button><button onclick="window.unduhExcel()" class="bg-emerald-50 text-emerald-600 font-bold text-sm p-3 rounded-xl">Unduh Excel</button></div>
      </div>
      <div class="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-1">Grafik Pengeluaran</h3>
        <div class="w-full flex flex-row items-center justify-between gap-2 py-2"><div class="w-[45%] max-w-[150px]"><canvas id="chartPengeluaran"></canvas></div><div id="customLegendContainer" class="w-[55%] flex flex-col gap-2 pl-2 text-[12px] font-bold text-slate-700 max-h-[170px] overflow-y-auto"></div></div>
        <div id="noChartData" class="text-center text-sm text-slate-400 py-6 hidden">Tidak ada data.</div>
      </div>
      <div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-xl font-bold text-slate-800 mb-4">Daftar Transaksi</h3>
        <div id="loadingRiwayat" class="text-slate-400 text-sm py-4 text-center hidden"><i class="fa-solid fa-spinner animate-spin mr-2"></i>Memuat...</div>
        <div id="listRiwayat" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 py-3 px-16 flex justify-around z-50">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600"><i class="fa-solid fa-house text-xl"></i></button>
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400"><i class="fa-solid fa-clock-rotate-left text-xl"></i></button>
  </div>

  <script>
    const API_URL = "
