<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-md">
    <h2 id="txtSaldo" class="text-3xl font-bold">Rp 0</h2>
  </div>

  <div class="w-full px-4 mt-6" id="mainContainer">
    <div id="pageHome" class="bg-white p-6 rounded-3xl shadow-sm mb-6">
      <h3 class="text-lg font-bold mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <input type="date" id="tanggal" class="w-full p-3 mb-4 bg-slate-50 rounded-xl" required>
        <select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-3 mb-4 bg-slate-50 rounded-xl"></select>
        <select id="kategori" class="w-full p-3 mb-4 bg-slate-50 rounded-xl"></select>
        <input type="text" id="nominal" oninput="window.formatInputRupiah(this)" class="w-full p-3 mb-4 bg-slate-50 rounded-xl" required>
        <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold">Simpan</button>
      </form>
    </div>

    <div id="pageRiwayat" class="hidden">
      <div class="bg-white p-5 rounded-3xl mb-4">
        <h3 class="text-lg font-bold mb-2">Grafik Pengeluaran</h3>
        <div class="flex flex-row items-start gap-4">
          <div class="w-[40%]"><canvas id="chartPengeluaran"></canvas></div>
          <div id="customLegendContainer" class="w-[60%] flex flex-col gap-2 text-[12px]"></div>
        </div>
      </div>
      <div id="listRiwayat" class="bg-white p-6 rounded-3xl shadow-sm"></div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full bg-white border-t py-4 flex justify-around z-50">
    <button onclick="window.tukarHalaman('home')" class="text-emerald-600 font-bold">HOME</button>
    <button onclick="window.tukarHalaman('riwayat')" class="text-slate-400 font-bold">RIWAYAT</button>
  </div>

  <script>
    window.tukarHalaman = function(menu) {
      document.getElementById('pageHome').classList.toggle('hidden', menu !== 'home');
      document.getElementById('pageRiwayat').classList.toggle('hidden', menu !== 'riwayat');
      if (menu === 'riwayat' && window.loadSummary) window.loadSummary();
    };

    window.renderGrafik = function(dataKategori) {
      const canvasCtx = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const labels = Object.keys(dataKategori);
      const values = Object.values(dataKategori);
      
      if (!legendContainer) return;
      legendContainer.innerHTML = "";
      
      if (labels.length === 0) return;

      labels.forEach((kat, i) => {
        const div = document.createElement('div');
        div.innerHTML = `<span class="font-bold">${kat}</span>: Rp ${values[i].toLocaleString()}`;
        legendContainer.appendChild(div);
      });
      
      if (window.myChartInstance) window.myChartInstance.destroy();
      window.myChartInstance = new Chart(canvasCtx, {
        type: 'pie',
        data: { labels, datasets: [{ data: values, backgroundColor: ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981'] }] },
        options: { plugins: { legend: { display: false } } }
      });
    };
    
    // Pastikan semua fungsi lain (handleForm, dll) diletakkan di sini tanpa duplikasi
    window.handleForm = function(e) { e.preventDefault(); Swal.fire('Berhasil', 'Data disimpan', 'success'); };
    window.updateKategoriOptions = function() {};
    window.formatInputRupiah = function(input) {};
  </script>
</body>
</html>
