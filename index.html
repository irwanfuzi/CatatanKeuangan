<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Urbanist', sans-serif; background-color: #f8fafc; }
    body::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="w-full min-h-screen pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem] shadow-lg">
    <h1 class="text-sm opacity-80 font-medium">Halo, Pengguna!</h1>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-5 mt-1">Rp 0</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-2xl"><p class="text-[10px] opacity-80 uppercase tracking-wide">Pemasukan</p><p id="txtMasuk" class="font-bold text-sm">Rp 0</p></div>
      <div class="bg-white/20 p-3 rounded-2xl"><p class="text-[10px] opacity-80 uppercase tracking-wide">Pengeluaran</p><p id="txtKeluar" class="font-bold text-sm">Rp 0</p></div>
    </div>
  </div>

  <div class="w-full px-4 mt-6" id="mainContainer">
    
    <div id="pageHome" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Tanggal</label><input type="date" id="tanggal" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Jenis</label><select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none"><option value="Pengeluaran">💸 Pengeluaran</option><option value="Pemasukan">💰 Pemasukan</option></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Kategori</label><select id="kategori" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none"></select></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nominal (Rp)</label><input type="text" id="nominal" placeholder="0" oninput="window.formatInputRupiah(this)" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none" required></div>
        <div class="mb-4"><label class="block text-xs font-bold text-slate-400 uppercase mb-1">Keterangan</label><input type="text" id="keterangan" placeholder="Beli sesuatu..." class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none" required></div>
        <div class="flex gap-3">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl">Simpan</button>
          <button type="button" onclick="window.tombolReloadPintar()" class="bg-slate-100 text-slate-600 font-bold px-5 rounded-2xl border border-slate-200"><i id="iconReload" class="fa-solid fa-rotate"></i></button>
        </div>
      </form>
    </div>

    <div id="pageRiwayat" class="w-full flex flex-col gap-6 hidden">
      <div class="w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-4">Analisis Pengeluaran</h3>
        <div class="flex items-center justify-between gap-4">
          <div class="relative w-[120px] h-[120px]"><canvas id="chartPengeluaran"></canvas></div>
          <div id="customLegendContainer" class="flex-grow flex flex-col gap-1 text-[11px] font-bold text-slate-500"></div>
        </div>
      </div>
      <div id="listRiwayat" class="space-y-3"></div>
      <button onclick="window.bukaModalDetailSemua()" class="w-full bg-white border border-slate-200 text-emerald-600 font-bold p-4 rounded-2xl shadow-sm">Riwayat Lengkap</button>
      <button onclick="window.resetSemuaData()" class="text-rose-500 text-xs font-bold uppercase">Reset Semua Data</button>
    </div>
  </div>

  <div id="modalDetailTransaksi" class="fixed inset-0 bg-slate-900/40 z-[100] flex flex-col justify-end hidden opacity-0 transition-opacity duration-300">
    <div class="w-full h-[88vh] bg-slate-50 rounded-t-[2.5rem] shadow-2xl flex flex-col transform translate-y-full transition-transform duration-300 overflow-hidden">
      <div class="w-full bg-white px-6 pt-5 pb-3 flex items-center justify-between">
        <h3 class="text-lg font-bold text-slate-800">Riwayat Lengkap</h3>
        <button onclick="window.tutupModalDetailSemua()" class="text-slate-400 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <div class="w-full bg-white px-6 pb-5 border-b border-slate-100">
        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Filter Periode</label>
        <button id="btnTriggerFilter" onclick="window.bukaPilihanPeriode()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-left font-bold text-slate-700 flex justify-between items-center">
          <span id="labelPeriodeTerpilih">Tampilkan Semua</span>
          <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
        </button>
        <select id="filterBulanModal" onchange="window.renderListModalSesuaiBulan()" class="hidden"></select>
      </div>
      <div id="listRiwayatPenuhModal" class="flex-grow p-4 overflow-y-auto pb-12"></div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 py-3 flex justify-around z-50">
    <button onclick="window.tukarHalaman('home')" class="text-emerald-600 flex flex-col items-center"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px] font-bold">HOME</span></button>
    <button onclick="window.tukarHalaman('riwayat')" class="text-slate-400 flex flex-col items-center"><i class="fa-solid fa-clock-rotate-left text-xl"></i><span class="text-[9px] font-bold">RIWAYAT</span></button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    const daftarKategoriPengeluaran = ["Makanan & Minuman", "Transportasi & Bensin", "Kebutuhan Rumah & WiFi", "Hiburan & Self Reward", "Kesehatan & Obat", "Lain-lain"];
    let databaseRiwayatRaw = [];

    // --- FUNGSI UTAMA ---
    window.updateKategoriOptions = () => {
      const jenis = document.getElementById('jenis').value;
      const opsi = { "Pengeluaran": daftarKategoriPengeluaran, "Pemasukan": ["Gaji Utama", "Work Sampingan", "Investasi", "Hadiah"] };
      document.getElementById('kategori').innerHTML = opsi[jenis].map(k => `<option value="${k}">${k}</option>`).join('');
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');

    window.handleForm = (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true;
      const data = { tanggal: document.getElementById('tanggal').value, jenis: document.getElementById('jenis').value, kategori: document.getElementById('kategori').value, nominal: document.getElementById('nominal').value.replace(/\./g, ''), keterangan: document.getElementById('keterangan').value };
      
      fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
      .then(() => { Swal.fire('Berhasil', 'Transaksi tercatat', 'success'); btn.disabled = false; document.getElementById('formKeuangan').reset(); window.loadSummary(); })
      .catch(() => { Swal.fire('Error', 'Gagal kirim data', 'error'); btn.disabled = false; });
    };

    window.loadSummary = () => {
      const s = document.createElement('script');
      s.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(s);
    };

    window.handleGoogleData = (res) => {
      if(!res) return;
      document.getElementById('txtSaldo').innerText = res.saldo;
      document.getElementById('txtMasuk').innerText = res.pemasukan;
      document.getElementById('txtKeluar').innerText = res.pengeluaran;
      databaseRiwayatRaw = res.riwayat || [];
      window.renderDashboardRiwayat();
      window.buatOpsiFilterBulanModal();
    };

    window.renderDashboardRiwayat = () => {
      const container = document.getElementById('listRiwayat');
      container.innerHTML = databaseRiwayatRaw.slice(0, 3).map(i => `
        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
          <div><p class="font-bold text-sm">${i.keterangan}</p><p class="text-[10px] text-slate-400">${i.kategori}</p></div>
          <p class="font-bold text-sm ${i.jenis === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">Rp ${parseInt(i.nominal).toLocaleString()}</p>
        </div>
      `).join('');
    };

    window.bukaPilihanPeriode = function() {
      const select = document.getElementById('filterBulanModal');
      const opsi = {};
      for(let i=0; i<select.options.length; i++) opsi[select.options[i].value] = select.options[i].text;
      
      Swal.fire({
        title: 'Pilih Periode',
        input: 'select',
        inputOptions: opsi,
        inputValue: select.value,
        confirmButtonText: 'Terapkan',
        customClass: { popup: 'rounded-[2rem]' }
      }).then((r) => {
        if (r.isConfirmed) {
          select.value = r.value;
          document.getElementById('labelPeriodeTerpilih').innerText = opsi[r.value];
          window.renderListModalSesuaiBulan();
        }
      });
    };

    window.buatOpsiFilterBulanModal = function() {
      const select = document.getElementById('filterBulanModal');
      const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const keys = [...new Set(databaseRiwayatRaw.map(i => i.tanggal.substring(0, 7)))];
      
      let html = '<option value="ALL">Tampilkan Semua</option>';
      keys.sort().reverse().forEach(k => {
        const p = k.split('-');
        html += `<option value="${k}">${bulan[parseInt(p[1])-1]} ${p[0]}</option>`;
      });
      select.innerHTML = html;
    };

    window.renderListModalSesuaiBulan = function() {
      const container = document.getElementById('listRiwayatPenuhModal');
      const filter = document.getElementById('filterBulanModal').value;
      const dataFilter = filter === 'ALL' ? databaseRiwayatRaw : databaseRiwayatRaw.filter(i => i.tanggal.startsWith(filter));
      
      container.innerHTML = dataFilter.map(item => `
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 flex justify-between items-center">
            <div><p class="font-bold text-slate-800 text-sm">${item.keterangan}</p><p class="text-[10px] text-slate-400">${item.kategori}</p></div>
            <p class="font-bold text-sm ${item.jenis === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">Rp ${parseInt(item.nominal).toLocaleString()}</p>
        </div>
      `).join('');
      document.getElementById('txtTotalDataModal').innerText = dataFilter.length + " Transaksi";
    };

    window.tukarHalaman = (m) => {
      document.getElementById('pageHome').classList.toggle('hidden', m !== 'home');
      document.getElementById('pageRiwayat').classList.toggle('hidden', m !== 'riwayat');
    };

    window.bukaModalDetailSemua = () => { document.getElementById('modalDetailTransaksi').classList.remove('hidden'); setTimeout(() => document.getElementById('modalDetailTransaksi').classList.remove('opacity-0'), 10); };
    window.tutupModalDetailSemua = () => { document.getElementById('modalDetailTransaksi').classList.add('opacity-0'); setTimeout(() => document.getElementById('modalDetailTransaksi').classList.add('hidden'), 300); };
    window.tombolReloadPintar = () => window.loadSummary();
    
    // Inisialisasi
    window.updateKategoriOptions();
  </script>
</body>
</html>
