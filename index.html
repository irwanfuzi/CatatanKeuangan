<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* DESKTOP BACKGROUND BACKDROP ENGINE */
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #f1f5f9; 
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body::-webkit-scrollbar {
      display: none;
    }
    
    /* ANTI-BOX TAP INJECTION */
    button, a, input, select {
      -webkit-tap-highlight-color: transparent !important;
      outline: none !important;
    }
    
    .swal2-container {
      z-index: 999999 !important;
    }

    /* ENGINE NAVBAR ABSOLUTE OVERLAY (FIXED: Dipasang absolute layer agar 100% anti-hilang & presisi di HP/Desktop mockup) */
    #mainFixedNavbar {
      position: absolute !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      height: calc(62px + env(safe-area-inset-bottom)) !important;
      padding-bottom: env(safe-area-inset-bottom) !important;
      display: flex !important;
      z-index: 9999 !important;
      background-color: rgba(255, 255, 255, 0.85) !important;
    }
    body.dark #mainFixedNavbar {
      background-color: rgba(15, 23, 42, 0.85) !important;
    }
    
    /* BOTTOM SHEET CONFIGURATION - RESPONSIVE FOR LAPTOP */
    .premium-bottom-sheet {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      margin: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 2.5rem 2.5rem 0 0 !important;
      padding: 1.75rem 1.75rem calc(1.75rem + env(safe-area-inset-bottom)) 1.75rem !important;
      box-shadow: 0 -15px 30px -5px rgba(51, 65, 85, 0.15) !important;
      background: #ffffff;
    }
    
    @media (min-width: 768px) {
      .premium-bottom-sheet {
        position: fixed !important;
        bottom: 0 !important;
        left: 50% !important;
        right: auto !important;
        margin: 0 auto !important;
        width: 100% !important;
        max-width: 448px !important; 
        transform: translateX(-50%) !important;
        border-radius: 2.5rem 2.5rem 0 0 !important;
      }
    }
    
    /* ENGINE STANDARDIZATION ANTI-SCROLLBAR LAPTOP */
    .hide-scrollbar::-webkit-scrollbar {
      display: none !important;
    }
    .hide-scrollbar {
      -ms-overflow-style: none !important;
      scrollbar-width: none !important;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    
    .tombol-kontrol-stabil {
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform, background-color;
    }
    
    /* CONFIG ENGINE RE-DESIGN KALENDER FLATPICKR (LIGHT MODE) */
    .flatpickr-calendar {
      font-family: 'Urbanist', sans-serif !important;
      border-radius: 1.75rem !important;
      box-shadow: 0 15px 35px -5px rgba(51, 65, 85, 0.15) !important;
      border: 1px solid #f1f5f9 !important;
      padding: 14px !important;
      width: 336px !important;
      box-sizing: border-box !important;
      background: #ffffff !important;
    }
    
    .flatpickr-current-month {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 6px !important;
      width: 100% !important;
      left: 0 !important;
      padding: 0 !important;
    }
    .flatpickr-current-month .flatpickr-monthDropdown-months,
    .flatpickr-current-month .numInputWrapper,
    .flatpickr-current-month .cur-month {
      display: none !important;
    }

    .btn-pemicu-bulan, .btn-pemicu-tahun {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-pemicu-bulan:active, .btn-pemicu-tahun:active {
      scale: 0.95;
    }

    /* ENGINE MODE GELAP PREMIUM */
    body.dark {
      background-color: #060913; 
    }
    body.dark #appCanvasWrapper {
      background-color: #0b0f19 !important;
      border-color: #1e293b !important;
    }
    body.dark #pageHome,
    body.dark #pageRiwayat > div,
    body.dark #modalDetailTransaksi > div,
    body.dark #modalDetailTransaksi .bg-white,
    body.dark #listRiwayatPenuhModal > div {
      background: linear-gradient(145deg, #131b2e, #111827) !important;
      border-color: #1e293b !important;
      box-shadow: 0 12px 35px -12px rgba(0, 0, 0, 0.6) !important;
    }
    body.dark h3,
    body.dark h4,
    body.dark #chartCenterTotal,
    body.dark #txtTotalDataModal {
      color: #f8fafc !important;
    }
    body.dark .text-slate-800 { color: #e2e8f0 !important; }
    body.dark .text-slate-700 { color: #cbd5e1 !important; }
    body.dark .text-slate-600 { color: #94a3b8 !important; }
    
    body.dark input,
    body.dark #btnTriggerKategori,
    body.dark #btnTriggerFilter,
    body.dark #modalDetailTransaksi .bg-slate-50\/60,
    body.dark #noChartData,
    body.dark #loadingRiwayat {
      background-color: #1a2336 !important;
      border-color: #24324d !important;
      color: #f8fafc !important;
    }

    body.dark input:focus {
      background-color: #1a2336 !important;
      color: #f8fafc !important;
    }
    
    body.dark input:-webkit-autofill,
    body.dark input:-webkit-autofill:hover, 
    body.dark input:-webkit-autofill:focus {
      -webkit-text-fill-color: #f8fafc !important;
      -webkit-box-shadow: 0 0 0px 1000px #1a2336 inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }
    
    body.dark .bg-white { background: #131b2e !important; }
    
    body.dark #btnSimpan {
      background-color: #059669 !important;
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3) !important; 
      color: #ffffff !important;
    }
    
    body.dark .btn-reset-data {
      background-color: rgba(244, 63, 94, 0.08) !important; 
      border-color: rgba(244, 63, 94, 0.2) !important;
      color: #fb7185 !important; 
    }
    
    body.dark .swal2-popup {
      background: #131b2e !important;
      border: 1px solid #1e293b !important;
      color: #f8fafc !important;
    }
    body.dark .swal2-title {
      color: #f8fafc !important;
    }
    body.dark .swal2-html-container {
      color: #cbd5e1 !important;
    }
    body.dark .premium-bottom-sheet {
      background: linear-gradient(180deg, #161f33, #0e1422) !important;
      border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
    }

    body.dark .flatpickr-calendar {
      background: #131b2e !important;
      border-color: #1e293b !important;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7) !important;
    }
    body.dark .flatpickr-months .flatpickr-month,
    body.dark .flatpickr-current-month {
      color: #f8fafc !important;
      fill: #f8fafc !important;
    }
    body.dark .flatpickr-current-month .numInputWrapper span.arrowUp:after { border-bottom-color: #f8fafc; }
    body.dark .flatpickr-current-month .numInputWrapper span.arrowDown:after { border-top-color: #f8fafc; }
    body.dark .flatpickr-weekdays,
    body.dark span.flatpickr-weekday {
      background: transparent !important;
      color: #94a3b8 !important;
      font-weight: 700;
    }
    body.dark .flatpickr-day {
      color: #cbd5e1 !important;
    }
    body.dark .flatpickr-day.prevMonthDay,
    body.dark .flatpickr-day.nextMonthDay {
      color: #334155 !important;
    }
    body.dark .flatpickr-day:hover,
    body.dark .flatpickr-day.prevMonthDay:hover,
    body.dark .flatpickr-day.nextMonthDay:hover,
    body.dark .flatpickr-day.today:hover {
      background: #1e293b !important;
      color: #f8fafc !important;
      border-color: #1e293b !important;
    }
    body.dark .flatpickr-day.today {
      border-color: #10b981 !important;
      color: #10b981 !important;
    }
    body.dark .flatpickr-day.selected,
    body.dark .flatpickr-day.selected:hover {
      background: #059669 !important;
      border-color: #059669 !important;
      color: white !important;
    }
    body.dark .btn-pemicu-bulan, body.dark .btn-pemicu-tahun {
      background: #1a2336 !important;
      border-color: #24324d !important;
      color: #f8fafc !important;
    }
    body.dark .flatpickr-months .flatpickr-prev-month, 
    body.dark .flatpickr-months .flatpickr-next-month {
      color: #f8fafc !important;
      fill: #f8fafc !important;
    }
  </style>
</head>

<body class="w-full min-h-screen md:py-6 flex flex-col justify-start items-center">

  <div id="appCanvasWrapper" class="w-full md:max-w-md h-[100dvh] md:h-[92vh] md:max-h-[92vh] md:rounded-[2.75rem] bg-[#f8fafc] flex flex-col relative shadow-[0_25px_60px_-15px_rgba(51,65,85,0.18)] overflow-hidden md:border md:border-slate-200/60 transition-all duration-300">

    <div class="w-full flex-1 overflow-y-auto hide-scrollbar">
      
      <div class="w-full bg-gradient-to-b from-emerald-600 to-emerald-700 p-6 text-white rounded-b-[2.75rem] shadow-xl shadow-emerald-900/10 flex flex-col relative overflow-hidden flex-shrink-0">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-white/5 rounded-full blur-xl pointer-events-none"></div>
        <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-emerald-500/20 rounded-full blur-2xl pointer-events-none"></div>
        
        <div class="absolute right-6 top-5 flex items-center gap-2 z-[99]">
          <button onclick="window.bukaBottomSheetBahasa()" class="tombol-kontrol-stabil px-3 h-9 bg-emerald-800/60 dark:bg-slate-900/80 border border-white/20 rounded-xl flex items-center justify-center text-white active:scale-95 transition-all focus:outline-none font-bold text-xs gap-1.5">
            <i class="fa-solid fa-globe text-white/80"></i>
            <span id="txtLangLabel" class="text-white uppercase">ID</span>
            <i class="fa-solid fa-chevron-down text-[9px] opacity-60"></i>
          </button>
          <button onclick="window.toggleDarkMode()" class="tombol-kontrol-stabil w-9 h-9 bg-emerald-800/60 dark:bg-slate-900/80 border border-white/20 rounded-xl flex items-center justify-center text-white active:scale-95 transition-all focus:outline-none">
            <i id="iconDarkMode" class="fa-solid fa-sun text-white"></i>
          </button>
        </div>

        <h1 class="text-sm font-semibold opacity-75 tracking-wide" data-i18n="halo">Halo, Pengguna!</h1>
        <p class="text-xs opacity-60 mt-2 mb-0.5 font-medium tracking-wide uppercase" data-i18n="totalSaldo">Total Saldo Kamu</p>
        <h2 id="txtSaldo" class="text-3xl font-bold tracking-tight mb-6">Rp 0</h2>

        <div class="grid grid-cols-2 gap-4 relative z-10">
          <div class="bg-white/10 p-3.5 rounded-2xl border border-white/10 shadow-inner flex flex-col">
            <span class="text-[11px] font-bold opacity-75 uppercase tracking-wider mb-1 flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-emerald-400"></span><span data-i18n="pemasukan">Pemasukan</span>
            </span>
            <p id="txtMasuk" class="font-bold text-base tracking-wide">Rp 0</p>
          </div>
          <div class="bg-white/10 p-3.5 rounded-2xl border border-white/10 shadow-inner flex flex-col">
            <span class="text-[11px] font-bold opacity-75 uppercase tracking-wider mb-1 flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full bg-rose-400"></span><span data-i18n="pengeluaran">Pengeluaran</span>
            </span>
            <p id="txtKeluar" class="font-bold text-base tracking-wide">Rp 0</p>
          </div>
        </div>
      </div>

      <div class="w-full px-4 mt-6 pb-2" id="mainContainer">
        
        <div id="pageHome" class="w-full bg-white p-6 rounded-[2.25rem] shadow-sm border border-slate-100 mb-6">
          <div class="flex items-center gap-2 mb-6">
            <div class="w-1.5 h-6 bg-emerald-600 rounded-full"></div>
            <h3 class="text-lg font-bold text-slate-800 tracking-tight" data-i18n="tambahTrans">Tambah Transaksi</h3>
          </div>

          <form id="formKeuangan" onsubmit="window.handleForm(event)">
            <div class="mb-5">
              <label class="block text-[10px] font-bold text-slate-400 mb-2 tracking-wider uppercase" data-i18n="tglTrans">Tanggal Transaksi</label>
              <div class="relative">
                <input type="hidden" id="tanggal_mentntah" value="">
                <input type="text" id="tanggal" placeholder="Pilih Tanggal Transaksi" readonly class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 font-bold text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:bg-white dark:focus:bg-[#1a2336] outline-none transition-all pl-11 cursor-pointer" required>
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm">
                  <i class="fa-regular fa-calendar-days"></i>
                </div>
              </div>
            </div>

            <div class="mb-5">
              <label class="block text-[10px] font-bold text-slate-400 mb-2 tracking-wider uppercase" data-i18n="jenisAliran">Jenis Aliran Dana</label>
              <div class="w-full p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl grid grid-cols-2 gap-1">
                <input type="hidden" id="jenis" value="Pengeluaran">
                <button type="button" id="btnTabPengeluaran" onclick="window.pilihJenisTab('Pengeluaran')" class="w-full py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-1.5 bg-white text-rose-600 shadow-sm dark:bg-[#0b0f19] dark:text-rose-400" data-i18n="tabKeluar">
                  💸 Pengeluaran
                </button>
                <button type="button" id="btnTabPemasukan" onclick="window.pilihJenisTab('Pemasukan')" class="w-full py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-1.5 text-slate-500 hover:text-slate-700 dark:text-slate-400" data-i18n="tabMasuk">
                  💰 Pemasukan
                </button>
              </div>
            </div>

            <div class="mb-5">
              <label class="block text-[10px] font-bold text-slate-400 mb-2 tracking-wider uppercase" data-i18n="posKategori">Pos Kategori</label>
              <div class="relative">
                <input type="hidden" id="kategori" value="">
                <button type="button" id="btnTriggerKategori" onclick="window.bukaBottomSheetPilihanKategori()" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 font-bold text-sm text-slate-700 dark:text-slate-200 text-left flex justify-between items-center outline-none focus:bg-white dark:focus:bg-[#1a2336] transition-all pl-11 pr-4">
                  <span id="txtKategoriTerpilihLabel" data-i18n="pilihKategori">Pilih Kategori</span>
                  <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                </button>
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm">
                  <i class="fa-solid fa-tags"></i>
                </div>
              </div>
            </div>

            <div class="mb-5">
              <label class="block text-[10px] font-bold text-slate-400 mb-2 tracking-wider uppercase" data-i18n="nominalTrans">Nominal Transaksi (Rp)</label>
              <div class="relative">
                <input type="text" id="nominal" placeholder="0" oninput="window.formatInputRupiah(this)" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 font-bold text-lg text-slate-800 dark:text-slate-200 placeholder-slate-300 focus:bg-white dark:focus:bg-[#1a2336] outline-none transition-all pl-12" required>
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm pointer-events-none">
                  Rp
                </div>
              </div>
            </div>

            <div class="mb-6">
              <label class="block text-[10px] font-bold text-slate-400 mb-2 tracking-wider uppercase" data-i18n="ketNota">Keterangan / Nota</label>
              <div class="relative">
                <input type="text" id="keterangan" placeholder="Contoh: Jajan makan siang" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 font-semibold text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:bg-white dark:focus:bg-[#1a2336] outline-none transition-all pl-11" required>
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm">
                  <i class="fa-regular fa-pen-to-square"></i>
                </div>
              </div>
            </div>

            <div class="flex gap-3 w-full">
              <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-md shadow-emerald-600/10 hover:bg-emerald-700 hover:shadow-emerald-600/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm tracking-wide">
                <i class="fa-solid fa-paper-plane"></i> <span data-i18n="simpanTrans">Simpan Transaksi</span>
              </button>
              
              <button type="button" onclick="window.tombolReloadPintar()" class="bg-white text-slate-500 font-bold px-5 rounded-2xl border border-slate-200/80 shadow-sm hover:bg-slate-50 transition-all active:scale-95 flex items-center justify-center">
                <i id="iconReload" class="fa-solid fa-rotate text-base"></i>
              </button>
            </div>
          </form>

          <button type="button" onclick="window.resetSemuaData()" class="btn-reset-data w-full mt-4 bg-red-50/60 hover:bg-red-100/70 text-red-600 font-bold p-3.5 rounded-2xl border border-red-100/40 active:scale-95 transition-all flex items-center justify-center gap-2 text-xs uppercase tracking-wider">
            <i class="fa-solid fa-trash-can"></i> <span data-i18n="resetData">Reset Semua Data</span>
          </button>
        </div>

        <div id="pageRiwayat" class="w-full flex flex-col gap-6 mb-6 hidden">
          
          <div class="w-full bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100/80">
            <div class="flex items-center justify-between mb-4 px-1">
              <h3 class="text-[15px] font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-rose-500 rounded-full"></span><span data-i18n="analisisTitle">Analisis Pengeluaran</span>
              </h3>
              <button onclick="window.bukaPilihanPeriodeHalamanUtama()" class="px-3 py-1.5 bg-slate-50 dark:bg-slate-800/80 border border-slate-200/60 dark:border-slate-700 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300 flex items-center gap-1.5 active:scale-95 transition-all">
                <span id="labelPeriodeUtama">Bulan Ini</span>
                <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
              </button>
              <select id="filterBulanUtamaHidden" onchange="window.prosesFilterKategoriBulanUtama()" class="hidden"></select>
            </div>
            
            <div class="w-full flex flex-row items-center justify-between gap-1 py-1">
              <div class="relative w-[125px] h-[125px] flex-shrink-0 flex items-center justify-center">
                <canvas id="chartPengeluaran"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pt-1">
                  <span class="text-[10px] font-bold text-slate-400 tracking-wider uppercase" data-i18n="total">Total</span>
                  <span id="chartCenterTotal" class="text-[14px] font-bold text-slate-800 text-center truncate max-w-[95px]">Rp 0</span>
                </div>
              </div>
              <div id="customLegendContainer" class="w-[62%] flex flex-col gap-1.5 max-h-[125px] overflow-y-auto pl-4 hide-scrollbar">
              </div>
            </div>
            <div id="noChartData" class="text-center text-xs text-slate-400 font-medium py-6 bg-slate-50 rounded-2xl border border-dashed border-slate-200 mt-1 hidden" data-i18n="noChartData">Tidak ada pengeluaran periode ini</div>
          </div>

          <div class="w-full bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100/80">
            <div class="flex items-center justify-between mb-4 px-1">
              <h3 class="text-[15px] font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span><span data-i18n="trenTitle">Tren Keuangan Bulanan</span>
              </h3>
            </div>
            <div class="w-full h-[185px]">
              <canvas id="chartTrenBulanan"></canvas>

    function parseKeTanggalObj(tglString) {
      if (!tglString) return new Date();
      let d = new Date(tglString);
      if (!isNaN(d.getTime())) return d;

      let urutanStr = tglString.toString().trim();
      let parts = urutanStr.split(/[-/ ]+/);
      
      if (parts.length >= 3) {
        if (parts[0].length === 4) { 
          let year = parseInt(parts[0]), month = parseInt(parts[1]) - 1, day = parseInt(parts[2]);
          let t = new Date(year, month, day);
          if (!isNaN(t.getTime())) return t;
        }
        if (parts[2].length === 4) { 
          let day = parseInt(parts[0]), month = parseInt(parts[1]) - 1, year = parseInt(parts[2]);
          if (isNaN(month)) {
            const mStr = parts[1].toLowerCase();
            if (mStr.includes("jan")) month = 0;
            else if (mStr.includes("feb")) month = 1;
            else if (mStr.includes("mar")) month = 2;
            else if (mStr.includes("apr")) month = 3;
            else if (mStr.includes("mei") || mStr.includes("may")) month = 4;
            else if (mStr.includes("jun")) month = 5;
            else if (mStr.includes("jul")) month = 6;
            else if (mStr.includes("agu") || mStr.includes("aug")) month = 7;
            else if (mStr.includes("sep")) month = 8;
            else if (mStr.includes("okt") || mStr.includes("oct")) month = 9;
            else if (mStr.includes("nov")) month = 10;
            else if (mStr.includes("des") || mStr.includes("dec")) month = 11;
          }
          let t = new Date(year, month, day);
          if (!isNaN(t.getTime())) return t;
        }
      }
      return new Date(); 
    }

    function dapatkanIndeksKategori(kategoriRaw, jenisStr) {
      if(!kategoriRaw) return -1;
      const jns = jenisStr ? jenisStr.toString().trim().toLowerCase() : "";
      const listKey = (jns === "pemasukan" || jns === "income") ? "pemasukan" : "pengeluaran";
      const cleanText = (t) => t.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim().toLowerCase();
      const txt = cleanText(kategoriRaw);
      
      let idx = kategoriTranslations.id[listKey].findIndex(k => cleanText(k) === txt || txt.includes(cleanText(k)) || cleanText(k).includes(txt));
      if (idx !== -1) return idx;
      
      idx = kategoriTranslations.en[listKey].findIndex(k => cleanText(k) === txt || txt.includes(cleanText(k)) || cleanText(k).includes(txt));
      return idx;
    }

    function formatTanggalIndo(tglString) {
      if(!tglString) return "-";
      const formatKunciLocale = currentLang === 'id' ? 'id-ID' : 'en-US';
      const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
      const tanggalObj = parseKeTanggalObj(tglString);
      
      const hariIni = new Date();
      const kemarin = new Date();
      kemarin.setDate(hariIni.getDate() - 1);
      
      if(tanggalObj.toDateString() === hariIni.toDateString()) return currentLang === 'id' ? "Hari Ini" : "Today";
      if(tanggalObj.toDateString() === kemarin.toDateString()) return currentLang === 'id' ? "Kemarin" : "Yesterday";
      
      return tanggalObj.toLocaleDateString(formatKunciLocale, opsi);
    }

    function formatTanggalFormal(tglString) {
      if(!tglString) return "-";
      const formatKunciLocale = currentLang === 'id' ? 'id-ID' : 'en-US';
      const tanggalObj = parseKeTanggalObj(tglString);
      if (isNaN(tanggalObj.getTime())) return "-";
      return tanggalObj.toLocaleDateString(formatKunciLocale, { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function sinkronisasiNilaiTanggalMentah(dateObj) {
      if (dateObj instanceof Date && !isNaN(dateObj.getTime())) {
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        document.getElementById('tanggal_mentntah').value = `${yyyy}-${mm}-${dd}`;
      } else {
        const hariIni = new Date();
        const yyyy = hariIni.getFullYear();
        const mm = String(hariIni.getMonth() + 1).padStart(2, '0');
        const dd = String(hariIni.getDate()).padStart(2, '0');
        document.getElementById('tanggal_mentntah').value = `${yyyy}-${mm}-${dd}`;
      }
    }

      if (pemicuLamaBulan) pemicuLamaBulan.remove();
      const pemicuLamaTahun = containerHeader.querySelector('.btn-pemicu-tahun');

      btnBulan.innerHTML = `<span>${labelBulanAktis}</span> <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i>`;

    window.aplikasikanDataKeUI = function(res, biarkanAnimasi = true) {
      document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
      document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
      document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
      
      databaseRiwayatRaw = res.riwayat || [];
      trenBulananRawGlobal = res.trenBulananRaw || {}; 
      window.buatOpsiFilterBulanModal();
      
      const hariIni = new Date();
      const formatKunciBulanIni = hariIni.getFullYear() + "-" + String(hariIni.getMonth() + 1).padStart(2, '0');
      const selectUtama = document.getElementById('filterBulanUtamaHidden');
      
      if (selectUtama) {
        const adaBulanIni = Array.from(selectUtama.options).some(o => o.value === formatKunciBulanIni);
        if (adaBulanIni) {
          selectUtama.value = formatKunciBulanIni;
          const opsiDitemukan = Array.from(selectUtama.options).find(o => o.value === formatKunciBulanIni).text;
          document.getElementById('labelPeriodeUtama').innerText = opsiDitemukan;
        } else {
          selectUtama.value = selectUtama.options[0] ? selectUtama.options[0].value : "ALL";
          document.getElementById('labelPeriodeUtama').innerText = selectUtama.options[0] ? selectUtama.options[0].text : translations[currentLang].semuaPeriode;
        }
      }
      
      window.renderHalamanRiwayatUtama();
      window.prosesFilterKategoriBulanUtama(biarkanAnimasi);
      window.renderGrafikTrenBulanan(trenBulananRawGlobal, biarkanAnimasi);
      
      const currentTab = localStorage.getItem('active_tab') || 'home';
      const cardTransaksi = document.getElementById('cardTransaksiTerakhir');
      if (cardTransaksi) {
        if (currentTab === 'riwayat' && databaseRiwayatRaw.length > 0) {
          cardTransaksi.classList.remove('hidden');
        } else {
          cardTransaksi.classList.add('hidden');
        }
      }
    };

      const script = document.createElement('script');

      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);

    window.prosesFilterKategoriBulanUtama = function(biarkanAnimasi = true) {
      const bulanTerpilih = document.getElementById('filterBulanUtamaHidden').value;
      const dataKategoriGrafik = {};
      const opsiKategoriSekarang = kategoriTranslations[currentLang].pengeluaran;
      
      opsiKategoriSekarang.forEach(kat => dataKategoriGrafik[kat] = 0);

      let dataHasilFilter = databaseRiwayatRaw || [];
      if (bulanTerpilih !== "ALL") {
        dataHasilFilter = databaseRiwayatRaw.filter(item => item.tanggal && item.tanggal.toString().startsWith(bulanTerpilih));
      }

      dataHasilFilter.forEach(item => {
        const itemJenisClean = item.jenis ? item.jenis.toString().trim().toLowerCase() : "";
        if (itemJenisClean !== "pemasukan" && itemJenisClean !== "income") {
          const idx = dapatkanIndeksKategori(item.kategori, "Pengeluaran");
          if (idx !== -1 && idx < opsiKategoriSekarang.length) {
            const katTargetTerjemahan = opsiKategoriSekarang[idx];
            dataKategoriGrafik[katTargetTerjemahan] = (dataKategoriGrafik[katTargetTerjemahan] || 0) + parseInt(item.nominal || 0);
          } else {
            const katDefaultLainnya = opsiKategoriSekarang[opsiKategoriSekarang.length - 1];
            dataKategoriGrafik[katDefaultLainnya] = (dataKategoriGrafik[katDefaultLainnya] || 0) + parseInt(item.nominal || 0);
          }
        }
      });

      window.renderGrafik(dataKategoriGrafik, biarkanAnimasi);
    };

    window.renderGrafik = function(dataKategori, biarkanAnimasi = true) {
      const canvasCtx = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const textCenterTotal = document.getElementById('chartCenterTotal');
      const noDataMsg = document.getElementById('noChartData');
      if (!canvasCtx || !legendContainer) return;
      
      legendContainer.innerHTML = "";
      const labels = Object.keys(dataKategori), values = Object.values(dataKategori);
      const total = values.reduce((a, b) => a + b, 0);
      textCenterTotal.innerText = "Rp " + total.toLocaleString('id-ID');

      if (total === 0) { 
        canvasCtx.parentNode.style.display = 'none'; 
        noDataMsg.classList.remove('hidden'); 
        return; 
      }
      
      canvasCtx.parentNode.style.display = 'flex'; 
      noDataMsg.classList.add('hidden');
      if (myChartInstance !== null) myChartInstance.destroy();

      const labelsAktif = labels.filter((_, idx) => values[idx] > 0);
      const valuesAktif = values.filter(v => v > 0);
      const warnaTerpakai = labelsAktif.map((_, idx) => daftarWarna[idx % daftarWarna.length]);

      labelsAktif.forEach((kat, i) => {
          const persen = ((valuesAktif[i] / total) * 100).toFixed(1);
          legendContainer.insertAdjacentHTML('beforeend', `
            <div class="flex items-center justify-between w-full py-1 font-semibold">
              <div class="flex items-center gap-1.5 min-w-[45%]">
                <span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color:${warnaTerpakai[i]}"></span>
                <span class="text-slate-600 font-bold tracking-tight dark:text-slate-300 truncate text-[13px]">${kat}</span>
              </div>
              <div class="flex items-center gap-1.5 flex-shrink-0 ml-1 text-right">
                <span class="text-slate-800 dark:text-slate-200 font-bold text-[13px]">${persen}%</span>
                <span class="text-[12px] text-slate-400 dark:text-slate-500 font-semibold">(${Math.round(valuesAktif[i]/1000)}k)</span>
              </div>
            </div>`);
      });

      myChartInstance = new Chart(canvasCtx, {
        type: 'doughnut',
        data: { labels: labelsAktif, datasets: [{ data: valuesAktif, backgroundColor: warnaTerpakai, borderWidth: 2, borderColor: document.body.classList.contains('dark') ? '#131b2e' : '#ffffff' }] },
        options: {
          cutout: '75%', responsive: true, maintainAspectRatio: false,
          animation: biarkanAnimasi ? { duration: 800, animateRotate: true, animateScale: false } : false,
          plugins: {
            legend: { display: false },

        let akumulasiKeluar = 0;
        data.forEach(item => {
          const nominalInt = parseInt(item.nominal) || 0;
          const itemJenisClean = item.jenis ? item.jenis.toString().trim().toLowerCase() : "";
          if (itemJenisClean === "pemasukan" || itemJenisClean === "income") akumulasiMasuk += nominalInt;
          else akumulasiKeluar += nominalInt;
        });
        const netSaldoBersih = akumulasiMasuk - akumulasiKeluar;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(20);
        doc.setTextColor(5, 150, 105); 
        doc.text(translations[currentLang].pdfJudul, 14, 20);
        
        doc.setFont("Helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(100, 116, 139); 
        doc.text(`${translations[currentLang].pdfPeriode}: ${periodeText}`, 14, 27);
        doc.text(`${translations[currentLang].pdfTglCetak}: ${new Date().toLocaleDateString(currentLang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' })}`, 14, 32);
        
        doc.setDrawColor(241, 245, 249);
        doc.setLineWidth(0.4);
        doc.line(14, 37, 196, 37);

        doc.setFillColor(248, 250, 252); 
        doc.roundedRect(14, 42, 56, 20, 3, 3, "F");
        doc.roundedRect(75, 42, 56, 20, 3, 3, "F");
        doc.roundedRect(136, 42, 60, 20, 3, 3, "F");

        doc.setFontSize(8);
        doc.setFont("Helvetica", "bold");
        doc.setTextColor(148, 163, 184); 
        doc.text(currentLang === 'id' ? "TOTAL PEMASUKAN" : "TOTAL INCOME", 18, 47);
        doc.text(currentLang === 'id' ? "TOTAL PENGELUARAN" : "TOTAL EXPENSE", 79, 47);
        doc.text(currentLang === 'id' ? "SALDO BERSIH" : "NET BALANCE", 140, 47);

        doc.setFontSize(11);
        doc.setTextColor(16, 185, 129); 
        doc.text("Rp " + akumulasiMasuk.toLocaleString('id-ID'), 18, 55);
        doc.setTextColor(244, 63, 94); 
        doc.text("Rp " + akumulasiKeluar.toLocaleString('id-ID'), 79, 55);
        
        if (netSaldoBersih >= 0) {
          doc.setTextColor(30, 41, 59);
        } else {
          doc.setTextColor(244, 63, 94);
        }
        doc.text("Rp " + netSaldoBersih.toLocaleString('id-ID'), 140, 55);

        const barisTabel = data.map((item, indeks) => {
          const itemJenisClean = item.jenis ? item.jenis.toString().trim().toLowerCase() : "";
          const isMasuk = itemJenisClean === "pemasukan" || itemJenisClean === "income";
          const nominalFormat = (isMasuk ? "+ " : "- ") + "Rp " + parseInt(item.nominal).toLocaleString('id-ID');
          const txtJenisFixed = currentLang === 'id' ? item.jenis : (isMasuk ? 'Income' : 'Expense');
          
          const idxKat = dapatkanIndeksKategori(item.kategori, item.jenis);
          const listKey = isMasuk ? "pemasukan" : "pengeluaran";
          const katTerjemahan = (idxKat !== -1) ? kategoriTranslations[currentLang][listKey][idxKat] : item.kategori;

          return [
            indeks + 1,
            formatTanggalFormal(item.tanggal),
            item.keterangan || "-",
            bersihkanIkonEmoji(katTerjemahan), 
            txtJenisFixed,
            nominalFormat
          ];
        });

        doc.autoTable({
          startY: 68,
          head: [[
            translations[currentLang].pdfTbodyNo, 
            translations[currentLang].pdfTbodyTgl, 
            translations[currentLang].pdfTbodyKet, 
            translations[currentLang].pdfTbodyKat, 
            translations[currentLang].pdfTbodyJenis, 
            translations[currentLang].pdfTbodyNom
          ]],
          body: barisTabel,
          theme: 'grid',
          headStyles: { fillColor: [5, 150, 105], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9.5, cellPadding: 3.5 },
          bodyStyles: { fontSize: 8.5, textColor: [51, 65, 85], cellPadding: 3 },
          alternateRowStyles: { fillColor: [250, 250, 250] },
          styles: { font: 'Helvetica', lineColor: [241, 245, 249], lineWidth: 0.3 },
          columnStyles: {
            0: { cellWidth: 12, halign: 'center', styles: { cellPadding: 2 } },
            1: { cellWidth: 32 },
            3: { cellWidth: 28 },
            4: { cellWidth: 25, fontStyle: 'bold', halign: 'center' },
            5: { cellWidth: 35, halign: 'right', fontStyle: 'bold' }
          },
          didParseCell: function(cellData) {
            if (cellData.section === 'body') {
              if (cellData.column.index === 4) {
                if (cellData.cell.raw === "Pemasukan" || cellData.cell.raw === "Income") cellData.cell.styles.textColor = [5, 150, 105];
                else cellData.cell.styles.textColor = [244, 63, 94];
              }
              if (cellData.column.index === 5) {
                if (cellData.cell.raw && typeof cellData.cell.raw === 'string' && cellData.cell.raw.startsWith("+")) {
                  cellData.cell.styles.textColor = [5, 150, 105]; 
                } else {
                  cellData.cell.styles.textColor = [30, 41, 59]; 
                }
              }
            }
          },
          didDrawPage: function(dataPage) {
            doc.setFontSize(8);
            doc.setFont("Helvetica", "normal");
            doc.setTextColor(148, 163, 184);
            doc.text(`Page ${dataPage.pageNumber}`, dataPage.settings.margin.left, doc.internal.pageSize.height - 10);
          }
        });

        Swal.close();
        doc.save(`Financial_Report_${periodeText.replace(/ /g, "_")}.pdf`);
      } catch (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'Export Failed', text: error.message });
        console.error(error);
      }
    };

    window.unduhExcel = function() {
      try {
        const { data, periodeText } = dapatkanDataTerfilterModal();

        if (data.length === 0) {
          Swal.fire({ icon: 'warning', title: 'Error', text: 'No data transactions to export.', confirmButtonColor: '#10b981' });
          return;
        }

        Swal.fire({ title: currentLang === 'id' ? 'Membangun Excel Premium...' : 'Building Premium Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let sumMasuk = 0;
        let sumKeluar = 0;
        data.forEach(item => {
          const nom = parseInt(item.nominal) || 0;
          const itemJenisClean = item.jenis ? item.jenis.toString().trim().toLowerCase() : "";
          if (itemJenisClean === "pemasukan" || itemJenisClean === "income") sumMasuk += nom;
          else sumKeluar += nom;
        });
        const sumSaldoBersih = sumMasuk - sumKeluar;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Dashboard Statement');

        worksheet.getCell('A1').value = translations[currentLang].pdfJudul;
        worksheet.getCell('A1').font = { name: 'Segoe UI', size: 16, bold: true, color: { argb: '047857' } };
        
        worksheet.getCell('A2').value = `${translations[currentLang].pdfPeriode}: ${periodeText}`;
        worksheet.getCell('A2').font = { name: 'Segoe UI', size: 10, color: { argb: '64748B' } };
        
        worksheet.getCell('A3').value = `${translations[currentLang].pdfTglCetak}: ${new Date().toLocaleDateString(currentLang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' })}`;
        worksheet.getCell('A3').font = { name: 'Segoe UI', size: 10, color: { argb: '64748B' } };

        worksheet.mergeCells('A5:C5');
        worksheet.getCell('A5').value = translations[currentLang].excelTitle;
        worksheet.getCell('A5').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'E2E8F0' } };
        worksheet.getCell('A5').font = { name: 'Segoe UI', size: 11, bold: true, color: { argb: '1E293B' } };
        worksheet.getCell('A5').border = {
          top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
          bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
        };

        const isiRingkasan = [
          { row: '6', text: translations[currentLang].excelIn, val: sumMasuk, color: '059669' },
          { row: '7', text: translations[currentLang].excelOut, val: sumKeluar, color: 'B91C1C' },
          { row: '8', text: translations[currentLang].excelNet, val: sumSaldoBersih, color: sumSaldoBersih >= 0 ? '059669' : 'B91C1C' }
        ];

        isiRingkasan.forEach(item => {
          worksheet.mergeCells(`A${item.row}:B${item.row}`);
          worksheet.getCell(`A${item.row}`).value = item.text;
          worksheet.getCell(`C${item.row}`).value = item.val;
          
          if(item.row === '8') worksheet.getCell(`A${item.row}`).font = { name: 'Segoe UI', bold: true };
          else worksheet.getCell(`A${item.row}`).font = { name: 'Segoe UI' };

          [`A${item.row}`, `B${item.row}`, `C${item.row}`].forEach(ref => {
            worksheet.getCell(ref).border = {
              top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
              bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
            };
          });

          const valCell = worksheet.getCell(`C${item.row}`);
          valCell.numFormat = '"Rp"#,##0';
          valCell.alignment = { horizontal: 'right' };
          valCell.font = { name: 'Segoe UI', bold: true, color: { argb: item.color } };
        });

        const headers = [
          translations[currentLang].pdfTbodyNo, 
          translations[currentLang].tglTrans, 
          translations[currentLang].ketNota, 
          translations[currentLang].posKategori, 
          currentLang === 'id' ? 'Jenis Aliran' : 'Flow Type', 
          currentLang === 'id' ? 'Nominal' : 'Amount'
        ];
        const headerRow = worksheet.getRow(10);
        headerRow.height = 24;

        headers.forEach((h, idx) => {
          const cell = headerRow.getCell(idx + 1);
          cell.value = h;
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '059669' } };
          cell.font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' } };
          cell.alignment = { horizontal: 'center', vertical: 'middle' };
          cell.border = {
            top: { style: 'thin', color: { argb: '10B981' } }, left: { style: 'thin', color: { argb: '10B981' } },
            bottom: { style: 'thin', color: { argb: '10B981' } }, right: { style: 'thin', color: { argb: '10B981' } }
          };
        });

        data.forEach((item, indeks) => {
          const rowNum = 11 + indeks;
          const dRow = worksheet.getRow(rowNum);
          dRow.height = 20;

          const itemJenisClean = item.jenis ? item.jenis.toString().trim().toLowerCase() : "";
          const isMasuk = itemJenisClean === "pemasukan" || itemJenisClean === "income";
          const bgRowColor = (indeks % 2 === 0) ? 'F8FAFC' : 'FFFFFF'; 
          const finColor = isMasuk ? '059669' : 'B91C1C';
          const txtJenisFixed = currentLang === 'id' ? item.jenis : (isMasuk ? 'Income' : 'Expense');
          
          const idxKat = dapatkanIndeksKategori(item.kategori, item.jenis);
          const listKey = isMasuk ? "pemasukan" : "pengeluaran";
          const katTerjemahan = (idxKat !== -1) ? kategoriTranslations[currentLang][listKey][idxKat] : item.kategori;

          dRow.getCell(1).value = indeks + 1;
          dRow.getCell(2).value = formatTanggalFormal(item.tanggal);
          dRow.getCell(3).value = item.keterangan || "-";
          dRow.getCell(4).value = bersihkanIkonEmoji(katTerjemahan);
          dRow.getCell(5).value = txtJenisFixed;
          dRow.getCell(6).value = parseInt(item.nominal) || 0;

          for (let col = 1; col <= 6; col++) {
            const cell = dRow.getCell(col);
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgRowColor } };
            cell.font = { name: 'Segoe UI', size: 10 };
            cell.border = {
              top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
              bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
            };

            if (col === 1) cell.alignment = { horizontal: 'center' };
            if (col === 5) {
              cell.alignment = { horizontal: 'center' };
              cell.font = { name: 'Segoe UI', size: 10, bold: true, color: { argb: finColor } };
            }
            if (col === 6) {
              cell.alignment = { horizontal: 'right' };
              cell.numFormat = '"Rp"#,##0'; 
              cell.font = { name: 'Segoe UI', size: 10, bold: true, color: { argb: finColor } };
            }
          }
        });

        worksheet.autoFilter = {
          from: { row: 10, column: 1 },
          to: { row: 10 + data.length, column: 6 }
        };

        const konfigurasiLebarKolom = [
          { width: 8 }, { width: 20 }, { width: 28 }, { width: 18 }, { width: 16 }, { width: 24 }   
        ];

        data.forEach(item => {
          if(item.keterangan && item.keterangan.length > konfigurasiLebarKolom[2].width) {
            konfigurasiLebarKolom[2].width = item.keterangan.length + 4;
          }
        });
        worksheet.columns = konfigurasiLebarKolom;

        workbook.xlsx.writeBuffer().then(function(buffer) {
          const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          const urlUnduh = URL.createObjectURL(blob);
          const tautanPemicu = document.createElement("a");
          tautanPemicu.href = urlUnduh;
          tautanPemicu.download = `Financial_Report_${periodeText.replace(/ /g, "_")}.xlsx`;
          document.body.appendChild(tautanPemicu);
          tautanPemicu.click();
          document.body.removeChild(tautanPemicu);
          Swal.close();
        });

      } catch (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'Export Failed', text: error.message });
        console.error(error);
      }
    };
  </script>
