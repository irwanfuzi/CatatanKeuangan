<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #f8fafc;
    }
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="max-w-md mx-auto min-h-screen pb-20">

  <div class="bg-emerald-600 p-6 text-white rounded-b-[3rem] shadow-lg mb-6">
    <h1 class="text-xl opacity-80">Halo, Pengguna!</h1>
    <p class="text-sm opacity-70 mb-4">Total Saldo Kamu:</p>
    <h2 id="txtSaldo" class="text-3xl font-bold mb-6">Rp 0</h2>

    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white/20 p-3 rounded-2xl">
        <p class="text-xs opacity-80">Pemasukan</p>
        <p id="txtMasuk" class="font-semibold text-sm">Rp 0</p>
      </div>
      <div class="bg-white/20 p-3 rounded-2xl">
        <p class="text-xs opacity-80">Pengeluaran</p>
        <p id="txtKeluar" class="font-semibold text-sm">Rp 0</p>
      </div>
    </div>
  </div>

  <div class="px-6" id="formSection">
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Tambah Transaksi</h3>

      <form id="formKeuangan" onsubmit="handleForm(event)">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">TANGGAL</label>
          <input type="date" id="tanggal" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-emerald-500 outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">JENIS TRANSAKSI</label>
          <select id="jenis" onchange="updateKategoriOptions()" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none">
            <option value="Pengeluaran">💸 Pengeluaran</option>
            <option value="Pemasukan">💰 Pemasukan</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KATEGORI</label>
          <select id="kategori" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none"></select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">NOMINAL (Rp)</label>
          <input type="text" id="nominal" placeholder="Contoh: 50.000" oninput="formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-semibold text-slate-500 mb-1">KETERANGAN</label>
          <input type="text" id="keterangan" placeholder="Contoh: Beli nasi goreng " class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none" required>
        </div>

        <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-emerald-200 shadow-lg hover:bg-emerald-700 transition-all">
          <i class="fa-solid fa-paper-plane mr-2"></i> Simpan Transaksi
        </button>
      </form>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md p-4 flex justify-around border-t border-slate-100 shadow-2xl">
    <button onclick="tombolReloadPintar()" class="text-emerald-600 flex flex-col items-center">
      <i class="fa-solid fa-house text-xl"></i>
      <span class="text-[10px] mt-1 font-bold">HOME</span>
    </button>
    <button onclick="tombolReloadPintar()" class="text-slate-400 flex flex-col items-center active:scale-95 transition-transform">
      <i id="iconReload" class="fa-solid fa-rotate text-xl"></i>
      <span class="text-[10px] mt-1 font-bold">RELOAD</span>
    </button>
  </div>
<script>                                                                           
    const API_URL = "https://script.google.com/macros/s/AKfycbzzGwKR38yR-KzXqjRKg9A6bXq8A9GwF7eF6JbQtHRXIbYUuPOMOtBtK3T7QVPqQ3fr/exec";

    document.getElementById('tanggal').valueAsDate = new Date();
    
    // Langsung jalankan fungsi penarikan data saldo saat halaman terbuka
    window.onload = loadSummary;

    // 1. FUNGSI AMBIL DATA SALDO (Menggunakan Metode JSONP agar Kebal CORS)
    function loadSummary() {
      // Menghapus skrip lama jika ada agar tidak menumpuk di memori browser
      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();

      // Membuat elemen skrip baru untuk menembak server Google
      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      // Kita kirimkan parameter callback otomatis ke Google Script
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    }

    // 2. FUNGSI MENAMPILKAN DATA (Dipanggil otomatis setelah Google merespons)
    window.handleGoogleData = function(res) {
      if (res) {
        document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
        document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
        document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
      }
      
      // Hentikan putaran animasi tombol reload jika sedang aktif
      const icon = document.getElementById('iconReload');
      if (icon) icon.classList.remove('animate-spin');
    };

    function formatInputRupiah(input) {
      let nilai = input.value.replace(/[^0-9]/g, '');
      if (nilai) {
        input.value = parseInt(nilai).toLocaleString('id-ID');
      } else {
        input.value = '';
      }
    }

    function tombolReloadPintar() {
      const icon = document.getElementById('iconReload');
      icon.classList.add('animate-spin'); 
      document.getElementById('formKeuangan').reset();
      document.getElementById('tanggal').valueAsDate = new Date();
      
      // Panggil ulang penarikan data
      loadSummary();
    }

    const opsiKategori = {
      Pengeluaran: ["Makanan & Minuman", "Transportasi & Bensin", "Kebutuhan Rumah & WiFi", "Hiburan & Self Reward", "Kesehatan & Obat", "Lain-lain"],
      Pemasukan: ["Gaji Utama", "Work Sampingan / Freelance", "Investasi & Dividen", "Hadiah / Lain-lain"]
    };

    function updateKategoriOptions() {
      const jenis = document.getElementById('jenis').value;
      const kategoriSelect = document.getElementById('kategori');
      kategoriSelect.innerHTML = ""; 
      opsiKategori[jenis].forEach(kat => {
        let option = document.createElement('option');
        option.value = kat;
        option.innerText = kat;
        kategoriSelect.appendChild(option);
      });
    }

    window.addEventListener('DOMContentLoaded', () => { updateKategoriOptions(); });

    // 3. FUNGSI KIRIM DATA TRANSAKSI
    function handleForm(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSimpan');
      const nominalInput = document.getElementById('nominal');
      const keteranganInput = document.getElementById('keterangan');
      const tanggalInput = document.getElementById('tanggal');
      const jenisInput = document.getElementById('jenis');
      const kategoriInput = document.getElementById('kategori');

      btn.disabled = true;
      btn.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i> Memproses...";

      const nominalBersih = nominalInput.value.replace(/\./g, '');

      const data = {
        tanggal: tanggalInput.value,
        jenis: jenisInput.value,
        kategori: kategoriInput.value, 
        nominal: nominalBersih,
        keterangan: keteranganInput.value || "-"
      };

      // Gunakan mode no-cors untuk POST agar data lolos masuk ke Google Sheets tanpa hambatan preflight
      fetch(API_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(data)
      })
      .then(() => {
        btn.disabled = false;
        btn.innerHTML = "<i class='fa-solid fa-paper-plane mr-2'></i> Simpan Transaksi";

        Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Transaksi telah dicatat.', timer: 1500, showConfirmButton: false });
        document.getElementById('formKeuangan').reset();
        document.getElementById('tanggal').valueAsDate = new Date();
        updateKategoriOptions();
        
        // Kasih jeda 1.5 detik agar Google Sheets selesai menulis sel baru sebelum ditarik saldonya kembali
        setTimeout(loadSummary, 1500);
      })
      .catch(err => {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = "<i class='fa-solid fa-paper-plane mr-2'></i> Simpan Transaksi";
        Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Gagal menghubungi server database.' });
      });
    }
  </script>
  </body>

</html>
