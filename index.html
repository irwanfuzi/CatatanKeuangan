<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Load Tailwind & Konfigurasi Sinkronisasi Manual Dark Mode -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

  <!-- Library Kalender Modern Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #f8fafc;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body::-webkit-scrollbar {
      display: none;
    }
    
    .swal2-container {
      z-index: 999999 !important;
    }
    
    .premium-bottom-sheet {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      margin: 0 !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 2.25rem 2.25rem 0 0 !important;
      padding: 1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom)) 1.5rem !important;
      box-shadow: 0 -15px 30px -5px rgba(51, 65, 85, 0.15) !important;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    
    .flatpickr-calendar {
      font-family: 'Urbanist', sans-serif !important;
      border-radius: 1.5rem !important;
      box-shadow: 0 15px 35px -5px rgba(51, 65, 85, 0.15) !important;
      border: 1px solid #f1f5f9 !important;
      padding: 12px !important;
      width: 310px !important; 
      box-sizing: border-box !important;
    }
    .flatpickr-innerContainer {
      width: 100% !important;
    }
    .flatpickr-rwd {
      width: 100% !important;
    }
    .flatpickr-days {
      width: 100% !important;
    }
    .dayContainer {
      width: 100% !important;
      min-width: 100% !important;
      max-width: 100% !important;
    }
    .flatpickr-day {
      max-width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      margin: 1px !important;
    }
    .flatpickr-day.selected, .flatpickr-day.selected:hover {
      background: #059669 !important;
      border-color: #059669 !important;
      font-weight: bold !important;
      border-radius: 0.65rem !important;
    }
    .flatpickr-day:hover {
      background: #ecfdf5 !important;
      border-radius: 0.65rem !important;
    }
    .flatpickr-day.today {
      border-color: #10b981 !important;
      color: #047857 !important;
      font-weight: bold !important;
    }
    .flatpickr-months .flatpickr-month {
      color: #1e293b !important;
      height: 40px !important;
    }

    .flatpickr-current-month {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 6px !important;
      width: 100% !important;
      position: relative !important;
      left: 0 !important;
      padding: 0 !important;
    }
    
    .btn-pemicu-bulan, .btn-pemicu-tahun {
      font-family: 'Urbanist', sans-serif !important;
      font-weight: 700 !important;
      font-size: 12px !important;
      color: #1e293b !important;
      background: #f1f5f9 !important;
      border: none !important;
      border-radius: 0.75rem !important;
      padding: 5px 10px !important;
      cursor: pointer !important;
      transition: all 0.2s !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 4px !important;
      min-width: 90px !important;
    }
    .btn-pemicu-bulan:hover, .btn-pemicu-tahun:hover {
      background: #e2e8f0 !important;
    }
    
    .flatpickr-monthDropdown-months, .flatpickr-current-month .numInputWrapper {
      display: none !important;
    }
    
    .flatpickr-months .flatpickr-prev-month, 
    .flatpickr-months .flatpickr-next-month {
      top: 2px !important;
      padding: 8px !important;
      color: #94a3b8 !important;
      transition: all 0.2s !important;
    }
    .flatpickr-months .flatpickr-prev-month:hover, 
    .flatpickr-months .flatpickr-next-month:hover {
      color: #10b981 !important;
    }

    /* REKAYASA MODERN SAKLAR PERUBAHAN STYLE - MODE GELAP PREMIUM DENGAN KELAS KUSTOM STANDAR (.dark) */
    body.dark {
      background-color: #0b0f19; 
    }
    body.dark #pageHome,
    body.dark #pageRiwayat > div,
    body.dark #modalDetailTransaksi > div,
    body.dark #modalDetailTransaksi .bg-white,
    body.dark #listRiwayat > div,
    body.dark #listRiwayatPenuhModal > div,
    body.dark .fixed.bottom-0 {
      background: linear-gradient(145deg, #131b2e, #111827) !important;
      border-color: #1e293b !important;
      box-shadow: 0 12px 35px -12px rgba(0, 0, 0, 0.6) !important;
    }
    body.dark h3,
    body.dark h4,
    body.dark #chartCenterTotal,
    body.dark #txtTotalDataModal {
      color: #f8fafc !important;
    }
    body.dark .text-slate-800 { color: #e2e8f0 !important; }
    body.dark .text-slate-700 { color: #cbd5e1 !important; }
    body.dark .text-slate-600 { color: #94a3b8 !important; }
    
    body.dark input,
    body.dark #btnTriggerKategori,
    body.dark #btnTriggerFilter,
    body.dark #modalDetailTransaksi .bg-slate-50\/60,
    body.dark #noChartData,
    body.dark #loadingRiwayat {
      background-color: #1a2336 !important;
      border-color: #24324d !important;
      color: #f8fafc !important;
    }
    body.dark input::placeholder {
      color: #4b5563 !important;
    }
    body.dark .bg-slate-100 {
      background-color: #1a2336 !important;
    }
    body.dark #btnTabPengeluaran:not(.bg-white),
    body.dark #btnTabPemasukan:not(.bg-white) {
      color: #64748b !important;
    }
    body.dark #btnTabPengeluaran.bg-white,
    body.dark #btnTabPemasukan.bg-white {
      background-color: #0b0f19 !important;
      color: #f8fafc !important;
    }
    body.dark #customLegendContainer {
      border-left-color: #1e293b !important;
    }
    body.dark #customLegendContainer .text-slate-600 {
      color: #94a3b8 !important;
    }
    body.dark .divide-slate-100\/60 > div {
      border-bottom-color: #1e293b !important;
    }
    body.dark #btnBukaDetail {
      background-color: #131b2e !important;
      border-color: #1e293b !important;
      color: #34d399 !important;
    }
    body.dark #btnBukaDetail:hover {
      background-color: #1a2336 !important;
    }
    
    body.dark #btnSimpan {
      background-color: #059669 !important;
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3) !important; 
      color: #ffffff !important;
    }
    body.dark #btnSimpan:hover {
      background-color: #10b981 !important; 
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.45) !important;
    }
    
    body.dark .btn-reset-data {
      background-color: rgba(244, 63, 94, 0.08) !important; 
      border-color: rgba(244, 63, 94, 0.2) !important;
      color: #fb7185 !important; 
    }
    body.dark .btn-reset-data:hover {
      background-color: rgba(244, 63, 94, 0.15) !important;
    }
    
    body.dark .flatpickr-calendar {
      background: #131b2e !important;
      border-color: #1e293b !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7) !important;
    }
    body.dark .flatpickr-day {
      color: #e2e8f0 !important;
    }
    body.dark .flatpickr-day:hover {
      background: #1a2336 !important;
    }
    body.dark .flatpickr-months .flatpickr-month,
    body.dark .btn-pemicu-bulan,
    body.dark .btn-pemicu-tahun {
      color: #f8fafc !important;
      background: #1a2336 !important;
    }
    body.dark .flatpickr-weekday {
      color: #4b5563 !important;
    }
    
    body.dark .swal2-popup {
      background: #131b2e !important;
      border: 1px solid #1e293b !important;
    }
    body.dark .swal2-title, body.dark .swal2-html-container {
      color: #f8fafc !important;
    }
    body.dark .swal2-cancel {
      background-color: #1a2336 !important;
      color: #cbd5e1 !important;
    }
    
    body.dark .premium-bottom-sheet button {
      background-color: #131b2e !important;
      border-color: #1e293b !important;
      color: #cbd5e1 !important;
    }
    body.dark .premium-bottom-sheet button.bg-emerald-50 {
      background-color: #059669 !important;
      border-color: #10b981 !important;
      color: #ffffff !important;
    }
  </style>
</head>

<body class="w-full min-h-screen flex flex-col pb-[85px]">

  <!-- TOP TOTAL WALLET BALANCE CARD (COMPACT RADIUS & PADDING) -->
  <div class="w-full bg-gradient-to-b from-emerald-600 to-emerald-700 p-5 text-white rounded-b-[2rem] shadow-lg shadow-emerald-900/5 flex flex-col relative overflow-hidden">
    <div class="absolute -right-6 -top-6 w-28 h-28 bg-white/5 rounded-full blur-xl pointer-events-none"></div>
    <div class="absolute -left-10 -bottom-10 w-36 h-36 bg-emerald-500/20 rounded-full blur-2xl pointer-events-none"></div>
    
    <button onclick="window.toggleDarkMode()" class="absolute right-5 top-4 w-8 h-8 bg-white/10 backdrop-blur-md border border-white/20 rounded-xl flex items-center justify-center text-white active:scale-95 transition-all z-50 focus:outline-none">
      <i id="iconDarkMode" class="fa-solid fa-moon text-sm"></i>
    </button>

    <h1 class="text-xs font-bold opacity-80 tracking-wide">Halo, Pengguna!</h1>
    <p class="text-[10px] opacity-60 mt-1 mb-0.5 font-bold tracking-wider uppercase">Total Saldo Kamu</p>
    <h2 id="txtSaldo" class="text-2xl font-bold tracking-tight mb-4">Rp 0</h2>

    <div class="grid grid-cols-2 gap-3 relative z-10">
      <div class="bg-white/10 backdrop-blur-md p-2.5 rounded-xl border border-white/10 shadow-inner flex flex-col">
        <span class="text-[9px] font-bold opacity-80 uppercase tracking-wider mb-0.5 flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>Pemasukan
        </span>
        <p id="txtMasuk" class="font-bold text-sm tracking-wide">Rp 0</p>
      </div>
      <div class="bg-white/10 backdrop-blur-md p-2.5 rounded-xl border border-white/10 shadow-inner flex flex-col">
        <span class="text-[9px] font-bold opacity-80 uppercase tracking-wider mb-0.5 flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-rose-400"></span>Pengeluaran
        </span>
        <p id="txtKeluar" class="font-bold text-sm tracking-wide">Rp 0</p>
      </div>
    </div>
  </div>

  <!-- MAIN CONTAINER AREA (COMPACT MARGIN) -->
  <div class="w-full px-4 mt-4 flex-grow" id="mainContainer">
    
    <!-- HALAMAN HOME (FORM INPUT TRANSAKSI) -->
    <div id="pageHome" class="w-full bg-white p-4 rounded-[1.75rem] shadow-sm border border-slate-100 mb-4">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-1 h-5 bg-emerald-600 rounded-full"></div>
        <h3 class="text-base font-bold text-slate-800 tracking-tight">Tambah Transaksi</h3>
      </div>

      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <!-- 1. INPUT TANGGAL TRANSAKSI -->
        <div class="mb-3.5">
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 tracking-wider uppercase">Tanggal Transaksi</label>
          <div class="relative">
            <input type="hidden" id="tanggal_mentntah" value="">
            <input type="text" id="tanggal" placeholder="Pilih Tanggal Transaksi" readonly class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200/60 font-bold text-xs text-slate-700 focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 focus:bg-white outline-none transition-all pl-10 cursor-pointer" required>
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs">
              <i class="fa-regular fa-calendar-days"></i>
            </div>
          </div>
        </div>

        <!-- 2. JENIS ALIRAN DANA -->
        <div class="mb-3.5">
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 tracking-wider uppercase">Jenis Aliran Dana</label>
          <div class="w-full p-1 bg-slate-100 rounded-xl grid grid-cols-2 gap-1">
            <input type="hidden" id="jenis" value="Pengeluaran">
            <button type="button" id="btnTabPengeluaran" onclick="window.pilihJenisTab('Pengeluaran')" class="w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 bg-white text-rose-600 shadow-sm">
              💸 Pengeluaran
            </button>
            <button type="button" id="btnTabPemasukan" onclick="window.pilihJenisTab('Pemasukan')" class="w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 text-slate-500 hover:text-slate-700">
              💰 Pemasukan
            </button>
          </div>
        </div>

        <!-- 3. POS KATEGORI -->
        <div class="mb-3.5">
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 tracking-wider uppercase">Pos Kategori</label>
          <div class="relative">
            <input type="hidden" id="kategori" value="">
            <button type="button" id="btnTriggerKategori" onclick="window.bukaBottomSheetPilihanKategori()" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200/60 font-bold text-xs text-slate-700 text-left flex justify-between items-center outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 focus:bg-white transition-all pl-10 pr-3">
              <span id="txtKategoriTerpilihLabel">Pilih Kategori</span>
              <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
            </button>
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs">
              <i class="fa-solid fa-tags"></i>
            </div>
          </div>
        </div>

        <!-- 4. INPUT NOMINAL TRANSAKSI -->
        <div class="mb-3.5">
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 tracking-wider uppercase">Nominal Transaksi</label>
          <div class="relative">
            <input type="text" id="nominal" placeholder="0" oninput="window.formatInputRupiah(this)" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200/60 font-bold text-base text-slate-800 placeholder-slate-300 focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 focus:bg-white outline-none transition-all pl-10" required>
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs pointer-events-none">
              Rp
            </div>
          </div>
        </div>

        <!-- 5. INPUT KETERANGAN -->
        <div class="mb-4">
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 tracking-wider uppercase">Keterangan / Nota</label>
          <div class="relative">
            <input type="text" id="keterangan" placeholder="Contoh: Jajan makan siang" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200/60 font-semibold text-xs text-slate-700 placeholder-slate-400 focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 focus:bg-white outline-none transition-all pl-10" required>
            <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs">
              <i class="fa-regular fa-pen-to-square"></i>
            </div>
          </div>
        </div>

        <div class="flex gap-2.5 w-full">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-3.5 rounded-xl shadow-md shadow-emerald-600/5 hover:bg-emerald-700 transition-all active:scale-[0.98] flex items-center justify-center gap-1.5 text-xs tracking-wide">
            <i class="fa-solid fa-paper-plane"></i> Simpan Transaksi
          </button>
          
          <button type="button" onclick="window.tombolReloadPintar()" class="bg-white text-slate-500 font-bold px-4 rounded-xl border border-slate-200/80 shadow-sm hover:bg-slate-50 transition-all active:scale-95 flex items-center justify-center">
            <i id="iconReload" class="fa-solid fa-rotate text-sm"></i>
          </button>
        </div>
      </form>

      <button type="button" onclick="window.resetSemuaData()" class="btn-reset-data w-full mt-3 bg-red-50/60 hover:bg-red-100/70 text-red-600 font-bold p-3 rounded-xl border border-red-100/40 active:scale-95 transition-all flex items-center justify-center gap-1.5 text-[10px] uppercase tracking-wider">
        <i class="fa-solid fa-trash-can"></i> Reset Semua Data
      </button>
    </div>

    <!-- HALAMAN RIWAYAT -->
    <div id="pageRiwayat" class="w-full flex flex-col gap-4 mb-4 hidden">
      
      <!-- 1. ANALISIS PENGELUARAN -->
      <div class="w-full bg-white p-4 rounded-[1.75rem] shadow-sm border border-slate-100/80">
        <div class="flex items-center justify-between mb-3">
          <div class="flex flex-col">
            <div class="flex items-center gap-2">
              <div class="w-1 h-4 bg-rose-500 rounded-full"></div>
              <h3 class="text-sm font-bold text-slate-800 tracking-tight">Analisis Pengeluaran</h3>
            </div>
          </div>
          <button onclick="window.bukaPilihanPeriodeHalamanUtama()" class="px-2 py-1 bg-slate-50 dark:bg-slate-800 border border-slate-200/60 dark:border-slate-700 rounded-lg text-[10px] font-bold text-slate-600 dark:text-slate-300 flex items-center gap-1 active:scale-95 transition-all focus:outline-none">
            <span id="labelPeriodeUtama">Bulan Ini</span>
            <i class="fa-solid fa-chevron-down text-[8px] text-slate-400 dark:text-slate-500"></i>
          </button>
          <select id="filterBulanUtamaHidden" onchange="window.prosesFilterKategoriBulanUtama()" class="hidden"></select>
        </div>
        
        <div class="w-full flex flex-row items-center justify-between gap-1 py-0.5">
          <div class="relative w-[110px] h-[110px] flex-shrink-0 flex items-center justify-center">
            <canvas id="chartPengeluaran"></canvas>
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pt-0.5">
              <span class="text-[6px] font-bold text-slate-400 tracking-wider uppercase">Total</span>
              <span id="chartCenterTotal" class="text-[11px] font-bold text-slate-800 text-center truncate max-w-[85px]">Rp 0</span>
            </div>
          </div>
          <div id="customLegendContainer" class="w-[64%] flex flex-col gap-1 max-h-[115px] overflow-y-auto pl-2.5 custom-scrollbar border-l border-slate-100">
          </div>
        </div>
        <div id="noChartData" class="text-center text-xs text-slate-400 font-medium py-5 bg-slate-50 rounded-xl border border-dashed border-slate-200 mt-1 hidden">Tidak ada pengeluaran periode ini</div>
      </div>

      <!-- 2. GRAFIK TREN KEUNGAN BULANAN (COMPACT HEIGHT) -->
      <div class="w-full bg-white p-4 rounded-[1.75rem] shadow-sm border border-slate-100/80">
        <div class="flex flex-col mb-3">
          <div class="flex items-center gap-2">
            <div class="w-1 h-4 bg-blue-500 rounded-full"></div>
            <h3 class="text-sm font-bold text-slate-800 tracking-tight">Tren Keuangan Bulanan</h3>
          </div>
        </div>
        <div class="w-full h-[150px]">
          <canvas id="chartTrenBulanan"></canvas>
        </div>
      </div>

      <!-- 3. TRANSAKSI TERAKHIR -->
      <div class="w-full flex flex-col gap-2">
        <div class="flex items-center justify-between px-1">
          <h3 class="text-xs font-bold text-slate-800">Transaksi Terakhir</h3>
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wide">Terbaru</span>
        </div>
        
        <div id="loadingRiwayat" class="text-slate-400 text-xs py-6 text-center bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-1">
          <i class="fa-solid fa-circle-notch animate-spin text-emerald-600 text-sm"></i>
          <span class="font-bold text-[10px] text-slate-400">Sinkronisasi data server...</span>
        </div>
        
        <div id="listRiwayat" class="space-y-2 hidden"></div>
        
        <button id="btnBukaDetail" onclick="window.bukaModalDetailSemua()" class="w-full bg-white border border-slate-200 text-emerald-600 hover:bg-slate-50 font-bold p-3 rounded-xl shadow-sm text-xs tracking-wide transition-all active:scale-[0.98] flex items-center justify-center gap-1.5 mt-1 hidden">
          <span>Buka Riwayat Lengkap</span> <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL FULL SCREEN: LIST RIWAYAT LENGKAP -->
  <div id="modalDetailTransaksi" class="fixed inset-0 bg-slate-900/40 z-[100] flex flex-col justify-end hidden opacity-0 transition-opacity duration-300">
    <div class="w-full h-[88vh] bg-white rounded-t-[2rem] shadow-2xl flex flex-col transform translate-y-full transition-transform duration-300 overflow-hidden">
      
      <!-- Header Modal -->
      <div class="w-full bg-white px-5 pt-4 pb-2.5 flex items-center justify-between flex-shrink-0 border-b border-slate-100">
        <div class="flex items-center gap-2.5">
          <button onclick="window.tutupModalDetailSemua()" class="w-9 h-9 flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl active:scale-95 transition-all focus:outline-none">
            <i class="fa-solid fa-xmark text-sm"></i>
          </button>
          <h3 class="text-sm font-bold text-slate-800">Riwayat Lengkap</h3>
        </div>
        <span id="txtTotalDataModal" class="text-slate-400 font-bold text-[10px] uppercase tracking-widest bg-slate-100 px-2.5 py-1.5 rounded-full">0 Transaksi</span>
      </div>

      <!-- Filter Periode & Ekspor Di Dalam Modal -->
      <div class="w-full bg-white px-5 py-3 border-b border-slate-100 flex-shrink-0 flex flex-col gap-2.5">
        <div>
          <label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Filter Periode Laporan</label>
          <button id="btnTriggerFilter" onclick="window.bukaPilihanPeriodeModal()" class="w-full p-3 bg-slate-50 hover:bg-slate-100/70 border border-slate-200/80 rounded-xl text-left font-bold text-slate-700 flex justify-between items-center transition-all active:scale-[0.99] focus:outline-none">
            <span id="labelPeriodeTerpilih" class="text-xs">Tampilkan Semua</span>
            <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
          </button>
          <select id="filterBulanModal" onchange="window.renderListModalSesuaiBulan()" class="hidden"></select>
        </div>

        <div class="grid grid-cols-2 gap-2.5 pt-0.5">
          <button onclick="window.unduhPDF()" class="bg-rose-50 border border-rose-100/80 text-rose-600 font-bold text-[10px] uppercase tracking-wider p-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-all focus:outline-none">
            <i class="fa-solid fa-file-pdf"></i> PDF
          </button>
          <button onclick="window.unduhExcel()" class="bg-emerald-50 border border-emerald-100/80 text-emerald-600 font-bold text-[10px] uppercase tracking-wider p-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-all focus:outline-none">
            <i class="fa-solid fa-file-excel"></i> Excel
          </button>
        </div>
      </div>

      <!-- Area Scroll Riwayat Penuh Modal -->
      <div class="w-full flex-grow p-4 overflow-y-auto pb-12 bg-slate-50/60">
        <div id="listRiwayatPenuhModal" class="space-y-3"></div>
      </div>

    </div>
  </div>

  <!-- TAB NAVIGATION MENUS -->
  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 shadow-[0_-5px_25px_rgba(0,0,0,0.02)] py-2.5 px-16 flex justify-around z-50 pb-[calc(12px+env(safe-area-inset-bottom))]">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600 flex flex-col items-center min-w-[65px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-house text-lg mb-0.5"></i>
      <span class="text-[8px] font-bold tracking-widest">HOME</span>
    </button>
    
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400 flex flex-col items-center min-w-[65px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-clock-rotate-left text-lg mb-0.5"></i>
      <span class="text-[8px] font-bold tracking-widest">RIWAYAT</span>
    </button>
  </div>

  <script>                                                                                                    
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    
    const daftarKategoriPengeluaran = ["🍔 Makanan", "🚗 Transport", "🏠 Tagihan", "🎬 Hiburan", "🏥 Kesehatan", "📦 Lainnya"];
    const daftarKategoriPemasukan = ["💼 Gaji", "🚀 Sampingan", "📈 Investasi", "🎁 Lainnya"];
    const daftarWarna = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];
    
    const namaBulanIndoFull = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    let myChartInstance = null;
    let myBarChartInstance = null; 
    let databaseRiwayatRaw = []; 
    let instanceFlatpickr = null;
    let trenBulananRawGlobal = {}; 

    Chart.register(ChartDataLabels);

    if (window.jspdf && window.jspdf.jsPDF) {
      window.jsPDF = window.jspdf.jsPDF;
    }

    function formatTanggalIndo(tglString) {
      if(!tglString) return "-";
      const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
      const tanggalObj = new Date(tglString);
      
      const hariIni = new Date();
      const kemarin = new Date();
      kemarin.setDate(hariIni.getDate() - 1);
      
      if(tanggalObj.toDateString() === hariIni.toDateString()) return "Hari Ini";
      if(tanggalObj.toDateString() === kemarin.toDateString()) return "Kemarin";
      
      return tanggalObj.toLocaleDateString('id-ID', opsi);
    }

    function formatTanggalFormal(tglString) {
      if(!tglString) return "-";
      const tanggalObj = new Date(tglString);
      if (isNaN(tanggalObj)) return "-";
      return tanggalObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function sinkronisasiNilaiTanggalMentah(dateObj) {
      if (dateObj instanceof Date && !isNaN(dateObj)) {
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        document.getElementById('tanggal_mentntah').value = `${yyyy}-${mm}-${dd}`;
      } else {
        const hariIni = new Date();
        const yyyy = hariIni.getFullYear();
        const mm = String(hariIni.getMonth() + 1).padStart(2, '0');
        const dd = String(hariIni.getDate()).padStart(2, '0');
        document.getElementById('tanggal_mentntah').value = `${yyyy}-${mm}-${dd}`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.jspdf && window.jspdf.jsPDF) {
        window.jsPDF = window.jspdf.jsPDF;
      }

      const statusModeGelapSimpanan = localStorage.getItem('app_dark_mode');
      if (statusModeGelapSimpanan === 'enabled') {
        document.documentElement.classList.add('dark');
        document.body.classList.add('dark');
        window.updateIconVisualModeGelap(true);
      }

      instanceFlatpickr = flatpickr("#tanggal", {
        locale: "id",
        dateFormat: "d F Y",
        defaultDate: new Date(),
        changeMonth: true,
        changeYear: true,
        disableMobile: "true",
        onReady: function(selectedDates, dateStr, instance) {
          sinkronisasiNilaiTanggalMentah(selectedDates[0]);
          window.buatPemicuKapsulKalenderCustom(instance);
        },
        onMonthChange: function(dates, dataStr, instance) {
          window.buatPemicuKapsulKalenderCustom(instance);
        },
        onYearChange: function(dates, dataStr, instance) {
          window.buatPemicuKapsulKalenderCustom(instance);
        },
        onChange: function(selectedDates) {
          sinkronisasiNilaiTanggalMentah(selectedDates[0]);
        }
      });
      
      window.updateKategoriOptions();
      window.loadSummary();
    });

    window.toggleDarkMode = function() {
      const modeGelapAktif = document.documentElement.classList.toggle('dark');
      if (modeGelapAktif) {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
      localStorage.setItem('app_dark_mode', modeGelapAktif ? 'enabled' : 'disabled');
      window.updateIconVisualModeGelap(modeGelapAktif);
      
      window.prosesFilterKategoriBulanUtama();
      window.renderGrafikTrenBulanan(trenBulananRawGlobal);
    };

    window.updateIconVisualModeGelap = function(apakahGelap) {
      const icon = document.getElementById('iconDarkMode');
      if (icon) {
        if (apakahGelap) {
          icon.className = "fa-solid fa-sun";
        } else {
          icon.className = "fa-solid fa-moon";
        }
      }
    };

    window.buatPemicuKapsulKalenderCustom = function(instance) {
      const containerHeader = instance.calendarContainer.querySelector('.flatpickr-current-month');
      if (!containerHeader) return;
      
      const pemicuLamaBulan = containerHeader.querySelector('.btn-pemicu-bulan');
      if (pemicuLamaBulan) pemicuLamaBulan.remove();
      const pemicuLamaTahun = containerHeader.querySelector('.btn-pemicu-tahun');
      if (pemicuLamaTahun) pemicuLamaTahun.remove();
      
      const labelBulanAktis = namaBulanIndoFull[instance.currentMonth];
      const labelTahunAktif = instance.currentYear;
      
      const btnBulan = document.createElement('button');
      btnBulan.type = 'button';
      btnBulan.className = 'btn-pemicu-bulan';
      btnBulan.innerHTML = `<span>${labelBulanAktis}</span> <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i>`;
      btnBulan.addEventListener('click', () => window.bukaBottomSheetBulanKalender(instance));
      
      const btnTahun = document.createElement('button');
      btnTahun.type = 'button';
      btnTahun.className = 'btn-pemicu-tahun';
      btnTahun.innerHTML = `<span>${labelTahunAktif}</span> <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i>`;
      btnTahun.addEventListener('click', () => window.bukaBottomSheetTahunKalender(instance));
      
      containerHeader.appendChild(btnBulan);
      containerHeader.appendChild(btnTahun);
    };

    window.bukaBottomSheetBulanKalender = function(instance) {
      let htmlListBulan = `<div class="flex flex-col gap-2.5 text-left max-h-[45vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      
      namaBulanIndoFull.forEach((namaBulan, indeks) => {
        const isSelected = indeks === instance.currentMonth;
        htmlListBulan += `
          <button type="button" onclick="window.setBulanKalenderDariSheet(${indeks})" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
            isSelected ? 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-300 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 font-bold' : 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold active:bg-slate-100 dark:active:bg-slate-700'
          }">
            <span class="text-sm">${namaBulan}</span>
            ${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-4 h-4 rounded-full border border-slate-300 bg-white dark:bg-slate-700 dark:border-slate-600"></div>'}
          </button>`;
      });
      htmlListBulan += `</div>`;
      
      Swal.fire({
        title: 'Pilih Bulan', html: htmlListBulan, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Batal', cancelButtonColor: '#f1f5f9',
        background: document.documentElement.classList.contains('dark') ? '#131b2e' : '#ffffff',
        customClass: { popup: 'premium-bottom-sheet', title: 'font-bold text-base text-slate-800 dark:text-slate-100 pt-1 border-b dark:border-slate-800/80 pb-3', cancelButton: 'w-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-3.5 rounded-2xl text-sm border dark:border-slate-700 focus:ring-0 mt-2' }
      });
    };

    window.setBulanKalenderDariSheet = function(indeksBulan) {
      if (instanceFlatpickr) {
        instanceFlatpickr.jumpToDate(new Date(instanceFlatpickr.currentYear, indeksBulan, 1), false);
      }
      Swal.close();
    };

    window.bukaBottomSheetTahunKalender = function(instance) {
      const AppTahunSekarang = new Date().getFullYear();
      let htmlListTahun = `<div class="flex flex-col gap-2.5 text-left max-h-[45vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      
      for (let y = AppTahunSekarang - 5; y <= AppTahunSekarang + 5; y++) {
        const isSelected = y === instance.currentYear;
        htmlListTahun += `
          <button type="button" onclick="window.setTahunKalenderDariSheet(${y})" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
            isSelected ? 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-300 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 font-bold' : 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold active:bg-slate-100 dark:active:bg-slate-700'
          }">
            <span class="text-sm">Tahun ${y}</span>
            ${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-4 h-4 rounded-full border border-slate-300 bg-white dark:bg-slate-700 dark:border-slate-600"></div>'}
          </button>`;
      }
      htmlListTahun += `</div>`;
      
      Swal.fire({
        title: 'Pilih Tahun', html: htmlListTahun, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Batal', cancelButtonColor: '#f1f5f9',
        background: document.documentElement.classList.contains('dark') ? '#131b2e' : '#ffffff',
        customClass: { popup: 'premium-bottom-sheet', title: 'font-bold text-base text-slate-800 dark:text-slate-100 pt-1 border-b dark:border-slate-800/80 pb-3', cancelButton: 'w-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-3.5 rounded-2xl text-sm border dark:border-slate-700 focus:ring-0 mt-2' }
      });
    };

    window.setTahunKalenderDariSheet = function(angkaTahun) {
      if (instanceFlatpickr) {
        instanceFlatpickr.jumpToDate(new Date(angkaTahun, instanceFlatpickr.currentMonth, 1), false);
      }
      Swal.close();
    };

    window.pilihJenisTab = function(jenisTerpilih) {
      document.getElementById('jenis').value = jenisTerpilih;
      
      const btnKeluar = document.getElementById('btnTabPengeluaran');
      const btnMasuk = document.getElementById('btnTabPemasukan');
      
      if (jenisTerpilih === 'Pengeluaran') {
        btnKeluar.className = "w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 bg-white text-rose-600 shadow-sm";
        btnMasuk.className = "w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 text-slate-500 hover:text-slate-700";
      } else {
        btnMasuk.className = "w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 bg-white text-emerald-600 shadow-sm";
        btnKeluar.className = "w-full py-2.5 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-1 text-slate-500 hover:text-slate-700";
      }
      
      window.updateKategoriOptions();
    };

    window.bukaBottomSheetPilihanKategori = function() {
      const jenis = document.getElementById('jenis').value;
      const opsiKategori = (jenis === "Pengeluaran") ? daftarKategoriPengeluaran : daftarKategoriPemasukan;
      const kategoriSaatIni = document.getElementById('kategori').value;
      
      let htmlPilihanKategori = `<div class="grid grid-cols-1 gap-2.5 text-left max-h-[45vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      
      opsiKategori.forEach(kat => {
        const isSelected = kat === kategoriSaatIni;
        htmlPilihanKategori += `
          <button type="button" onclick="window.setKategoriDariBottomSheet('${kat}')" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
            isSelected ? 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-300 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400 font-bold' : 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold active:bg-slate-100 dark:active:bg-slate-700'
          }">
            <span class="text-sm">${kat}</span>
            ${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-4 h-4 rounded-full border border-slate-300 bg-white dark:bg-slate-700 dark:border-slate-600"></div>'}
          </button>`;
      });
      htmlPilihanKategori += `</div>`;
      
      Swal.fire({
        title: 'Pilih Kategori Dana', html: htmlPilihanKategori, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Batal', cancelButtonColor: '#f1f5f9',
        background: document.documentElement.classList.contains('dark') ? '#131b2e' : '#ffffff',
        customClass: { popup: 'premium-bottom-sheet', title: 'font-bold text-base text-slate-800 dark:text-slate-100 pt-1 border-b dark:border-slate-800/80 pb-3', cancelButton: 'w-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-3.5 rounded-2xl text-sm border dark:border-slate-700 focus:ring-0 mt-2' }
      });
    };

    window.setKategoriDariBottomSheet = function(kategoriTerpilih) {
      document.getElementById('kategori').value = kategoriTerpilih;
      document.getElementById('txtKategoriTerpilihLabel').innerText = kategoriTerpilih;
      Swal.close();
    };

    window.updateKategoriOptions = function() {
      const jenis = document.getElementById('jenis').value;
      const opsiDefault = (jenis === "Pengeluaran") ? daftarKategoriPengeluaran[0] : daftarKategoriPemasukan[0];
      
      document.getElementById('kategori').value = opsiDefault;
      document.getElementById('txtKategoriTerpilihLabel').innerText = opsiDefault;
    };

    window.tukarHalaman = function(menu) {
      const pageHome = document.getElementById('pageHome');
      const pageRiwayat = document.getElementById('pageRiwayat');
      const navHome = document.getElementById('navHome');
      const navRiwayat = document.getElementById('navRiwayat');
      const btnBukaDetail = document.getElementById('btnBukaDetail');

      if (menu === 'home') {
        pageHome.classList.remove('hidden');
        pageRiwayat.classList.add('hidden');
        if(btnBukaDetail) btnBukaDetail.classList.add('hidden'); 
        navHome.classList.replace('text-slate-400', 'text-emerald-600');
        navRiwayat.classList.replace('text-emerald-600', 'text-slate-400');
        window.loadSummary(); 
      } else if (menu === 'riwayat') {
        pageHome.classList.add('hidden');
        pageRiwayat.classList.remove('hidden');
        if(btnBukaDetail && databaseRiwayatRaw.length > 0) btnBukaDetail.classList.remove('hidden'); 
        navRiwayat.classList.replace('text-slate-400', 'text-emerald-600');
        navHome.classList.replace('text-emerald-600', 'text-slate-400');
        window.loadSummary();
      }
    };

    window.aplikasikanDataKeUI = function(res) {
      document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0";
      document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0";
      document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";
      
      databaseRiwayatRaw = res.riwayat || [];
      trenBulananRawGlobal = res.trenBulananRaw || {}; 
      window.buatOpsiFilterBulanModal();
      
      const hariIni = new Date();
      const formatKunciBulanIni = hariIni.getFullYear() + "-" + String(hariIni.getMonth() + 1).padStart(2, '0');
      const selectUtama = document.getElementById('filterBulanUtamaHidden');
      
      if (selectUtama) {
        const adaBulanIni = Array.from(selectUtama.options).some(o => o.value === formatKunciBulanIni);
        if (adaBulanIni) {
          selectUtama.value = formatKunciBulanIni;
          const opsiDitemukan = Array.from(selectUtama.options).find(o => o.value === formatKunciBulanIni);
          document.getElementById('labelPeriodeUtama').innerText = opsiDitemukan.text;
        } else {
          selectUtama.value = selectUtama.options[0] ? selectUtama.options[0].value : "ALL";
          document.getElementById('labelPeriodeUtama').innerText = selectUtama.options[0] ? selectUtama.options[0].text : "Tampilkan Semua";
        }
      }
      
      window.renderHalamanRiwayatUtama();
      window.prosesFilterKategoriBulanUtama();
      window.renderGrafikTrenBulanan(trenBulananRawGlobal);
    };

    window.loadSummary = function() {
      const localCache = localStorage.getItem('app_keuangan_cache');
      if (localCache) {
        try {
          const resCached = JSON.parse(localCache);
          window.aplikasikanDataKeUI(resCached); 
        } catch(e) {
          console.log("Gagal memproses cache.");
        }
      }

      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();
      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    };

    window.handleGoogleData = function(res) {
      const icon = document.getElementById('iconReload');
      if (icon) icon.classList.remove('animate-spin');
      if (res) {
        localStorage.setItem('app_keuangan_cache', JSON.stringify(res));
        window.aplikasikanDataKeUI(res);
      }
    };

    window.renderHalamanRiwayatUtama = function() {
      const listContainer = document.getElementById('listRiwayat');
      if (!listContainer) return;
      listContainer.innerHTML = "";

      const btnBukaDetail = document.getElementById('btnBukaDetail');
      const pageRiwayatAktif = !document.getElementById('pageRiwayat').classList.contains('hidden');

      if (databaseRiwayatRaw && databaseRiwayatRaw.length > 0) {
        if (btnBukaDetail && pageRiwayatAktif) {
          btnBukaDetail.classList.remove('hidden');
        }

        const dataTerbatasHalamanUtama = databaseRiwayatRaw.slice(0, 3);
        let susunanHTMLItemRingkas = '';
        
        dataTerbatasHalamanUtama.forEach((item) => {
          const isMasuk = item.jenis === "Pemasukan";
          const indexAsli = databaseRiwayatRaw.findIndex(x => x === item);
          
          susunanHTMLItemRingkas += `
            <div onclick="window.bukaOpsiAksiTransaksi(${indexAsli})" class="flex items-center justify-between py-2.5 px-2 hover:bg-slate-50/80 dark:hover:bg-slate-800/40 border-b border-slate-50 last:border-b-0 transition-all rounded-xl cursor-pointer">
              <div class="flex items-center gap-2.5 min-w-[68%]">
                <div class="w-8 h-8 flex items-center justify-center rounded-lg text-xs flex-shrink-0 ${isMasuk ? 'text-emerald-600 bg-emerald-50 dark:bg-emerald-500/10' : 'text-rose-600 bg-rose-50 dark:bg-rose-500/10'}">
                  <i class="fa-solid ${isMasuk ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                </div>
                <div class="truncate">
                  <h4 class="text-[12px] font-bold text-slate-800 truncate mb-0.5">${item.keterangan || "-"}</h4>

    window.prosesFilterKategoriBulanUtama = function() {
      const bulanTerpilih = document.getElementById('filterBulanUtamaHidden').value;
      const dataKategoriGrafik = {};
      daftarKategoriPengeluaran.forEach(kat => dataKategoriGrafik[kat] = 0);

      let dataHasilFilter = databaseRiwayatRaw || [];
      if (bulanTerpilih !== "ALL") {
        dataHasilFilter = databaseRiwayatRaw.filter(item => item.tanggal && item.tanggal.toString().startsWith(bulanTerpilih));
      }

      dataHasilFilter.forEach(item => {
        if (item.jenis !== "Pemasukan") {
          const itemKategoriRaw = item.kategori || "";
          const kategoriCocok = daftarKategoriPengeluaran.find(kat => kat.includes(itemKategoriRaw) || itemKategoriRaw.includes(kat.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim()));
          if (kategoriCocok) {
            dataKategoriGrafik[kategoriCocok] = (dataKategoriGrafik[kategoriCocok] || 0) + parseInt(item.nominal || 0);
          } else {
            dataKategoriGrafik["📦 Lainnya"] = (dataKategoriGrafik["📦 Lainnya"] || 0) + parseInt(item.nominal || 0);
          }
        }
      });

      window.renderGrafik(dataKategoriGrafik);
    };

    window.renderGrafik = function(dataKategori) {
      const canvasCtx = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const textCenterTotal = document.getElementById('chartCenterTotal');
      const noDataMsg = document.getElementById('noChartData');
      if (!canvasCtx || !legendContainer) return;
      
      legendContainer.innerHTML = "";
      const labels = Object.keys(dataKategori), values = Object.values(dataKategori);
      const total = values.reduce((a, b) => a + b, 0);
      textCenterTotal.innerText = "Rp " + total.toLocaleString('id-ID');

      if (total === 0) { 
        canvasCtx.parentNode.style.display = 'none'; 
        noDataMsg.classList.remove('hidden'); 
        return; 
      }
      
      canvasCtx.parentNode.style.display = 'flex'; 
      noDataMsg.classList.add('hidden');
      if (myChartInstance !== null) myChartInstance.destroy();

      const labelsAktif = labels.filter((_, idx) => values[idx] > 0);
      const valuesAktif = values.filter(v => v > 0);
      const warnaTerpakai = labelsAktif.map((_, idx) => daftarWarna[idx % daftarWarna.length]);

      labelsAktif.forEach((kat, i) => {
          const persen = ((valuesAktif[i] / total) * 100).toFixed(1);
          legendContainer.insertAdjacentHTML('beforeend', `
            <div class="flex items-center justify-between w-full text-[11px] py-0.5 font-semibold">
              <div class="flex items-center gap-1.5 min-w-[52%]">
                <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background-color:${warnaTerpakai[i]}"></span>
                <span class="text-slate-600 font-bold tracking-tight">${kat}</span>
              </div>
              <span class="text-slate-800 font-bold text-right ml-1 flex-shrink-0 text-[9px] dark:text-slate-300">
                ${persen}% <span class="text-[8px] text-slate-400 font-medium dark:text-slate-400">(${Math.round(valuesAktif[i]/1000)}k)</span>
              </span>
            </div>`);
      });

      myChartInstance = new Chart(canvasCtx, {
        type: 'doughnut',
        data: { labels: labelsAktif, datasets: [{ data: valuesAktif, backgroundColor: warnaTerpakai, borderWidth: 1.5, borderColor: document.body.classList.contains('dark') ? '#131b2e' : '#ffffff' }] },
        options: {
          cutout: '76%', responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: true, displayColors: false, callbacks: { label: (ctx) => " Rp " + ctx.raw.toLocaleString('id-ID'), title: (t) => t[0].label } },
            datalabels: { display: false } 
          }
        }
      });
    };

    window.renderGrafikTrenBulanan = function(dataTrenObj) {
      const canvasCtx = document.getElementById('chartTrenBulanan');
      if (!canvasCtx) return;

      const keysBulan = Object.keys(dataTrenObj || {}).sort(); 
      const namaBulanIndo = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
      
      const labels = keysBulan.map(k => {
        const parts = k.split('-');
        return namaBulanIndo[parseInt(parts[1]) - 1] + " " + parts[0].substring(2);
      });

      const dataMasuk = keysBulan.map(k => dataTrenObj[k].masuk);
      const dataKeluar = keysBulan.map(k => dataTrenObj[k].keluar);

      if (myBarChartInstance !== null) myBarChartInstance.destroy();

      const apaModeGelap = document.body.classList.contains('dark');
      const warnaGarisGrid = apaModeGelap ? '#1e293b' : '#f8fafc';
      const warnaLabelTeks = apaModeGelap ? '#94a3b8' : '#1e293b';

      myBarChartInstance = new Chart(canvasCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Masuk', data: dataMasuk, backgroundColor: '#10b981', borderRadius: 3, barThickness: 7 },
            { label: 'Keluar', data: dataKeluar, backgroundColor: '#f43f5e', borderRadius: 3, barThickness: 7 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { ticks: { font: { family: 'Urbanist', size: 8, weight: 'bold' }, color: warnaLabelTeks, callback: (v) => v >= 1000000 ? (v/1000000) + 'M' : v.toLocaleString('id-ID') }, grid: { color: warnaGarisGrid } },
            x: { ticks: { font: { family: 'Urbanist', size: 9, weight: '700' }, color: warnaLabelTeks }, grid: { display: false } }
          },
          plugins: {
            legend: { position: 'top', labels: { boxWidth: 6, font: { family: 'Urbanist', size: 9, weight: 'bold' }, color: warnaLabelTeks } },
            datalabels: { display: false },
            tooltip: { callbacks: { label: (ctx) => " " + ctx.dataset.label + ": Rp " + ctx.raw.toLocaleString('id-ID') } }
          }
        }
      });
    };

              Swal.fire({ icon: 'error', title: 'Gagal Bersihkan', text: err.toString() });
            });
        }
      });
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');
    window.tombolReloadPintar = () => { document.getElementById('iconReload').classList.add('animate-spin'); window.loadSummary(); window.tukarHalaman('home'); };

    window.handleForm = function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan'); 
      btn.disabled = true; 
      
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const tglMentahValue = document.getElementById('tanggal_mentntah').value;
      const data = { 
        tanggal: tglMentahValue, 
        jenis: document.getElementById('jenis').value, 
        kategori: document.getElementById('kategori').value, 
        nominal: document.getElementById('nominal').value.replace(/\./g, ''), 
        keterangan: document.getElementById('keterangan').value || "-" 
      };
      
      fetch(API_URL, { method: "POST", body: JSON.stringify(data) })
        .then(() => { 
          btn.disabled = false; 
          document.getElementById('formKeuangan').reset(); 
          
          const hariIni = new Date();
          if (instanceFlatpickr) {
            instanceFlatpickr.setDate(hariIni, false); 
          }
          sinkronisasiNilaiTanggalMentah(hariIni);
          
          window.pilihJenisTab('Pengeluaran'); 
          window.loadSummary();
          Swal.close();
        })
        .catch((err) => {
          btn.disabled = false;
          Swal.fire({ icon: 'error', title: 'Gagal menyimpan', text: err.toString() });
        });
    };
    
    window.bukaModalDetailSemua = () => { 
      const modal = document.getElementById('modalDetailTransaksi'); const box = modal.querySelector('div');
      window.buatOpsiFilterBulanModal();
      
      const hariIni = new Date(); const formatKunciBulanIni = hariIni.getFullYear() + "-" + String(hariIni.getMonth() + 1).padStart(2, '0');
      const select = document.getElementById('filterBulanModal'); const triggerLabel = document.getElementById('labelPeriodeTerpilih');
      if (select) {
        const opsiTersedia = Array.from(select.options).some(option => option.value === formatKunciBulanIni);
        if (opsiTersedia) { select.value = formatKunciBulanIni; if (triggerLabel) triggerLabel.innerText = Array.from(select.options).find(option => option.value === formatKunciBulanIni).text; } 
        else { select.value = "ALL"; if (triggerLabel) triggerLabel.innerText = "Tampilkan Semua"; }
      }
      window.renderListModalSesuaiBulan(); modal.classList.remove('hidden'); 
      setTimeout(() => { modal.classList.remove('opacity-0'); if(box) box.classList.remove('translate-y-full'); }, 20); 
    };

    window.tutupModalDetailSemua = () => { 
      const modal = document.getElementById('modalDetailTransaksi'); const box = modal.querySelector('div');
      modal.classList.add('opacity-0'); if(box) box.classList.add('translate-y-full');
      setTimeout(() => { modal.classList.add('hidden'); }, 300); 
    };
    
    function dapatkanDataTerfilterModal() {
      const bulanTerpilih = document.getElementById('filterBulanModal').value;
      let dataHasilFilter = databaseRiwayatRaw || [];
      if (bulanTerpilih !== "ALL") {
        dataHasilFilter = databaseRiwayatRaw.filter(item => item.tanggal && item.tanggal.toString().startsWith(bulanTerpilih));
      }
      return {
        data: dataHasilFilter,
        periodeText: document.getElementById('labelPeriodeTerpilih').innerText
      };
    }

    function bersihkanIkonEmoji(teksRaw) {
      if (!teksRaw) return "Umum";
      return teksRaw.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim();
    }

    window.unduhPDF = function() {
      try {
        if (window.jspdf && window.jspdf.jsPDF) {
          window.jsPDF = window.jspdf.jsPDF;
        }

        const { data, periodeText } = dapatkanDataTerfilterModal();
        
        if (data.length === 0) {
          Swal.fire({ icon: 'warning', title: 'Gagal Ekspor', text: 'Tidak ada data transaksi untuk diekspor pada periode ini.', confirmButtonColor: '#10b981' });
          return;
        }

        Swal.fire({ title: 'Menyiapkan PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let akumulasiMasuk = 0;
        let akumulasiKeluar = 0;
        data.forEach(item => {
          const nominalInt = parseInt(item.nominal) || 0;
          if (item.jenis === "Pemasukan") akumulasiMasuk += nominalInt;
          else akumulasiKeluar += nominalInt;
        });
        const netSaldoBersih = akumulasiMasuk - akumulasiKeluar;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(20);
        doc.setTextColor(5, 150, 105); 
        doc.text("LAPORAN KEUANGAN", 14, 20);
        
        doc.setFont("Helvetica", "normal");
        doc.setFontSize(10);
        doc.setTextColor(100, 116, 139); 
        doc.text(`Periode Laporan: ${periodeText}`, 14, 27);
        doc.text(`Tanggal Cetak: ${new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}`, 14, 32);
        
        doc.setDrawColor(241, 245, 249);
        doc.setLineWidth(0.4);
        doc.line(14, 37, 196, 37);

        doc.setFillColor(248, 250, 252); 
        doc.roundedRect(14, 42, 56, 20, 3, 3, "F");
        doc.roundedRect(75, 42, 56, 20, 3, 3, "F");
        doc.roundedRect(136, 42, 60, 20, 3, 3, "F");

        doc.setFontSize(8);
        doc.setFont("Helvetica", "bold");
        doc.setTextColor(148, 163, 184); 
        doc.text("TOTAL PEMASUKAN", 18, 47);
        doc.text("TOTAL PENGELUARAN", 79, 47);
        doc.text("SALDO BERSIH", 140, 47);

        doc.setFontSize(11);
        doc.setTextColor(16, 185, 129); 
        doc.text("Rp " + akumulasiMasuk.toLocaleString('id-ID'), 18, 55);
        doc.setTextColor(244, 63, 94); 
        doc.text("Rp " + akumulasiKeluar.toLocaleString('id-ID'), 79, 55);
        
        if (netSaldoBersih >= 0) {
          doc.setTextColor(30, 41, 59);
        } else {
          doc.setTextColor(244, 63, 94);
        }
        doc.text("Rp " + netSaldoBersih.toLocaleString('id-ID'), 140, 55);

        const barisTabel = data.map((item, indeks) => {
          const isMasuk = item.jenis === "Pemasukan";
          const nominalFormat = (isMasuk ? "+ " : "- ") + "Rp " + parseInt(item.nominal).toLocaleString('id-ID');
          return [
            indeks + 1,
            formatTanggalFormal(item.tanggal),
            item.keterangan || "-",
            bersihkanIkonEmoji(item.kategori), 
            item.jenis,
            nominalFormat
          ];
        });

        doc.autoTable({
          startY: 68,
          head: [['No', 'Tanggal', 'Keterangan / Nota', 'Kategori', 'Jenis', 'Nominal']],
          body: barisTabel,
          theme: 'grid',
          headStyles: { fillColor: [5, 150, 105], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9.5, cellPadding: 3.5 },
          bodyStyles: { fontSize: 8.5, textColor: [51, 65, 85], cellPadding: 3 },
          alternateRowStyles: { fillColor: [250, 250, 250] },
          styles: { font: 'Helvetica', lineColor: [241, 245, 249], lineWidth: 0.3 },
          columnStyles: {
            0: { cellWidth: 12, halign: 'center', styles: { cellPadding: 2 } },
            1: { cellWidth: 32 },
            3: { cellWidth: 28 },
            4: { cellWidth: 25, fontStyle: 'bold', halign: 'center' },
            5: { cellWidth: 35, halign: 'right', fontStyle: 'bold' }
          },
          didParseCell: function(cellData) {
            if (cellData.section === 'body') {
              if (cellData.column.index === 4) {
                if (cellData.cell.raw === "Pemasukan") cellData.cell.styles.textColor = [5, 150, 105];
                else cellData.cell.styles.textColor = [244, 63, 94];
              }
              if (cellData.column.index === 5) {
                if (cellData.cell.raw && typeof cellData.cell.raw === 'string' && cellData.cell.raw.startsWith("+")) {
                  cellData.cell.styles.textColor = [5, 150, 105]; 
                } else {
                  cellData.cell.styles.textColor = [30, 41, 59]; 
                }
              }
            }
          },
          didDrawPage: function(dataPage) {
            doc.setFontSize(8);
            doc.setFont("Helvetica", "normal");
            doc.setTextColor(148, 163, 184);
            doc.text(`Halaman ${dataPage.pageNumber}`, dataPage.settings.margin.left, doc.internal.pageSize.height - 10);
          }
        });

        Swal.close();
        doc.save(`Laporan_Keuangan_${periodeText.replace(/ /g, "_")}.pdf`);
      } catch (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'Gagal Ekspor PDF', text: 'Detail Kendala: ' + error.message + '. Pastikan tidak membukanya di dalam browser internal aplikasi chat seperti WhatsApp.', confirmButtonColor: '#f43f5e' });
        console.error(error);
      }
    };

    window.unduhExcel = function() {
      try {
        const { data, periodeText } = dapatkanDataTerfilterModal();

        if (data.length === 0) {
          Swal.fire({ icon: 'warning', title: 'Gagal Ekspor', text: 'Tidak ada data transaksi untuk diekspor pada periode ini.', confirmButtonColor: '#10b981' });
          return;
        }

        Swal.fire({ title: 'Membangun Excel Premium...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let sumMasuk = 0;
        let sumKeluar = 0;
        data.forEach(item => {
          const nom = parseInt(item.nominal) || 0;
          if (item.jenis === "Pemasukan") sumMasuk += nom;
          else sumKeluar += nom;
        });
        const sumSaldoBersih = sumMasuk - sumKeluar;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Dashboard Statement');

        worksheet.getCell('A1').value = "LAPORAN KEUANGAN";
        worksheet.getCell('A1').font = { name: 'Segoe UI', size: 16, bold: true, color: { argb: '047857' } };
        
        worksheet.getCell('A2').value = `Periode Dokumen: ${periodeText}`;
        worksheet.getCell('A2').font = { name: 'Segoe UI', size: 10, color: { argb: '64748B' } };
        
        worksheet.getCell('A3').value = `Tanggal Unduh Data: ${new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}`;
        worksheet.getCell('A3').font = { name: 'Segoe UI', size: 10, color: { argb: '64748B' } };

        worksheet.mergeCells('A5:C5');
        worksheet.getCell('A5').value = "RINGKASAN AKUMULASI DANA";
        worksheet.getCell('A5').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'E2E8F0' } };
        worksheet.getCell('A5').font = { name: 'Segoe UI', size: 11, bold: true, color: { argb: '1E293B' } };
        worksheet.getCell('A5').border = {
          top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
          bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
        };

        const isiRingkasan = [
          { row: '6', text: 'Total Akumulasi Pemasukan', val: sumMasuk, color: '059669' },
          { row: '7', text: 'Total Akumulasi Pengeluaran', val: sumKeluar, color: 'B91C1C' },
          { row: '8', text: 'Total Saldo Bersih (Net)', val: sumSaldoBersih, color: sumSaldoBersih >= 0 ? '059669' : 'B91C1C' }
        ];

        isiRingkasan.forEach(item => {
          worksheet.mergeCells(`A${item.row}:B${item.row}`);
          worksheet.getCell(`A${item.row}`).value = item.text;
          worksheet.getCell(`C${item.row}`).value = item.val;
          
          if(item.row === '8') worksheet.getCell(`A${item.row}`).font = { name: 'Segoe UI', bold: true };
          else worksheet.getCell(`A${item.row}`).font = { name: 'Segoe UI' };

          [`A${item.row}`, `B${item.row}`, `C${item.row}`].forEach(ref => {
            worksheet.getCell(ref).border = {
              top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
              bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
            };
          });

          const valCell = worksheet.getCell(`C${item.row}`);
          valCell.numFormat = '"Rp"#,##0';
          valCell.alignment = { horizontal: 'right' };
          valCell.font = { name: 'Segoe UI', bold: true, color: { argb: item.color } };
        });

        const headers = ["No", "Tanggal Transaksi", "Keterangan / Nota", "Kategori", "Jenis Aliran", "Nominal Transaksi"];
        const headerRow = worksheet.getRow(10);
        headerRow.height = 24;

        headers.forEach((h, idx) => {
          const cell = headerRow.getCell(idx + 1);
          cell.value = h;
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '059669' } };
          cell.font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' } };
          cell.alignment = { horizontal: 'center', vertical: 'middle' };
          cell.border = {
            top: { style: 'thin', color: { argb: '10B981' } }, left: { style: 'thin', color: { argb: '10B981' } },
            bottom: { style: 'thin', color: { argb: '10B981' } }, right: { style: 'thin', color: { argb: '10B981' } }
          };
        });

        data.forEach((item, indeks) => {
          const rowNum = 11 + indeks;
          const dRow = worksheet.getRow(rowNum);
          dRow.height = 20;

          const isMasuk = item.jenis === "Pemasukan";
          const bgRowColor = (indeks % 2 === 0) ? 'F8FAFC' : 'FFFFFF'; 
          const finColor = isMasuk ? '059669' : 'B91C1C';

          dRow.getCell(1).value = indeks + 1;
          dRow.getCell(2).value = formatTanggalFormal(item.tanggal);
          dRow.getCell(3).value = item.keterangan || "-";
          dRow.getCell(4).value = bersihkanIkonEmoji(item.kategori);
          dRow.getCell(5).value = item.jenis;
          dRow.getCell(6).value = parseInt(item.nominal) || 0;

          for (let col = 1; col <= 6; col++) {
            const cell = dRow.getCell(col);
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgRowColor } };
            cell.font = { name: 'Segoe UI', size: 10 };
            cell.border = {
              top: { style: 'thin', color: { argb: 'CBD5E1' } }, left: { style: 'thin', color: { argb: 'CBD5E1' } },
              bottom: { style: 'thin', color: { argb: 'CBD5E1' } }, right: { style: 'thin', color: { argb: 'CBD5E1' } }
            };

            if (col === 1) cell.alignment = { horizontal: 'center' };
            if (col === 5) {
              cell.alignment = { horizontal: 'center' };
              cell.font = { name: 'Segoe UI', size: 10, bold: true, color: { argb: finColor } };
            }
            if (col === 6) {
              cell.alignment = { horizontal: 'right' };
              cell.numFormat = '"Rp"#,##0'; 
              cell.font = { name: 'Segoe UI', size: 10, bold: true, color: { argb: finColor } };
            }
          }
        });

        worksheet.autoFilter = {
          from: { row: 10, column: 1 },
          to: { row: 10 + data.length, column: 6 }
        };

        const konfigurasiLebarKolom = [
          { width: 8 },   
          { width: 20 },  
          { width: 28 },  
          { width: 18 },  
          { width: 16 },  
          { width: 24 }   
        ];

        data.forEach(item => {
          if(item.keterangan && item.keterangan.length > konfigurasiLebarKolom[2].width) {
            konfigurasiLebarKolom[2].width = item.keterangan.length + 4;
          }
        });
        worksheet.columns = konfigurasiLebarKolom;

        workbook.xlsx.writeBuffer().then(function(buffer) {
          const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          const urlUnduh = URL.createObjectURL(blob);
          const tautanPemicu = document.createElement("a");
          tautanPemicu.href = urlUnduh;
          tautanPemicu.download = `Laporan_Keuangan_Premium_${periodeText.replace(/ /g, "_")}.xlsx`;
          document.body.appendChild(tautanPemicu);
          tautanPemicu.click();
          document.body.removeChild(tautanPemicu);
          Swal.close();
        });

      } catch (error) {
        Swal.close();
        Swal.fire({ icon: 'error', title: 'Gagal Ekspor Excel', text: 'Detail Kendala: ' + error.message, confirmButtonColor: '#f43f5e' });
        console.error(error);
      }
    };
  </script>
</body>

</html>
