  <style>
    body { font-family: 'Urbanist', sans-serif; background-color: #f8fafc; }

    .btn-pemicu-bulan, .btn-pemicu-tahun { font-family: 'Urbanist', sans-serif !important; font-weight: 700 !important; font-size: 13px !important; color: #1e293b !important; background: #f1f5f9 !important; border: none !important; border-radius: 0.85rem !important; padding: 6px 12px !important; cursor: pointer !important; transition: all 0.2s !important; display: inline-flex !important; align-items: center !important; justify-content: center !important; gap: 5px !important; min-width: 95px !important; }

<body class="w-full min-h-screen flex flex-col pb-[95px]">

        </div>
        <div class="mb-5">

          <div class="relative">
            <input type="text" id="keterangan" placeholder="Contoh: Jajan makan siang" class="w-full p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 font-semibold text-sm text-slate-700 placeholder-slate-400 focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white outline-none transition-all pl-11" required>
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm">
              <i class="fa-regular fa-pen-to-square"></i>
            </div>
          </div>
        </div>
        <div class="flex gap-3 w-full">
          <button type="submit" id="btnSimpan" class="flex-grow bg-emerald-600 text-white font-bold p-4 rounded-2xl shadow-md shadow-emerald-600/10 hover:bg-emerald-700 hover:shadow-emerald-600/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm tracking-wide">

        <i class="fa-solid fa-trash-can"></i> Reset Semua Data

    </div>

    <!-- HALAMAN RIWAYAT -->
    <div id="pageRiwayat" class="w-full flex flex-col gap-6 mb-6 hidden">
      <div class="w-full bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100/80">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-5 bg-rose-500 rounded-full"></div>

          <button onclick="window.bukaPilihanPeriodeHalamanUtama()" class="px-2.5 py-1.5 bg-slate-50 border border-slate-200/60 rounded-xl text-[11px] font-bold text-slate-600 flex items-center gap-1 active:scale-95 transition-all">

        </div>
        <div class="w-full flex flex-row items-center justify-between gap-1 py-1">
          <div class="relative w-[125px] h-[125px] flex-shrink-0 flex items-center justify-center">
            <canvas id="chartPengeluaran"></canvas>
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pt-1">
              <span class="text-[7px] font-bold text-slate-400 tracking-wider uppercase">Total</span>
              <span id="chartCenterTotal" class="text-[12px] font-bold text-slate-800 text-center truncate max-w-[95px]">Rp 0</span>

          <div id="customLegendContainer" class="w-[62%] flex flex-col gap-1.5 max-h-[130px] overflow-y-auto pl-3 custom-scrollbar border-l border-slate-100"></div>

      </div>

      <div class="w-full bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100/80">
        <div class="flex flex-col mb-4">
          <div class="flex items-center gap-2">
            <div class="w-1.5 h-5 bg-blue-500 rounded-full"></div>
            <h3 class="text-base font-bold text-slate-800 tracking-tight">Tren Keuangan Bulanan</h3>
          </div>
        </div>
        <div class="w-full h-[185px]">
          <canvas id="chartTrenBulanan"></canvas>
        </div>
      </div>

      <div class="w-full flex flex-col gap-3">
        <div class="flex items-center justify-between px-1">
          <h3 class="text-sm font-bold text-slate-800">Transaksi Terakhir</h3>

          <i class="fa-solid fa-circle-notch animate-spin text-emerald-600 text-base"></i>

        </div>
        <div id="listRiwayat" class="space-y-2.5 hidden"></div>
        <button id="btnBukaDetail" onclick="window.bukaModalDetailSemua()" class="w-full bg-white border border-slate-200 text-emerald-600 hover:bg-slate-50 font-bold p-3.5 rounded-2xl shadow-sm text-xs tracking-wide transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-2 hidden">
          <span>Buka Riwayat Lengkap</span> <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modalDetailTransaksi" class="fixed inset-0 bg-slate-900/40 z-[100] flex flex-col justify-end hidden opacity-0 transition-opacity duration-300">
    <div class="w-full h-[88vh] bg-white rounded-t-[2.5rem] shadow-2xl flex flex-col transform translate-y-full transition-transform duration-300 overflow-hidden">

          <button onclick="window.tutupModalDetailSemua()" class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-600 rounded-xl active:scale-95 transition-all">

          <h3 class="text-base font-bold text-slate-800">Riwayat Lengkap</h3>

        <span id="txtTotalDataModal" class="text-slate-400 font-bold text-[11px] uppercase tracking-widest bg-slate-100 px-3 py-1.5 rounded-full">0 Transaksi</span>
      </div>
      <div class="w-full bg-white px-6 py-4 border-b border-slate-100 flex-shrink-0 flex flex-col gap-3">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Filter Periode Laporan</label>
          <button id="btnTriggerFilter" onclick="window.bukaPilihanPeriodeModal()" class="w-full p-3.5 bg-slate-50 hover:bg-slate-100/70 border border-slate-200/80 rounded-2xl text-left font-bold text-slate-700 flex justify-between items-center transition-all active:scale-[0.99] focus:outline-none">

          </button>
          <select id="filterBulanModal" onchange="window.renderListModalSesuaiBulan()" class="hidden"></select>
        </div>
        <div class="grid grid-cols-2 gap-3 pt-1">
          <button onclick="window.unduhPDF()" class="bg-rose-50 border border-rose-100/80 text-rose-600 font-bold text-xs uppercase tracking-wider p-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all focus:outline-none">
            <i class="fa-solid fa-file-pdf"></i> PDF
          </button>
          <button onclick="window.unduhExcel()" class="bg-emerald-50 border border-emerald-100/80 text-emerald-600 font-bold text-xs uppercase tracking-wider p-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all focus:outline-none">

  <!-- NAVIGATION -->
  <div class="fixed bottom-0 left-0 right-0 w-full bg-white border-t border-slate-100 shadow-[0_-5px_25px_rgba(0,0,0,0.02)] py-3 px-16 flex justify-around z-50 pb-[calc(14px+env(safe-area-inset-bottom))]">
    <button id="navHome" onclick="window.tukarHalaman('home')" class="text-emerald-600 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">

      <span class="text-[9px] font-bold tracking-widest">HOME</span>
    </button>
    <button id="navRiwayat" onclick="window.tukarHalaman('riwayat')" class="text-slate-400 flex flex-col items-center min-w-[70px] active:scale-95 transition-transform focus:outline-none">
      <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
      <span class="text-[9px] font-bold tracking-widest">RIWAYAT</span>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";
    const daftarKategoriPengeluaran = ["🍔 Makanan", "🚗 Transport", "🏠 Tagihan", "🎬 Hiburan", "🏥 Kesehatan", "📦 Lainnya"];
    const daftarKategoriPemasukan = ["💼 Gaji", "🚀 Sampingan", "📈 Investasi", "🎁 Lainnya"];
    const daftarWarna = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];
    const namaBulanIndoFull = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    let myChartInstance = null; let myBarChartInstance = null; let databaseRiwayatRaw = []; let instanceFlatpickr = null;
    Chart.register(ChartDataLabels);
    if (window.jspdf && window.jspdf.jsPDF) { window.jsPDF = window.jspdf.jsPDF; }

    function formatTanggalIndo(tglString) { if(!tglString) return "-"; const opsi = { day: 'numeric', month: 'long', year: 'numeric' }; const tanggalObj = new Date(tglString); const hariIni = new Date(); const kemarin = new Date(); kemarin.setDate(hariIni.getDate() - 1); if(tanggalObj.toDateString() === hariIni.toDateString()) return "Hari Ini"; if(tanggalObj.toDateString() === kemarin.toDateString()) return "Kemarin"; return tanggalObj.toLocaleDateString('id-ID', opsi); }
    function formatTanggalFormal(tglString) { if(!tglString) return "-"; const tanggalObj = new Date(tglString); if (isNaN(tanggalObj)) return "-"; return tanggalObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }); }
    function sinkronisasiNilaiTanggalMentah(dateObj) { const d = dateObj instanceof Date && !isNaN(dateObj) ? dateObj : new Date(); document.getElementById('tanggal_mentah').value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

    document.addEventListener('DOMContentLoaded', () => {
      instanceFlatpickr = flatpickr("#tanggal", { locale: "id", dateFormat: "d F Y", defaultDate: new Date(), onReady: function(s, d, i) { sinkronisasiNilaiTanggalMentah(s[0]); window.buatPemicuKapsulKalenderCustom(i); }, onChange: function(s) { sinkronisasiNilaiTanggalMentah(s[0]); } });
      window.updateKategoriOptions(); window.loadSummary();
    });

    window.buatPemicuKapsulKalenderCustom = function(instance) {
      const containerHeader = instance.calendarContainer.querySelector('.flatpickr-current-month');
      if (!containerHeader) return;
      const pemicuLamaBulan = containerHeader.querySelector('.btn-pemicu-bulan'); if (pemicuLamaBulan) pemicuLamaBulan.remove();
      const pemicuLamaTahun = containerHeader.querySelector('.btn-pemicu-tahun'); if (pemicuLamaTahun) pemicuLamaTahun.remove();
      const btnBulan = document.createElement('button'); btnBulan.type = 'button'; btnBulan.className = 'btn-pemicu-bulan'; btnBulan.innerHTML = `<span>${namaBulanIndoFull[instance.currentMonth]}</span> <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i>`; btnBulan.addEventListener('click', () => window.bukaBottomSheetBulanKalender(instance));
      const btnTahun = document.createElement('button'); btnTahun.type = 'button'; btnTahun.className = 'btn-pemicu-tahun'; btnTahun.innerHTML = `<span>${instance.currentYear}</span> <i class="fa-solid fa-chevron-down text-[9px] opacity-50"></i>`; btnTahun.addEventListener('click', () => window.bukaBottomSheetTahunKalender(instance));
      containerHeader.appendChild(btnBulan); containerHeader.appendChild(btnTahun);
    };

    window.bukaBottomSheetBulanKalender = function(instance) {
      let htmlListBulan = `<div class="flex flex-col gap-2.5 text-left max-h-[45vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      namaBulanIndoFull.forEach((n, i) => { const isSelected = i === instance.currentMonth; htmlListBulan += `<button type="button" onclick="window.setBulanKalenderDariSheet(${i})" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${isSelected ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-100 text-slate-700 font-semibold active:bg-slate-100'}"><span class="text-sm">${n}</span>${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-4 h-4 rounded-full border border-slate-300 bg-white"></div>'}</button>`; });
      htmlListBulan += `</div>`;
      Swal.fire({ title: 'Pilih Bulan', html: htmlListBulan, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Batal', cancelButtonColor: '#f1f5f9', customClass: { popup: 'premium-bottom-sheet' } });
    };

    window.setBulanKalenderDariSheet = function(indeks) { if (instanceFlatpickr) { instanceFlatpickr.jumpToDate(new Date(instanceFlatpickr.currentYear, indeks, 1), false); } Swal.close(); };

    window.bukaBottomSheetTahunKalender = function(instance) {
      const cur = new Date().getFullYear(); let htmlListTahun = `<div class="flex flex-col gap-2.5 text-left max-h-[45vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      for (let y = cur - 5; y <= cur + 5; y++) { const isSelected = y === instance.currentYear; htmlListTahun += `<button type="button" onclick="window.setTahunKalenderDariSheet(${y})" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${isSelected ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-100 text-slate-700 font-semibold active:bg-slate-100'}"><span class="text-sm">Tahun ${y}</span>${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-4 h-4 rounded-full border border-slate-300 bg-white"></div>'}</button>`; }
      Swal.fire({ title: 'Pilih Tahun', html: htmlListTahun, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Batal', customClass: { popup: 'premium-bottom-sheet' } });
    };

    window.setTahunKalenderDariSheet = function(thn) { if (instanceFlatpickr) { instanceFlatpickr.jumpToDate(new Date(thn, instanceFlatpickr.currentMonth, 1), false); } Swal.close(); };

    window.pilihJenisTab = function(jenis) { document.getElementById('jenis').value = jenis; const btnK = document.getElementById('btnTabPengeluaran'); const btnM = document.getElementById('btnTabPemasukan'); if (jenis === 'Pengeluaran') { btnK.className = "w-full py-3 rounded-xl font-bold text-sm bg-white text-rose-600 shadow-sm"; btnM.className = "w-full py-3 rounded-xl font-bold text-sm text-slate-500 hover:text-slate-700"; } else { btnM.className = "w-full py-3 rounded-xl font-bold text-sm bg-white text-emerald-600 shadow-sm"; btnK.className = "w-full py-3 rounded-xl font-bold text-sm text-slate-500 hover:text-slate-700"; } window.updateKategoriOptions(); };

    window.bukaBottomSheetPilihanKategori = function() { const jenis = document.getElementById('jenis').value; const opsi = (jenis === "Pengeluaran") ? daftarKategoriPengeluaran : daftarKategoriPemasukan; const kAktif = document.getElementById('kategori').value; let html = `<div class="grid grid-cols-1 gap-2.5 max-h-[45vh] overflow-y-auto pt-2 custom-scrollbar">`; opsi.forEach(kat => { const isS = kat === kAktif; html += `<button type="button" onclick="window.setKategoriDariBottomSheet('${kat}')" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${isS ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-100 text-slate-700 font-semibold'}"><span class="text-sm">${kat}</span>${isS ? '<i class="fa-solid fa-circle-check text-emerald-600"></i>' : ''}</button>`; }); Swal.fire({ title: 'Pilih Kategori', html: html, showConfirmButton: false, showCancelButton: true, customClass: { popup: 'premium-bottom-sheet' } }); };

    window.setKategoriDariBottomSheet = function(kat) { document.getElementById('kategori').value = kat; document.getElementById('txtKategoriTerpilihLabel').innerText = kat; Swal.close(); };

    window.updateKategoriOptions = function() { const jenis = document.getElementById('jenis').value; const def = (jenis === "Pengeluaran") ? daftarKategoriPengeluaran[0] : daftarKategoriPemasukan[0]; document.getElementById('kategori').value = def; document.getElementById('txtKategoriTerpilihLabel').innerText = def; };

    window.tukarHalaman = function(menu) { if (menu === 'home') { document.getElementById('pageHome').classList.remove('hidden'); document.getElementById('pageRiwayat').classList.add('hidden'); } else { document.getElementById('pageHome').classList.add('hidden'); document.getElementById('pageRiwayat').classList.remove('hidden'); } window.loadSummary(); };

    window.aplikasikanDataKeUI = function(res) { document.getElementById('txtSaldo').innerText = res.saldo || "Rp 0"; document.getElementById('txtMasuk').innerText = res.pemasukan || "Rp 0"; document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0"; databaseRiwayatRaw = res.riwayat || []; window.buatOpsiFilterBulanModal(); window.renderHalamanRiwayatUtama(); window.prosesFilterKategoriBulanUtama(); window.renderGrafikTrenBulanan(res.trenBulananRaw || {}); };

    window.loadSummary = function() { const localCache = localStorage.getItem('app_keuangan_cache'); if (localCache) { try { window.aplikasikanDataKeUI(JSON.parse(localCache)); } catch(e){} } const script = document.createElement('script'); script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime(); document.body.appendChild(script); };

    window.handleGoogleData = function(res) { document.getElementById('iconReload').classList.remove('animate-spin'); if (res) { localStorage.setItem('app_keuangan_cache', JSON.stringify(res)); window.aplikasikanDataKeUI(res); } };

    window.renderHalamanRiwayatUtama = function() { const list = document.getElementById('listRiwayat'); if (!list) return; list.innerHTML = ""; if (databaseRiwayatRaw.length > 0) { const data = databaseRiwayatRaw.slice(0, 3); let html = ''; data.forEach((item, idx) => { const isM = item.jenis === "Pemasukan"; html += `<div onclick="window.bukaOpsiAksiTransaksi(${idx})" class="flex items-center justify-between py-3 px-1 border-b border-slate-50 cursor-pointer"><div class="flex items-center gap-3"><div class="w-9 h-9 flex items-center justify-center rounded-xl text-xs ${isM ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'}"><i class="fa-solid ${isM ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i></div><div><h4 class="text-[13px] font-bold text-slate-800">${item.keterangan}</h4><span class="text-[9px] text-slate-400 font-bold uppercase">${item.kategori} &bull; ${formatTanggalIndo(item.tanggal)}</span></div></div><span class="text-xs font-bold ${isM ? 'text-emerald-600' : 'text-slate-800'}">${isM ? '+' : '-'} Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</span></div>`; }); list.innerHTML = `<div class="bg-white p-3 rounded-3xl border border-slate-100">${html}</div>`; document.getElementById('loadingRiwayat').classList.add('hidden'); list.classList.remove('hidden'); } };

    window.prosesFilterKategoriBulanUtama = function() { const bulan = document.getElementById('filterBulanUtamaHidden').value; const grafik = {}; daftarKategoriPengeluaran.forEach(k => grafik[k] = 0); (databaseRiwayatRaw || []).filter(i => bulan === "ALL" || (i.tanggal && i.tanggal.startsWith(bulan))).forEach(i => { if (i.jenis !== "Pemasukan") { const k = daftarKategoriPengeluaran.find(kat => kat.includes(i.kategori)) || "📦 Lainnya"; grafik[k] = (grafik[k] || 0) + parseInt(i.nominal || 0); } }); window.renderGrafik(grafik); };

    window.renderGrafik = function(grafik) { const ctx = document.getElementById('chartPengeluaran'); const legend = document.getElementById('customLegendContainer'); legend.innerHTML = ""; const L = Object.keys(grafik), V = Object.values(grafik); const T = V.reduce((a, b) => a + b, 0); document.getElementById('chartCenterTotal').innerText = "Rp " + T.toLocaleString('id-ID'); if (myChartInstance !== null) myChartInstance.destroy(); const activeL = L.filter((_, i) => V[i] > 0), activeV = V.filter(v => v > 0), colors = activeL.map((_, i) => daftarWarna[i % daftarWarna.length]); activeL.forEach((kat, i) => { legend.insertAdjacentHTML('beforeend', `<div class="flex items-center justify-between w-full text-[12px] font-semibold"><div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background-color:${colors[i]}"></span><span class="text-slate-600">${kat}</span></div><span class="text-slate-800">${((activeV[i]/T)*100).toFixed(0)}%</span></div>`); }); myChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: activeL, datasets: [{ data: activeV, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff' }] }, options: { cutout: '75%', plugins: { legend: { display: false } } } }); };

    window.renderGrafikTrenBulanan = function(tren) { const ctx = document.getElementById('chartTrenBulanan'); const keys = Object.keys(tren || {}).sort(); if (myBarChartInstance !== null) myBarChartInstance.destroy(); myBarChartInstance = new Chart(ctx, { type: 'bar', data: { labels: keys.map(k => k.split('-')[1]), datasets: [{ label: 'Masuk', data: keys.map(k => tren[k].masuk), backgroundColor: '#10b981' }, { label: 'Keluar', data: keys.map(k => tren[k].keluar), backgroundColor: '#f43f5e' }] }, options: { plugins: { legend: { position: 'top' } } } }); };

    window.unduhExcel = function() {
      const { data, periodeText } = dapatkanDataTerfilterModal();
      Swal.fire({ title: 'Membangun Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      let sumM = 0, sumK = 0; data.forEach(i => { const n = parseInt(i.nominal) || 0; if (i.jenis === "Pemasukan") sumM += n; else sumK += n; });
      const rows = [
        ["LAPORAN KEUANGAN"], [periodeText], [], 
        ["RINGKASAN"], ["Total Pemasukan", sumM], ["Total Pengeluaran", sumK], ["Saldo Bersih", sumM - sumK], [],
        ["No", "Tanggal", "Keterangan", "Kategori", "Jenis", "Nominal"]
      ];
      data.forEach((i, idx) => rows.push([idx+1, i.tanggal, i.keterangan, i.kategori, i.jenis, parseInt(i.nominal)]));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      
      // Formatting modern native Excel
      ['B6', 'B7', 'B8'].forEach(r => { if(ws[r]) { ws[r].t = 'n'; ws[r].z = '"Rp"#,##0'; } });
      data.forEach((_, i) => { const r = 'F' + (11+i); if(ws[r]) { ws[r].t = 'n'; ws[r].z = '"Rp"#,##0'; } });
      ws['!autofilter'] = { ref: `A10:F${10+data.length}` };
      ws['!cols'] = [{ wch: 6 }, { wch: 15 }, { wch: 25 }, { wch: 15 }, { wch: 12 }, { wch: 20 }];
      
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Riwayat");
      XLSX.writeFile(wb, `Laporan_${periodeText.replace(/ /g, "_")}.xlsx`);
      Swal.close();
    };

    window.resetSemuaData = function() {
      Swal.fire({ title: 'Reset?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', confirmButtonColor: '#f43f5e' }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          fetch(API_URL + "?action=reset", { method: "POST" }).then(() => { localStorage.removeItem('app_keuangan_cache'); Swal.fire({ icon: 'success', title: 'Data Direset!' }); window.loadSummary(); });
        }
      });
    };
  </script>
</body>
</html>
