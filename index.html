<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 pb-[90px]">

  <div class="w-full bg-emerald-600 p-6 text-white rounded-b-[2.5rem]">
    <h2 id="txtSaldo" class="text-3xl font-bold">Rp 0</h2>
  </div>

  <div class="w-full px-4 mt-6" id="mainContainer">
    <div id="pageHome" class="bg-white p-6 rounded-3xl shadow-sm mb-6">
      <h3 class="text-lg font-bold mb-4">Tambah Transaksi</h3>
      <form id="formKeuangan" onsubmit="window.handleForm(event)">
        <input type="date" id="tanggal" class="w-full p-3 mb-4 bg-slate-50 rounded-xl">
        <select id="jenis" onchange="window.updateKategoriOptions()" class="w-full p-3 mb-4 bg-slate-50 rounded-xl"></select>
        <select id="kategori" class="w-full p-3 mb-4 bg-slate-50 rounded-xl"></select>
        <input type="text" id="nominal" placeholder="Nominal" oninput="window.formatInputRupiah(this)" class="w-full p-3 mb-4 bg-slate-50 rounded-xl">
        <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-3 mb-4 bg-slate-50 rounded-xl">
        <button type="submit" id="btnSimpan" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold">Simpan</button>
      </form>
    </div>

    <div id="pageRiwayat" class="bg-white p-6 rounded-3xl shadow-sm hidden">
      <h3 class="text-lg font-bold mb-3">Riwayat</h3>
      <div id="listRiwayat" class="space-y-3"></div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full bg-white border-t py-4 flex justify-around z-50">
    <button onclick="window.tukarHalaman('home')" class="text-emerald-600 font-bold">HOME</button>
    <button onclick="window.tukarHalaman('riwayat')" class="text-slate-400 font-bold">RIWAYAT</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";

    window.tukarHalaman = function(menu) {
      document.getElementById('pageHome').classList.toggle('hidden', menu !== 'home');
      document.getElementById('pageRiwayat').classList.toggle('hidden', menu !== 'riwayat');
    };

    window.updateKategoriOptions = function() {
      const jenis = document.getElementById('jenis').value;
      const kategoriSelect = document.getElementById('kategori');
      kategoriSelect.innerHTML = jenis === 'Pengeluaran' ? '<option>Makanan</option><option>Transport</option>' : '<option>Gaji</option>';
    };

    window.formatInputRupiah = function(input) {
      let val = input.value.replace(/[^0-9]/g, '');
      input.value = val ? parseInt(val).toLocaleString('id-ID') : '';
    };

    window.handleForm = function(e) {
      e.preventDefault();
      Swal.fire('Berhasil', 'Transaksi disimpan!', 'success');
    };
    
    // Inisialisasi awal
    window.updateKategoriOptions();
  </script>
</body>
</html>
