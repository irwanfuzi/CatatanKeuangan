    const API_URL = "https://script.google.com/macros/s/AKfycbwk9WxEshShA_NdpfYl_ol9w520n1m9WtzUJ6Kxrv5u-5WzOvqKTeCyLjdMe3QJrAf4/exec";

    const daftarKategoriPemasukan = ["💼 Gaji", "🚀 Sampingan", "📈 Investasi", "🎁 Lainnya"];
    const daftarWarna = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];
    let myChartInstance = null;
    let myBarChartInstance = null; 
    let databaseRiwayatRaw = []; 
    let instanceFlatpickr = null;

    Chart.register(ChartDataLabels);

    function formatTanggalIndo(tglString) {
      if(!tglString) return "-";
      const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
      const tanggalObj = new Date(tglString);
      
      const hariIni = new Date();
      const kemarin = new Date();
      kemarin.setDate(hariIni.getDate() - 1);
      
      if(tanggalObj.toDateString() === hariIni.toDateString()) return "Hari Ini";
      if(tanggalObj.toDateString() === kemarin.toDateString()) return "Kemarin";
      
      return tanggalObj.toLocaleDateString('id-ID', opsi);
    }

    function sinkronisasiNilaiTanggalMentah(dateObj) {
      if (dateObj instanceof Date && !isNaN(dateObj)) {
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        document.getElementById('tanggal_mentah').value = `${yyyy}-${mm}-${dd}`;
      } else {
        const hariIni = new Date();
        const yyyy = hariIni.getFullYear();

      document.getElementById('txtKeluar').innerText = res.pengeluaran || "Rp 0";

        if (adaBulanIni) {
          selectUtama.value = formatKunciBulanIni;

          document.getElementById('labelPeriodeUtama').innerText = opsiDitemukan.text;
        } else {

          document.getElementById('labelPeriodeUtama').innerText = selectUtama.options[0] ? selectUtama.options[0].text : "Tampilkan Semua";

      window.prosesFilterKategoriBulanUtama();
      window.renderGrafikTrenBulanan(res.trenBulananRaw || {});

    window.loadSummary = function() {
      const localCache = localStorage.getItem('app_keuangan_cache');
      if (localCache) {
        try {
          const resCached = JSON.parse(localCache);
          window.aplikasikanDataKeUI(resCached); 
        } catch(e) {
          console.log("Gagal memproses cache.");
        }
      }

      const oldScript = document.getElementById('google-jsonp-script');
      if (oldScript) oldScript.remove();
      const script = document.createElement('script');
      script.id = 'google-jsonp-script';
      script.src = API_URL + "?callback=handleGoogleData&ts=" + new Date().getTime();
      document.body.appendChild(script);
    };

    window.handleGoogleData = function(res) {
      const icon = document.getElementById('iconReload');

    window.prosesFilterKategoriBulanUtama = function() {
      const bulanTerpilih = document.getElementById('filterBulanUtamaHidden').value;
      const dataKategoriGrafik = {};
      daftarKategoriPengeluaran.forEach(kat => dataKategoriGrafik[kat] = 0);

      let dataHasilFilter = databaseRiwayatRaw || [];
      if (bulanTerpilih !== "ALL") {
        dataHasilFilter = databaseRiwayatRaw.filter(item => item.tanggal && item.tanggal.toString().startsWith(bulanTerpilih));
      }

      dataHasilFilter.forEach(item => {
        if (item.jenis !== "Pemasukan") {
          const itemKategoriRaw = item.kategori || "";
          const kategoriCocok = daftarKategoriPengeluaran.find(kat => kat.includes(itemKategoriRaw) || itemKategoriRaw.includes(kat.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, "").trim()));
          if (kategoriCocok) {
            dataKategoriGrafik[kategoriCocok] = (dataKategoriGrafik[kategoriCocok] || 0) + parseInt(item.nominal || 0);
          } else {
            dataKategoriGrafik["📦 Lainnya"] = (dataKategoriGrafik["📦 Lainnya"] || 0) + parseInt(item.nominal || 0);
          }
        }
      });

      window.renderGrafik(dataKategoriGrafik);
    };

    window.renderGrafik = function(dataKategori) {
      const canvasCtx = document.getElementById('chartPengeluaran');
      const legendContainer = document.getElementById('customLegendContainer');
      const textCenterTotal = document.getElementById('chartCenterTotal');
      const noDataMsg = document.getElementById('noChartData');
      if (!canvasCtx || !legendContainer) return;
      
      legendContainer.innerHTML = "";
      const labels = Object.keys(dataKategori), values = Object.values(dataKategori);
      const total = values.reduce((a, b) => a + b, 0);
      textCenterTotal.innerText = "Rp " + total.toLocaleString('id-ID');

      if (total === 0) { 
        canvasCtx.parentNode.style.display = 'none'; 
        noDataMsg.classList.remove('hidden'); 
        return; 
      }
      
      canvasCtx.parentNode.style.display = 'flex'; 
      noDataMsg.classList.add('hidden');
      if (myChartInstance !== null) myChartInstance.destroy();

      const labelsAktif = labels.filter((_, idx) => values[idx] > 0);
      const valuesAktif = values.filter(v => v > 0);
      const warnaTerpakai = labelsAktif.map((_, idx) => daftarWarna[idx % daftarWarna.length]);

      labelsAktif.forEach((kat, i) => {
          const persen = ((valuesAktif[i] / total) * 100).toFixed(1);
          legendContainer.insertAdjacentHTML('beforeend', `
            <div class="flex items-center justify-between w-full text-[12px] py-0.5 font-semibold">
              <div class="flex items-center gap-1.5 min-w-[55%]">
                <span class="w-2 h-2 rounded-full flex-shrink-0" style="background-color:${warnaTerpakai[i]}"></span>
                <span class="text-slate-600 font-bold tracking-tight">${kat}</span>
              </div>
              <span class="text-slate-800 font-bold text-right ml-1 flex-shrink-0 text-[10px]">
                ${persen}% <span class="text-[9px] text-slate-400 font-medium">(${Math.round(valuesAktif[i]/1000)}k)</span>
              </span>
            </div>`);
      });

      myChartInstance = new Chart(canvasCtx, {
        type: 'doughnut',
        data: { labels: labelsAktif, datasets: [{ data: valuesAktif, backgroundColor: warnaTerpakai, borderWidth: 2, borderColor: '#ffffff' }] },
        options: {
          cutout: '75%', 
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: true, displayColors: false, callbacks: { label: (ctx) => " Rp " + ctx.raw.toLocaleString('id-ID'), title: (t) => t[0].label } },
            datalabels: { display: false } 
          }
        }
      });
    };

    window.renderGrafikTrenBulanan = function(dataTrenObj) {
      const canvasCtx = document.getElementById('chartTrenBulanan');
      if (!canvasCtx) return;

      const keysBulan = Object.keys(dataTrenObj || {}).sort(); 
      const namaBulanIndo = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
      
      const labels = keysBulan.map(k => {
        const parts = k.split('-');
        return namaBulanIndo[parseInt(parts[1]) - 1] + " " + parts[0].substring(2);
      });

      const dataMasuk = keysBulan.map(k => dataTrenObj[k].masuk);
      const dataKeluar = keysBulan.map(k => dataTrenObj[k].keluar);

      if (myBarChartInstance !== null) myBarChartInstance.destroy();

      myBarChartInstance = new Chart(canvasCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Masuk', data: dataMasuk, backgroundColor: '#10b981', borderRadius: 4, barThickness: 8 },
            { label: 'Keluar', data: dataKeluar, backgroundColor: '#f43f5e', borderRadius: 4, barThickness: 8 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { ticks: { font: { family: 'Urbanist', size: 9, weight: 'bold' }, callback: (v) => v >= 1000000 ? (v/1000000) + 'M' : v.toLocaleString('id-ID') }, grid: { color: '#f8fafc' } },
            x: { ticks: { font: { family: 'Urbanist', size: 10, weight: '700' } }, grid: { display: false } }
          },
          plugins: {
            legend: { position: 'top', labels: { boxWidth: 8, font: { family: 'Urbanist', size: 10, weight: 'bold' } } },
            datalabels: { display: false },
            tooltip: { callbacks: { label: (ctx) => " " + ctx.dataset.label + ": Rp " + ctx.raw.toLocaleString('id-ID') } }
          }
        }
      });
    };

        title: 'Kelola Transaksi',

        showDenyButton: true,

        html: `
          <div class="flex flex-col gap-4 text-left font-urbanist p-1">

              <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Keterangan Baru</label>

              <input type="text" id="swalEditNominal" value="${parseInt(item.nominal).toLocaleString('id-ID')}" oninput="window.formatInputRupiah(this)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/30 font-bold text-slate-700">

      }).then((result) => {

    window.buatOpsiFilterBulanModal = function() {
      const selectUtama = document.getElementById('filterBulanUtamaHidden');
      const selectModal = document.getElementById('filterBulanModal');
      if (!selectUtama || !selectModal) return;
      
      const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const keys = [...new Set(databaseRiwayatRaw.map(i => i.tanggal ? i.tanggal.toString().substring(0, 7) : ""))].filter(k => k !== "");
      
      let htmlUtama = '<option value="ALL">Semua Periode</option>';
      let htmlModal = '<option value="ALL">Tampilkan Semua</option>';
      
      keys.sort().reverse().forEach(k => {
        const p = k.split('-');
        const namaBulan = bulan[parseInt(p[1])-1];
        htmlUtama += `<option value="${k}">${namaBulan} ${p[0]}</option>`;
        htmlModal += `<option value="${k}">${namaBulan} ${p[0]}</option>`;
      });
      
      selectUtama.innerHTML = htmlUtama;
      selectModal.innerHTML = htmlModal;
    };

      Swal.fire({
        title: 'Pilih Periode Analisis', html: listHTML, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Tutup', cancelButtonColor: '#f1f5f9', background: '#ffffff',
        customClass: { popup: 'premium-bottom-sheet', title: 'font-bold text-lg text-slate-800 pt-1 border-b pb-3', cancelButton: 'w-full bg-slate-100 text-slate-600 font-bold py-3.5 rounded-2xl text-sm border focus:ring-0 mt-2' }
      });
    };

    window.setPeriodeHalamanUtamaDariList = function(val, txt) {
      document.getElementById('filterBulanUtamaHidden').value = val;
      document.getElementById('labelPeriodeUtama').innerText = txt;
      window.prosesFilterKategoriBulanUtama();
      Swal.close();
    };

    window.bukaPilihanPeriodeModal = function() {
      const select = document.getElementById('filterBulanModal');
      const nilaiSekarang = select.value;
      let listHTML = `<div class="flex flex-col gap-2.5 text-left max-h-[50vh] overflow-y-auto pt-2 px-1 custom-scrollbar">`;
      for (let i = 0; i < select.options.length; i++) {
        const val = select.options[i].value; const txt = select.options[i].text; const isSelected = val === nilaiSekarang;
        listHTML += `
          <button onclick="window.setPeriodeModalDariList('${val}', '${txt}')" class="w-full flex items-center justify-between p-4 rounded-2xl border transition-all ${
            isSelected ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-100 text-slate-700 font-medium active:bg-slate-100'
          }">
            <span class="text-sm">${txt}</span>
            ${isSelected ? '<i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>' : '<div class="w-3.5 h-3.5 rounded-full border border-slate-300 bg-white"></div>'}
          </button>`;
      }
      listHTML += `</div>`;
      Swal.fire({
        title: 'Pilih Periode Laporan', html: listHTML, showConfirmButton: false, showCancelButton: true, cancelButtonText: 'Tutup', cancelButtonColor: '#f1f5f9', background: '#ffffff',
        customClass: { popup: 'premium-bottom-sheet', title: 'font-bold text-lg text-slate-800 pt-1 border-b pb-3', cancelButton: 'w-full bg-slate-100 text-slate-600 font-bold py-3.5 rounded-2xl text-sm border focus:ring-0 mt-2' }
      });
    };

    window.setPeriodeModalDariList = function(val, txt) {
      document.getElementById('filterBulanModal').value = val;
      document.getElementById('labelPeriodeTerpilih').innerText = txt;
      window.renderListModalSesuaiBulan();
      Swal.close();
    };

    window.renderListModalSesuaiBulan = function() {
      const listModalContainer = document.getElementById('listRiwayatPenuhModal');
      const bulanTerpilih = document.getElementById('filterBulanModal').value;
      if (!listModalContainer) return;
      listModalContainer.innerHTML = "";

      let dataHasilFilterBulan = databaseRiwayatRaw || [];
      if (bulanTerpilih !== "ALL") {
        dataHasilFilterBulan = databaseRiwayatRaw.filter(item => item.tanggal && item.tanggal.toString().startsWith(bulanTerpilih));
      }

      document.getElementById('txtTotalDataModal').innerText = dataHasilFilterBulan.length + " Transaksi";

      if(dataHasilFilterBulan.length === 0) {
        listModalContainer.innerHTML = "<div class='text-slate-400 py-6 text-center text-xs font-semibold'>Tidak ada transaksi di periode ini.</div>";
        return;
      }

      const grupTransactionsModal = {};
      dataHasilFilterBulan.forEach(item => {
        if(item.tanggal) {
          const tglStr = item.tanggal.toString();
          if (!grupTransactionsModal[tglStr]) grupTransactionsModal[tglStr] = [];
          grupTransactionsModal[tglStr].push(item);
        }
      });

      Object.keys(grupTransactionsModal).sort((a,b) => new Date(b) - new Date(a)).forEach(tgl => {
        let susunanHTMLItemModal = '';
        grupTransactionsModal[tgl].forEach(item => {
          const isMasuk = item.jenis === "Pemasukan";
          const indexAsli = databaseRiwayatRaw.findIndex(x => x === item);
          
          susunanHTMLItemModal += `
            <div onclick="window.bukaOpsiAksiTransaksi(${indexAsli})" class="flex items-center justify-between py-3 px-2 hover:bg-slate-100/40 border-b border-slate-50 last:border-b-0 transition-all rounded-xl cursor-pointer">
              <div class="flex items-center gap-3 min-w-[70%]">
                <div class="w-9 h-9 flex items-center justify-center rounded-xl text-xs flex-shrink-0 ${isMasuk ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'}">
                  <i class="fa-solid ${isMasuk ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                </div>
                <div class="truncate">
                  <h4 class="text-[13px] font-bold text-slate-800 truncate mb-0.5">${item.keterangan || "-"}</h4>
                  <span class="inline-block text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide ${isMasuk ? 'text-emerald-700 bg-emerald-50/70' : 'text-slate-500 bg-slate-100'}">
                    ${item.kategori || "Umum"}
                  </span>
                </div>
              </div>
              <span class="text-xs font-bold flex-shrink-0 text-right ${isMasuk ? 'text-emerald-600' : 'text-slate-800'}">
                ${isMasuk ? '+' : '-'} Rp ${parseInt(item.nominal || 0).toLocaleString('id-ID')}
              </span>
            </div>`;
        });

        listModalContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-[0_4px_16px_rgba(51,65,85,0.02)] flex flex-col mb-4">
            <div class="text-[11px] font-bold text-slate-400 tracking-wider uppercase border-b border-slate-100/80 pb-2 mb-1 flex justify-between items-center">
              <span>${formatTanggalIndo(tgl)}</span>
              <span class="text-[10px] font-semibold lowercase text-slate-300">${tgl}</span>
            </div>
            <div class="divide-y divide-slate-100/60">${susunanHTMLItemModal}</div>
          </div>`);
      });
    };

    window.resetSemuaData = function() {
      Swal.fire({
        title: 'Reset Semua Data?', text: "Tindakan ini menghapus permanen data.", icon: 'warning', iconColor: '#f43f5e', showCancelButton: true, background: '#ffffff', confirmButtonColor: '#f43f5e', cancelButtonColor: '#f1f5f9', confirmButtonText: 'Hapus Semua', cancelButtonText: 'Batal',
        customClass: { popup: 'rounded-[2rem] p-6 shadow-xl border border-slate-100', title: 'font-bold text-base text-slate-800 family-urbanist pt-2', htmlContainer: 'text-xs text-slate-500 family-urbanist px-2', confirmButton: 'rounded-2xl font-bold px-6 py-3.5 text-xs transition-all active:scale-95 focus:ring-0', cancelButton: 'rounded-2xl font-bold px-6 py-3.5 text-xs text-slate-600 transition-all active:scale-95 focus:ring-0' }
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'Cleaning...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          fetch(API_URL + "?action=reset", { method: "POST" }).then(() => { localStorage.removeItem('app_keuangan_cache'); window.loadSummary(); });
        }
      });
    };

    window.formatInputRupiah = (i) => i.value = parseInt(i.value.replace(/[^0-9]/g, '') || 0).toLocaleString('id-ID');
    window.tombolReloadPintar = () => { document.getElementById('iconReload').classList.add('animate-spin'); window.loadSummary(); window.tukarHalaman('home'); };

    window.handleForm = function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSimpan'); 
      btn.disabled = true; 
      
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const tglMentahValue = document.getElementById('tanggal_mentah').value;
      const data = { 
        tanggal: tglMentahValue, 
        jenis: document.getElementById('jenis').value, 
        kategori: document.getElementById('kategori').value, 
        nominal: document.getElementById('nominal').value.replace(/\./g, ''), 
        keterangan: document.getElementById('keterangan').value || "-" 
      };
      
      fetch(API_URL, { method: "POST", body: JSON.stringify(data) })
        .then(() => { 
          btn.disabled = false; 
          document.getElementById('formKeuangan').reset(); 
          
          const hariIni = new Date();
          if (instanceFlatpickr) {
            instanceFlatpickr.setDate(hariIni, false); 
          }
          sinkronisasiNilaiTanggalMentah(hariIni);
          
          window.pilihJenisTab('Pengeluaran'); 
          window.loadSummary();
          Swal.close();
        })
        .catch((err) => {
          btn.disabled = false;
          Swal.fire({ icon: 'error', title: 'Gagal menyimpan', text: err.toString() });
        });
    };
    
    window.bukaModalDetailSemua = () => { 
      const modal = document.getElementById('modalDetailTransaksi'); const box = modal.querySelector('div');
      
      window.buatOpsiFilterBulanModal();
      
      const hariIni = new Date(); const formatKunciBulanIni = hariIni.getFullYear() + "-" + String(hariIni.getMonth() + 1).padStart(2, '0');
      const select = document.getElementById('filterBulanModal'); const triggerLabel = document.getElementById('labelPeriodeTerpilih');
      if (select) {
        const opsiTersedia = Array.from(select.options).some(option => option.value === formatKunciBulanIni);
        if (opsiTersedia) { select.value = formatKunciBulanIni; if (triggerLabel) triggerLabel.innerText = Array.from(select.options).find(option => option.value === formatKunciBulanIni).text; } 
        else { select.value = "ALL"; if (triggerLabel) triggerLabel.innerText = "Tampilkan Semua"; }
      }
      window.renderListModalSesuaiBulan(); modal.classList.remove('hidden'); 
      setTimeout(() => { modal.classList.remove('opacity-0'); if(box) box.classList.remove('translate-y-full'); }, 20); 
    };

    window.tutupModalDetailSemua = () => { 
      const modal = document.getElementById('modalDetailTransaksi'); const box = modal.querySelector('div');
      modal.classList.add('opacity-0'); if(box) box.classList.add('translate-y-full');
      setTimeout(() => { modal.classList.add('hidden'); }, 300); 
    };
    
    window.unduhPDF = () => {}; window.unduhExcel = () => {};
  </script>
</body>

</html>
