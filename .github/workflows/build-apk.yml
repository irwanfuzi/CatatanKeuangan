name: Ubah HTML-JS Jadi APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Code HTML/JS
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK (Untuk Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Compiler Android
        run: |
          npm install
          npx cap init CatatanKeuangan com.irwan.catatankeuangan --web-dir=.
          npx cap add android

      - name: Sinkronisasi Aset Web
        run: npx cap sync

      - name: Rakit Jadi APK Android
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Catatan-Keuangan-Jadi
          path: android/app/build/outputs/apk/release/
