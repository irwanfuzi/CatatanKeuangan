name: Ubah HTML-JS Jadi APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Code HTML/JS
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Siapkan Folder Aset Web
        run: |
          mkdir -p www
          cp index.html www/
          [ -f sw.js ] && cp sw.js www/ || echo "No sw.js"
          [ -f manifest.json ] && cp manifest.json www/ || echo "No manifest"
          
      - name: Install & Init Project
        run: |
          npm install
          npx cap init "MyKas - Money Tracker" com.mykas.moneytracker --web-dir=www
          npx cap add android

      - name: Pasang Ikon Otomatis
        run: |
          npm install -g @capacitor/assets
          if [ -f icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "File icon.png tidak ditemukan, menggunakan logo default."
          fi

      - name: Sesuaikan Versi Android
        run: |
          # Memastikan minimum SDK adalah 21 agar kompatibel dengan semua HP
          sed -i 's/minSdkVersion 22/minSdkVersion 21/g' android/app/build.gradle || echo "minSdkVersion sudah disesuaikan"

      - name: Sinkronisasi
        run: npx cap sync

      - name: Rakit APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Jadi
        uses: actions/upload-artifact@v4
        with:
          name: MyKas-Money-Tracker-APK
          path: android/app/build/outputs/apk/release/
