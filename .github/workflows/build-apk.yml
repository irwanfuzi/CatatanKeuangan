name: Ubah HTML-JS Jadi APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Code HTML/JS
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK (Untuk Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Siapkan Folder Aset Web
        run: |
          mkdir -p www
          cp index.html www/
          [ -f sw.js ] && cp sw.js www/ || echo "No sw.js found"
          [ -f manifest.json ] && cp manifest.json www/ || echo "No manifest found"
          [ -f icon-192.png ] && cp icon-192.png www/ || echo "No icon 192 found"
          [ -f icon-512.png ] && cp icon-512.png www/ || echo "No icon 512 found"

      - name: Install Compiler Android
        run: |
          npm install
          npx cap init CatatanKeuangan com.irwan.catatankeuangan --web-dir=www
          npx cap add android

      - name: Generate Icon Aplikasi Resmi
        run: |
          # Menginstall tool pemotong logo otomatis dan mengesekusi file icon.png
          npm install -g @capacitor/assets
          if [ -f icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "File icon.png tidak ditemukan, menggunakan logo default."
          fi

      - name: Sinkronisasi Aset Web
        run: npx cap sync

      - name: Rakit Jadi APK Android
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Jadi
        uses: actions/upload-artifact@v4
        with:
          name: MyKas - Money Tracker
          path: android/app/build/outputs/apk/release/
